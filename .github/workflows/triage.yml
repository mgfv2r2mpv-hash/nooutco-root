name: Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Check for triage requirements
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const title = issue.title || '';

            // Check if issue has a priority label
            const hasPriority = issue.labels.some(label =>
              ['data-safety-critical', 'user-blocking', 'aba-clinical-alignment', 'bug', 'enhancement'].includes(label.name)
            );

            if (!hasPriority) {
              // Add @investi label to flag for GitHub Agent triage
              github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['@investi']
              });

              // Comment asking for more details if needed
              if (body.length < 50) {
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: `## Issue Triage Required

This issue needs categorization. Please provide:
- **What is the impact?** (data loss risk, blocks usage, affects clinical accuracy, or other)
- **Who is affected?** (clinical practitioners, app users, developers)
- **Can you reproduce it?** (steps to reproduce if applicable)

Once details are added, a GitHub Agent will categorize this issue with the appropriate priority label.

Labels:
- \`data-safety-critical\` — User data at risk
- \`user-blocking\` — Feature is broken
- \`aba-clinical-alignment\` — Affects clinical accuracy
- \`bug\` — Unexpected behavior
- \`enhancement\` — Feature request`
                });
              }
            }

      - name: Trigger GitHub Agent triage
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            // Comment that will trigger GitHub Agent if properly configured
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@github-agent triage'
            });
