name: Games E2E Tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/games/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'apps/games/**'

defaults:
  run:
    working-directory: apps/games

jobs:
  e2e:
    runs-on: ubuntu-latest
    name: E2E Tests (Playwright)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/games/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/games/playwright-report/
          retention-days: 14
