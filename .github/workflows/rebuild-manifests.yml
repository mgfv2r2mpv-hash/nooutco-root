name: Rebuild image manifests

# Runs whenever image files inside a T_* topic folder are added, removed,
# or renamed. Regenerates manifest.json for both games and commits the result.
on:
  push:
    branches: [main]
    paths:
      - 'IDMatchGame/IDMatchGame/T_**'
      - 'NameIDGame/NameIDGame/T_**'

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild IDMatchGame manifest
        run: node IDMatchGame/build.js IDMatchGame

      - name: Rebuild NameIDGame manifest
        run: node NameIDGame/build.js NameIDGame

      - name: Commit updated manifests
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add IDMatchGame/IDMatchGame/manifest.json NameIDGame/NameIDGame/manifest.json
          git diff --cached --quiet && echo "No manifest changes." \
            || git commit -m "Auto-update image manifests [skip ci]" && git push
