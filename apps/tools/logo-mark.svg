<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="No Outcome ABA">
  <defs>
    <filter id="brush" x="-18%" y="-18%" width="136%" height="136%">
      <feTurbulence type="fractalNoise" baseFrequency="0.016 0.021" numOctaves="2" seed="7" result="n"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.6" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
    </filter>
    <filter id="bleed" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="2.7"></feGaussianBlur></filter>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="2" seed="11" result="t"></feTurbulence>
      <feColorMatrix in="t" type="matrix" values="0 0 0 0 0.16  0 0 0 0 0.2  0 0 0 0 0.11  0 0 0 0.85 -0.34"></feColorMatrix>
    </filter>
    <mask id="m">
      <circle cx="100" cy="100" r="78" fill="#fff"></circle>
      <path d="M64 150 L64 84 L136 150 L136 84" fill="none" stroke="#fff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"></path>
      <g transform="rotate(-9 100 100)">
        <path d="M70.6 180.8 A86 86 0 1 1 129.4 180.8" fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round"></path>
        <circle cx="70.6" cy="180.8" r="9" fill="#fff"></circle>
        <path d="M134.2 184.4 Q131 178 124.6 177.2 L119.8 193.6 Z" fill="#fff"></path>
      </g>
    </mask>
  </defs>
  <g filter="url(#brush)">
    
    <g filter="url(#bleed)" opacity="0.42">
      <circle cx="100" cy="100" r="79" fill="#c0cca8"></circle>
      <path d="M64 150 L64 84 L136 150 L136 84" fill="none" stroke="#4d5840" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"></path>
      <g transform="rotate(-9 100 100)"><path d="M70.6 180.8 A86 86 0 1 1 129.4 180.8" fill="none" stroke="#2c331f" stroke-width="15" stroke-linecap="round"></path></g>
    </g>
    
    <circle cx="100" cy="100" r="78" fill="#c0cca8"></circle>
    <path d="M64 150 L64 84 L136 150 L136 84" fill="none" stroke="#4d5840" stroke-width="14.5" stroke-linecap="round" stroke-linejoin="round"></path>
    <g transform="rotate(-9 100 100)">
      <path d="M70.6 180.8 A86 86 0 1 1 129.4 180.8" fill="none" stroke="#2c331f" stroke-width="12.5" stroke-linecap="round"></path>
      <circle cx="70.6" cy="180.8" r="8.6" fill="#2c331f"></circle>
      <path d="M134.2 184.4 Q131 178 124.6 177.2 L119.8 193.6 Z" fill="#2c331f"></path>
    </g>
    
    <rect x="0" y="0" width="200" height="200" filter="url(#grain)" mask="url(#m)" opacity="0.5" style="mix-blend-mode:multiply"></rect>
  </g>
</svg>