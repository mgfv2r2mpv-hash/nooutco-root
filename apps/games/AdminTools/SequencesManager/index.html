<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequences Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/assets/nav-bar.css">
  <link rel="stylesheet" href="/assets/admin-shell.css">
  <script src="/assets/nav-bar.js" defer></script>
  <script src="/assets/admin-shell.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans, 'Atkinson Hyperlegible', system-ui, sans-serif);
      background: var(--ash-backdrop, #e7ebe0);
      color: var(--text-primary, #1a1f14);
      min-height: 100dvh; font-size: 13px;
    }

    /* ── Floating gear + admin modal (this page owns its own auth) ── */
    .admin-gear { position: fixed; bottom: 1rem; right: 1rem; z-index: 9999; font-size: 1.3rem; background: none; border: none; cursor: pointer; opacity: .4; transition: opacity .15s, filter .15s; padding: 0; line-height: 1; }
    .admin-gear:hover { opacity: .85; }
    .admin-gear.authed { opacity: 1; filter: sepia(1) saturate(2.2) hue-rotate(40deg) brightness(.9); }
    #admin-modal { display: none; position: fixed; inset: 0; background: rgba(44,51,31,.32); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
    #admin-modal.open { display: flex; }
    .admin-modal-box { background: #fff; border: 1px solid var(--sage-100, #e2e6d9); border-radius: 16px; box-shadow: 0 16px 42px rgba(44,51,31,.16); padding: 1.6rem; width: 320px; }
    .admin-modal-box h2 { font-size: 1rem; margin-bottom: .35rem; color: var(--sage-900, #2c331f); }
    .admin-modal-box p  { font-size: .8rem; color: var(--sage-600, #5d6a4d); margin-bottom: 1rem; }
    #admin-pw-input  { width: 100%; padding: .5rem .6rem; border-radius: 8px; border: 1px solid var(--sage-100, #e2e6d9); background: var(--ash-tile, #f4f6ef); color: var(--sage-900, #2c331f); font-size: .9rem; margin-bottom: .5rem; font-family: inherit; }
    .admin-modal-box .unlock-btn { width: 100%; padding: .55rem; border-radius: 8px; background: var(--sage-700, #4d5840); color: #fff; border: none; cursor: pointer; font-size: .9rem; font-weight: 700; }
    .admin-modal-box .unlock-btn:hover { background: var(--sage-800, #3c4533); }
    #admin-pw-error  { font-size: .75rem; color: var(--red-700, #b91c1c); margin-top: .3rem; min-height: 1em; }

    .status-msg { font-size: 12px; min-height: 1.1em; color: var(--sage-500, #6a7659); }
    .status-msg.ok  { color: var(--green-700, #16a34a); }
    .status-msg.err { color: var(--red-700, #b91c1c); }

    /* ── Toolbar actions slot ── */
    #action-bar { display: flex; align-items: center; gap: .6rem; }
    #seq-unsaved { display: none; align-items: center; gap: 7px; background: var(--amber-100, #fef3c7); border: 1px solid #fae3a0; color: var(--amber-700, #92722a); border-radius: 999px; padding: 5px 12px; font-size: 11.5px; font-weight: 700; }
    #seq-unsaved .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--amber-500, #f59e0b); }
    #toolbar-save { display: inline-flex; align-items: center; gap: 6px; padding: 9px 15px; border-radius: 9px; background: var(--green-700, #16a34a); color: #fff; border: none; cursor: pointer; font: inherit; font-size: 13px; font-weight: 700; transition: background .15s; }
    #toolbar-save:hover { background: var(--green-800, #15803d); }

    /* ── Two-pane editor ── */
    #content { display: grid; grid-template-columns: 236px 1fr; gap: 18px; padding: 18px 22px; align-items: start; }
    #sets-pane { background: #fff; border: 1px solid #e9ece2; border-radius: 13px; padding: 14px; }
    #sets-pane h2 { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--ash-label-muted, #a3ad92); margin-bottom: .6rem; padding: 0 4px; }
    .set-row { display: flex; align-items: center; padding: 9px 11px; border-radius: 10px; cursor: pointer; color: var(--sage-700, #4d5840); font-size: 13px; font-weight: 600; margin-bottom: .15rem; border: 1px solid transparent; transition: background .15s; }
    .set-row:hover { background: var(--sage-50, #f1f3ec); }
    .set-row.active { background: var(--sage-100, #e2e6d9); color: var(--sage-900, #2c331f); font-weight: 700; }
    .btn-primary { padding: 9px 14px; border-radius: 9px; background: transparent; color: var(--sage-600, #5d6a4d); border: 1px dashed var(--sage-200, #c7cdb6); cursor: pointer; font: inherit; font-size: 12.5px; font-weight: 700; width: 100%; margin-top: .6rem; transition: background .15s; }
    .btn-primary:hover { background: var(--sage-50, #f1f3ec); }

    #editor-pane { background: #fff; border: 1px solid #e9ece2; border-radius: 13px; padding: 1.3rem 1.4rem; min-height: 320px; }
    #editor-empty { color: var(--sage-500, #6a7659); font-style: italic; font-size: 13px; }
    .editor-section { margin-bottom: 1.2rem; }
    .editor-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ash-label-muted, #a3ad92); margin-bottom: .4rem; }
    .editor-input { padding: .45rem .6rem; border-radius: 8px; border: 1px solid var(--sage-100, #e2e6d9); background: #fff; color: var(--sage-900, #2c331f); font-size: .88rem; font-family: inherit; }

    .emoji-grid { display: flex; flex-wrap: wrap; gap: .5rem; }
    .emoji-chip { position: relative; width: 62px; height: 62px; background: var(--ash-tile, #f4f6ef); border: 1px solid var(--sage-100, #e2e6d9); border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 1.9rem; }
    .emoji-chip .remove-btn { position: absolute; top: -6px; right: -6px; background: var(--red-700, #b91c1c); color: #fff; border: 1px solid #fff; cursor: pointer; font-size: .75rem; width: 19px; height: 19px; border-radius: 50%; padding: 0; line-height: 1; }
    .emoji-chip .remove-btn:hover { background: #991b1b; }

    .add-row { display: flex; gap: .5rem; margin-top: .6rem; max-width: 360px; }
    .add-row input { flex: 1; padding: .45rem .6rem; border-radius: 8px; border: 1px solid var(--sage-100, #e2e6d9); background: #fff; color: var(--sage-900, #2c331f); font-size: 1rem; font-family: inherit; }
    .btn-sm { padding: .4rem .8rem; border-radius: 8px; border: 1px solid var(--sage-200, #c7cdb6); background: var(--sage-50, #f1f3ec); color: var(--sage-700, #4d5840); font-size: .78rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-sm:hover { background: var(--sage-100, #e2e6d9); }

    .actions-row { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--ash-hairline-soft, #eef0e9); }
    .btn-save { padding: 9px 15px; border-radius: 9px; background: var(--green-700, #16a34a); color: #fff; border: none; cursor: pointer; font: inherit; font-size: 13px; font-weight: 700; }
    .btn-save:hover { background: var(--green-800, #15803d); }
    .btn-red { padding: 8px 13px; border-radius: 9px; background: transparent; color: var(--red-700, #b91c1c); border: 1px solid #f0d4d4; cursor: pointer; font: inherit; font-size: 12.5px; font-weight: 700; }
    .btn-red:hover { background: var(--red-50, #fef2f2); }

    @media (max-width: 760px) { #content { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="ash-page">

<noaba-bar product="games" crumbs="Game Master/Sequences Manager" crumb-hrefs="/,/GM/" no-admin></noaba-bar>

<button class="admin-gear" id="admin-gear" title="Admin">⚙️</button>
<div id="admin-modal">
  <div class="admin-modal-box">
    <h2>Sequences Manager</h2>
    <p>Enter the admin password to continue.</p>
    <input type="password" id="admin-pw-input" placeholder="Password">
    <button class="unlock-btn" id="admin-unlock-btn">Unlock</button>
    <div id="admin-pw-error"></div>
  </div>
</div>

<noaba-admin-shell active="sequences" current="Sequences Manager">

  <!-- breadcrumb toolbar actions -->
  <div data-ash-slot="actions" id="action-bar">
    <span class="status-msg" id="global-status"></span>
    <span id="seq-unsaved"><span class="dot"></span><span id="seq-unsaved-text">unsaved</span></span>
    <button id="toolbar-save">✓ Save all sets</button>
  </div>

  <div id="content">
    <div id="sets-pane">
      <h2>Symbol Sets</h2>
      <div id="sets-list"></div>
      <button class="btn-primary" id="btn-new-set">＋ New set</button>
    </div>

    <div id="editor-pane">
      <div id="editor-empty">Select a set on the left, or create a new one.</div>
      <div id="editor-body" hidden>
        <div class="editor-section">
          <div class="editor-label">Set Name</div>
          <input type="text" class="editor-input" id="ed-name" style="width: 260px;">
        </div>

        <div class="editor-section">
          <div class="editor-label">Emojis</div>
          <div class="emoji-grid" id="ed-emojis"></div>
          <div class="add-row">
            <input type="text" id="ed-add-input" placeholder="Paste or type an emoji" maxlength="8">
            <button class="btn-sm" id="ed-add-btn">+ Add</button>
          </div>
        </div>

        <div class="actions-row">
          <button class="btn-save" id="ed-save">Save All Sets</button>
          <button class="btn-red" id="ed-delete">Delete This Set</button>
          <span class="status-msg" id="ed-status"></span>
        </div>
        <p style="font-size:12px;color:var(--sage-500,#6a7659);margin-top:.6rem;">Switch sets freely. Edits are kept until you <strong>Save all sets</strong>.</p>
      </div>
    </div>
  </div>

</noaba-admin-shell>

<script>
'use strict';

const ADMIN_SECRET_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918";

let token   = localStorage.getItem('admin_token') || '';
let symData = null;          // { generated, sets: { name: [emoji, ...] } }
let activeSet = null;        // currently selected set name (in working draft)

// ── Gear / Auth ────────────────────────────────────────────────────
const adminGear    = document.getElementById('admin-gear');
const adminModal   = document.getElementById('admin-modal');
const adminPwInput = document.getElementById('admin-pw-input');
const adminPwError = document.getElementById('admin-pw-error');

function setGearAuthed(authed) { adminGear.classList.toggle('authed', authed); }

function showAdminModal(msg) {
  adminPwInput.value = '';
  adminPwError.textContent = msg || '';
  adminModal.classList.add('open');
  setTimeout(() => adminPwInput.focus(), 50);
}

if (token) { setGearAuthed(true); initApp(); }
else { showAdminModal(); }

adminGear.addEventListener('click', () => {
  adminModal.classList.toggle('open');
  if (adminModal.classList.contains('open')) {
    adminPwInput.value = '';
    adminPwError.textContent = '';
    setTimeout(() => adminPwInput.focus(), 50);
  }
});
adminModal.addEventListener('click', e => { if (e.target === adminModal) adminModal.classList.remove('open'); });

async function sha256Hex(str) {
  const buf    = new TextEncoder().encode(str);
  const digest = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function adminUnlock() {
  const pw = adminPwInput.value;
  if (!pw) { adminPwError.textContent = 'Enter password.'; return; }
  const hash = await sha256Hex(pw);
  if (hash === ADMIN_SECRET_HASH) {
    token = hash;
    localStorage.setItem('admin_token', hash);
    setGearAuthed(true);
    adminModal.classList.remove('open');
    initApp();
  } else {
    adminPwError.textContent = 'Incorrect password.';
    adminPwInput.value = '';
    adminPwInput.focus();
  }
}
document.getElementById('admin-unlock-btn').addEventListener('click', adminUnlock);
adminPwInput.addEventListener('keydown', e => { if (e.key === 'Enter') adminUnlock(); });

function handle401() {
  token = '';
  localStorage.removeItem('admin_token');
  setGearAuthed(false);
  showAdminModal('Session expired — re-enter password.');
}

// ── Status helper ──────────────────────────────────────────────────
function setStatus(elem, cls, msg) {
  elem.className = 'status-msg ' + (cls || '');
  elem.textContent = msg || '';
  if (msg && cls === 'ok') setTimeout(() => { if (elem.textContent === msg) elem.textContent = ''; }, 3500);
}

// ── Dirty-state (Frame 05 guard via the admin shell) ───────────────
function dirtyCount() { return symData ? Object.keys(symData.sets).length : 0; }
function markDirty() {
  const pill = document.getElementById('seq-unsaved');
  if (pill) {
    pill.style.display = 'inline-flex';
    document.getElementById('seq-unsaved-text').textContent = 'unsaved changes';
  }
  if (window.NoabaShell) window.NoabaShell.markDirty('sequences', { emoji: '🔁', name: 'Symbol sets' });
}
function markClean() {
  const pill = document.getElementById('seq-unsaved');
  if (pill) pill.style.display = 'none';
  if (window.NoabaShell) window.NoabaShell.markClean('sequences');
}

// ── API ────────────────────────────────────────────────────────────
async function adminPost(endpoint, body) {
  const ctrl  = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 35000);
  let res;
  try {
    res = await fetch('../../api/admin/' + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(body),
      signal: ctrl.signal,
    });
  } catch (e) {
    clearTimeout(timer);
    throw new Error(e.name === 'AbortError' ? 'Request timed out' : e.message);
  }
  clearTimeout(timer);
  if (res.status === 401) { handle401(); return null; }
  return res;
}

// ── Boot ───────────────────────────────────────────────────────────
async function initApp() {
  try {
    const res = await fetch('../../SequencesGame/SequencesGame/symbols.json', { cache: 'no-store' });
    symData = await res.json();
    if (!symData.sets || typeof symData.sets !== 'object') symData.sets = {};
  } catch (e) {
    setStatus(document.getElementById('global-status'), 'err', 'Could not load symbols.json');
    symData = { sets: {} };
  }
  const names = Object.keys(symData.sets);
  activeSet = names[0] || null;
  renderSetsList();
  renderEditor();
  bindEvents();
}

// ── Rendering ──────────────────────────────────────────────────────
function renderSetsList() {
  const list = document.getElementById('sets-list');
  list.innerHTML = '';
  Object.keys(symData.sets).forEach(name => {
    const row = document.createElement('div');
    row.className = 'set-row' + (name === activeSet ? ' active' : '');
    row.textContent = `${name} (${symData.sets[name].length})`;
    row.addEventListener('click', () => { activeSet = name; renderSetsList(); renderEditor(); });
    list.appendChild(row);
  });
}

function renderEditor() {
  const empty = document.getElementById('editor-empty');
  const body  = document.getElementById('editor-body');
  if (!activeSet || !(activeSet in symData.sets)) {
    empty.hidden = false;
    body.hidden  = true;
    return;
  }
  empty.hidden = true;
  body.hidden  = false;

  document.getElementById('ed-name').value = activeSet;
  const grid = document.getElementById('ed-emojis');
  grid.innerHTML = '';
  symData.sets[activeSet].forEach((sym, idx) => {
    const chip = document.createElement('div');
    chip.className = 'emoji-chip';
    chip.textContent = sym;
    const rm = document.createElement('button');
    rm.className = 'remove-btn';
    rm.textContent = '×';
    rm.title = 'Remove';
    rm.addEventListener('click', () => {
      symData.sets[activeSet].splice(idx, 1);
      markDirty();
      renderEditor();
      renderSetsList();
    });
    chip.appendChild(rm);
    grid.appendChild(chip);
  });
}

// ── Event wiring ───────────────────────────────────────────────────
function bindEvents() {
  if (window.NoabaShell) window.NoabaShell.onSaveAll(async () => {
    const ok = await saveAll();
    if (!ok) throw new Error('Save failed');
  });
  document.getElementById('toolbar-save').addEventListener('click', saveAll);

  document.getElementById('btn-new-set').addEventListener('click', () => {
    let base = 'New Set';
    let name = base;
    let n = 1;
    while (name in symData.sets) { n++; name = `${base} ${n}`; }
    symData.sets[name] = [];
    activeSet = name;
    markDirty();
    renderSetsList();
    renderEditor();
  });

  document.getElementById('ed-name').addEventListener('change', e => {
    const newName = e.target.value.trim();
    if (!newName || newName === activeSet) { e.target.value = activeSet; return; }
    if (newName in symData.sets) {
      alert('A set with that name already exists.');
      e.target.value = activeSet;
      return;
    }
    // rename: rebuild object to preserve order
    const rebuilt = {};
    Object.keys(symData.sets).forEach(k => {
      rebuilt[k === activeSet ? newName : k] = symData.sets[k];
    });
    symData.sets = rebuilt;
    activeSet = newName;
    markDirty();
    renderSetsList();
  });

  document.getElementById('ed-add-btn').addEventListener('click', addEmoji);
  document.getElementById('ed-add-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addEmoji(); }
  });

  document.getElementById('ed-delete').addEventListener('click', () => {
    if (!activeSet) return;
    if (!confirm(`Delete the "${activeSet}" set? This is not saved until you click Save All Sets.`)) return;
    delete symData.sets[activeSet];
    const names = Object.keys(symData.sets);
    activeSet = names[0] || null;
    markDirty();
    renderSetsList();
    renderEditor();
  });

  document.getElementById('ed-save').addEventListener('click', saveAll);
}

function addEmoji() {
  const input = document.getElementById('ed-add-input');
  const val = input.value.trim();
  if (!val || !activeSet) return;
  symData.sets[activeSet].push(val);
  input.value = '';
  markDirty();
  renderEditor();
  renderSetsList();
  input.focus();
}

async function saveAll() {
  const statusEl = document.getElementById('ed-status');
  setStatus(statusEl, '', 'Saving…');
  try {
    const res = await adminPost('sequences-save-symbols', { symbols: symData });
    if (!res) return false; // 401 handled
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      setStatus(statusEl, 'err', data.error || `Save failed (${res.status})`);
      return false;
    }
    symData.generated = data.generated || new Date().toISOString();
    setStatus(statusEl, 'ok', 'Saved.');
    markClean();
    return true;
  } catch (e) {
    setStatus(statusEl, 'err', e.message);
    return false;
  }
}
</script>
</body>
</html>
