<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFC Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/tokens.css">
  <link rel="stylesheet" href="/assets/nav-bar.css">
  <link rel="stylesheet" href="/assets/admin-shell.css">
  <script src="/assets/nav-bar.js" defer></script>
  <script src="/assets/admin-shell.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans, 'Atkinson Hyperlegible', system-ui, sans-serif);
      background: var(--ash-backdrop, #e7ebe0);
      color: var(--text-primary, #1a1f14);
      min-height: 100dvh; font-size: 13px;
    }

    /* ── Floating gear + admin modal (this page owns its own auth) ── */
    .admin-gear { position: fixed; bottom: 1rem; right: 1rem; z-index: 9999; font-size: 1.3rem; background: none; border: none; cursor: pointer; opacity: .4; transition: opacity .15s, filter .15s; padding: 0; line-height: 1; }
    .admin-gear:hover { opacity: .85; }
    .admin-gear.authed { opacity: 1; filter: sepia(1) saturate(2.2) hue-rotate(40deg) brightness(.9); }
    #admin-modal { display: none; position: fixed; inset: 0; background: rgba(44,51,31,.32); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
    #admin-modal.open { display: flex; }
    .admin-modal-box { background: #fff; border: 1px solid var(--sage-100, #e2e6d9); border-radius: 16px; box-shadow: 0 16px 42px rgba(44,51,31,.16); padding: 1.6rem; width: 320px; }
    .admin-modal-box h2 { font-size: 1rem; margin-bottom: .35rem; color: var(--sage-900, #2c331f); }
    .admin-modal-box p  { font-size: .8rem; color: var(--sage-600, #5d6a4d); margin-bottom: 1rem; }
    #admin-pw-input  { width: 100%; padding: .5rem .6rem; border-radius: 8px; border: 1px solid var(--sage-100, #e2e6d9); background: var(--ash-tile, #f4f6ef); color: var(--sage-900, #2c331f); font-size: .9rem; margin-bottom: .5rem; font-family: inherit; }
    .admin-modal-box .unlock-btn { width: 100%; padding: .55rem; border-radius: 8px; background: var(--sage-700, #4d5840); color: #fff; border: none; cursor: pointer; font-size: .9rem; font-weight: 700; }
    .admin-modal-box .unlock-btn:hover { background: var(--sage-800, #3c4533); }
    #admin-pw-error  { font-size: .75rem; color: var(--red-700, #b91c1c); margin-top: .3rem; min-height: 1em; }

    /* ── Toolbar actions slot ── */
    #action-bar { display: flex; align-items: center; gap: .75rem; }
    .btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 9px 15px; border-radius: 9px; background: var(--sage-700, #4d5840); color: #fff; border: none; cursor: pointer; font: inherit; font-size: 13px; font-weight: 700; transition: background .15s; }
    .btn-primary:hover { background: var(--sage-800, #3c4533); }

    /* ── Filter strip ── */
    #filter-bar { background: #fff; border-bottom: 1px solid var(--ash-hairline-soft, #eef0e9); padding: 14px 22px; display: flex; align-items: center; gap: .55rem; flex-wrap: wrap; }
    .filter-bucket { display: flex; align-items: center; gap: .4rem; flex-wrap: wrap; }
    .bucket-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ash-label-muted, #a3ad92); padding-right: .25rem; white-space: nowrap; }
    .bucket-sep { width: 1px; height: 22px; background: var(--ash-hairline, #e7ebe0); margin: 0 .25rem; }
    .filter-pill { padding: 6px 13px; border-radius: 999px; border: 1px solid #dfe3d6; background: #fff; color: var(--sage-600, #5d6a4d); font: inherit; font-size: 12.5px; font-weight: 700; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .filter-pill:hover { border-color: var(--sage-200, #c7cdb6); color: var(--sage-900, #2c331f); }
    .filter-pill.active { background: var(--sage-700, #4d5840); border-color: var(--sage-700, #4d5840); color: #fff; }
    .btn-edit-vocab { padding: 5px 9px; border-radius: 8px; border: 1px solid var(--sage-200, #c7cdb6); background: transparent; color: var(--sage-600, #5d6a4d); font-size: 12px; cursor: pointer; transition: background .15s; }
    .btn-edit-vocab:hover { background: var(--sage-50, #f1f3ec); }

    /* ── Grid ── */
    #content-area { padding: 18px 22px; }
    #image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 13px; }
    .img-card { background: #fff; border: 1px solid #e9ece2; border-radius: 13px; padding: 11px; cursor: pointer; overflow: hidden; transition: border-color .15s, box-shadow .15s; }
    .img-card:hover { border-color: var(--sage-200, #c7cdb6); box-shadow: 0 4px 16px rgba(44,51,31,.08); }
    .img-card img { width: 100%; height: 84px; object-fit: contain; background: var(--ash-tile, #f4f6ef); border-radius: 9px; display: block; }
    .img-card .label { font-size: 13.5px; font-weight: 700; text-align: left; padding: 8px 2px 0; color: var(--sage-900, #1a1f14); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Detail panel ── */
    #detail-panel { position: fixed; inset: 0; background: rgba(44,51,31,.4); z-index: 500; display: none; align-items: flex-end; justify-content: center; }
    #detail-panel.open { display: flex; }
    #detail-box { background: #fff; border: 1px solid var(--sage-100, #e2e6d9); border-top-left-radius: 16px; border-top-right-radius: 16px; width: 100%; max-width: 640px; max-height: 88vh; overflow-y: auto; padding: 1.3rem 1.4rem 2rem; box-shadow: 0 -16px 42px rgba(44,51,31,.16); }
    #dp-close { float: right; background: none; border: none; color: var(--sage-500, #6a7659); font-size: 1.2rem; cursor: pointer; line-height: 1; }
    #dp-title { font-size: 17px; font-weight: 700; margin-bottom: .1rem; padding-right: 2rem; color: var(--sage-900, #1a1f14); }
    #dp-sub   { font-size: 12px; color: var(--sage-500, #6a7659); margin-bottom: .9rem; font-family: var(--font-mono, monospace); }
    .dp-section { margin-bottom: 1rem; }
    .dp-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ash-label-muted, #a3ad92); margin-bottom: .4rem; }
    .dp-row { display: flex; align-items: center; gap: .5rem; margin-bottom: .4rem; flex-wrap: wrap; }
    #dp-thumb { height: 90px; border-radius: 9px; background: var(--ash-tile, #f4f6ef); display: block; margin-bottom: .75rem; }
    #dp-label-input { padding: .45rem .6rem; border-radius: 8px; border: 1px solid var(--sage-100, #e2e6d9); background: #fff; color: var(--sage-900, #2c331f); font-size: .88rem; width: 240px; font-family: inherit; }

    /* tag chips — neutral outline; active uses each bucket's accent (Frame 03) */
    .chip { display: inline-flex; align-items: center; gap: .3rem; padding: 5px 11px; border-radius: 999px; border: 1px solid #dfe3d6; background: #fff; color: var(--sage-500, #9aa589); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .chip:hover { border-color: var(--sage-200, #c7cdb6); }
    .chip.active { background: var(--sage-700, #4d5840); border-color: var(--sage-700, #4d5840); color: #fff; }
    #dp-chips-features .chip.active { background: var(--blue-500, #3b82f6); border-color: var(--blue-500, #3b82f6); }
    #dp-chips-functions .chip.active { background: var(--violet-600, #7c3aed); border-color: var(--violet-600, #7c3aed); }
    #dp-chips-classes .chip.active { background: var(--amber-700, #b45309); border-color: var(--amber-700, #b45309); }

    /* Url input section */
    #dp-img-section input[type=url] { width: 100%; padding: .45rem .6rem; border-radius: 8px; border: 1px solid var(--sage-100, #e2e6d9); background: #fff; color: var(--sage-900, #2c331f); font-size: .82rem; margin-bottom: .4rem; font-family: inherit; }
    .wiki-row { display: flex; gap: .4rem; margin-bottom: .4rem; }
    .wiki-row input { flex: 1; padding: .4rem .5rem; border-radius: 8px; border: 1px solid var(--sage-100, #e2e6d9); background: #fff; color: var(--sage-900, #2c331f); font-size: .78rem; font-family: inherit; }
    .btn-sm { padding: .35rem .6rem; border-radius: 8px; border: 1px solid var(--sage-200, #c7cdb6); background: var(--sage-50, #f1f3ec); color: var(--sage-700, #4d5840); font-size: .75rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-sm:hover { background: var(--sage-100, #e2e6d9); }
    .btn-amber { background: var(--amber-100, #fef3c7); border-color: #fae3a0; color: var(--amber-700, #92722a); }
    .btn-amber:hover { background: #fce8b8; }
    .wiki-results { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: .4rem; }
    .wiki-result { width: 80px; cursor: pointer; background: #fff; border: 1px solid var(--sage-100, #e2e6d9); border-radius: 8px; overflow: hidden; }
    .wiki-result img { width: 100%; height: 60px; object-fit: cover; display: block; }
    .wiki-result span { display: block; font-size: .62rem; color: var(--sage-500, #6a7659); padding: .15rem .2rem; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* buttons */
    .btn-save { padding: 9px 15px; border-radius: 9px; background: var(--green-700, #16a34a); color: #fff; border: none; cursor: pointer; font: inherit; font-size: 13px; font-weight: 700; transition: background .15s; }
    .btn-save:hover { background: var(--green-800, #15803d); }
    .btn-red { padding: 8px 13px; border-radius: 9px; background: transparent; color: var(--red-700, #b91c1c); border: 1px solid #f0d4d4; cursor: pointer; font: inherit; font-size: 12.5px; font-weight: 700; }
    .btn-red:hover { background: var(--red-50, #fef2f2); }
    .status-msg { font-size: 12px; min-height: 1.1em; color: var(--sage-500, #6a7659); }
    .status-msg.ok  { color: var(--green-700, #16a34a); }
    .status-msg.err { color: var(--red-700, #b91c1c); }

    /* ── Add form ── */
    .add-form { display: none; background: #fff; border: 1px solid #e9ece2; border-radius: 13px; padding: 1rem 1.2rem; margin-bottom: 14px; }
    .add-form.open { display: block; }
    .add-form h3 { font-size: 14px; margin-bottom: .75rem; color: var(--sage-900, #2c331f); }
    .add-form label { display: block; font-size: 11px; color: var(--sage-500, #6a7659); margin-bottom: .2rem; margin-top: .55rem; font-weight: 600; }
    .add-form input, .add-form textarea { width: 100%; padding: .45rem .55rem; border-radius: 8px; border: 1px solid var(--sage-100, #e2e6d9); background: #fff; color: var(--sage-900, #2c331f); font-size: .82rem; font-family: inherit; }
    .form-row { display: flex; gap: .5rem; margin-top: .75rem; }
    .btn-cancel-form { padding: 8px 13px; border-radius: 9px; background: var(--ash-hairline-soft, #eef0e9); color: var(--sage-800, #3c4533); border: 1px solid var(--sage-100, #e2e6d9); cursor: pointer; font: inherit; font-size: 13px; font-weight: 600; }
    .btn-cancel-form:hover { background: var(--sage-100, #e2e6d9); }

    /* ── Vocab modal ── */
    #vocab-modal { position: fixed; inset: 0; background: rgba(44,51,31,.4); z-index: 700; display: none; align-items: center; justify-content: center; padding: 20px; }
    #vocab-modal.open { display: flex; }
    #vocab-box { background: #fff; border: 1px solid var(--sage-100, #e2e6d9); border-radius: 16px; box-shadow: 0 16px 42px rgba(44,51,31,.16); padding: 1.4rem; width: 380px; max-height: 80vh; overflow-y: auto; }
    #vocab-box h2 { font-size: 15px; margin-bottom: .75rem; color: var(--sage-900, #2c331f); }
    .vocab-tag-row { display: flex; align-items: center; gap: .4rem; margin-bottom: .4rem; }
    .vocab-tag-row input { flex: 1; padding: .35rem .45rem; border-radius: 7px; border: 1px solid var(--sage-100, #e2e6d9); background: #fff; color: var(--sage-900, #2c331f); font-size: .8rem; font-family: inherit; }
    .btn-icon { padding: .3rem .5rem; border-radius: 7px; background: transparent; border: 1px solid #f0d4d4; color: var(--red-700, #b91c1c); cursor: pointer; font-size: .75rem; }
    .btn-icon:hover { background: var(--red-50, #fef2f2); }
    #vocab-add-row { display: flex; gap: .4rem; margin-top: .5rem; }
    #vocab-add-row input { flex: 1; padding: .35rem .45rem; border-radius: 7px; border: 1px solid var(--sage-100, #e2e6d9); background: #fff; color: var(--sage-900, #2c331f); font-size: .8rem; font-family: inherit; }
    #vocab-modal-status { font-size: 12px; min-height: 1em; margin-top: .4rem; }
    #vocab-close-row { display: flex; gap: .5rem; margin-top: .8rem; }
  </style>
</head>

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────

const ADMIN_SECRET_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918";

let token = localStorage.getItem('admin_token') || '';
let ffcData = null;        // full items.json object
let activeFilter = { bucket: 'all', tag: '__all__' };
let detailItem = null;     // item object being edited
let vocabBucket = null;    // which bucket the vocab modal is editing
let vocabDraft  = [];      // mutable draft of the vocab list in modal

// ── Gear / Auth ────────────────────────────────────────────────────

const adminGear    = document.getElementById('admin-gear');
const adminModal   = document.getElementById('admin-modal');
const adminPwInput = document.getElementById('admin-pw-input');
const adminPwError = document.getElementById('admin-pw-error');

function setGearAuthed(authed) { adminGear.classList.toggle('authed', authed); }

function showAdminModal(msg) {
  adminPwInput.value = '';
  adminPwError.textContent = msg || '';
  adminModal.classList.add('open');
  setTimeout(() => adminPwInput.focus(), 50);
}

if (token) { setGearAuthed(true); initApp(); }
else { showAdminModal(); }

adminGear.addEventListener('click', () => {
  adminModal.classList.toggle('open');
  if (adminModal.classList.contains('open')) {
    adminPwInput.value = '';
    adminPwError.textContent = '';
    setTimeout(() => adminPwInput.focus(), 50);
  }
});
adminModal.addEventListener('click', e => { if (e.target === adminModal) adminModal.classList.remove('open'); });

async function sha256Hex(str) {
  const buf    = new TextEncoder().encode(str);
  const digest = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function adminUnlock() {
  const pw = adminPwInput.value;
  if (!pw) { adminPwError.textContent = 'Enter password.'; return; }
  const hash = await sha256Hex(pw);
  if (hash === ADMIN_SECRET_HASH) {
    token = hash;
    localStorage.setItem('admin_token', hash);
    setGearAuthed(true);
    adminModal.classList.remove('open');
    initApp();
  } else {
    adminPwError.textContent = 'Incorrect password.';
    adminPwInput.value = '';
    adminPwInput.focus();
  }
}

document.getElementById('admin-unlock-btn').addEventListener('click', adminUnlock);
adminPwInput.addEventListener('keydown', e => { if (e.key === 'Enter') adminUnlock(); });

function handle401() {
  token = '';
  localStorage.removeItem('admin_token');
  setGearAuthed(false);
  showAdminModal('Session expired — re-enter password.');
}

// ── API ────────────────────────────────────────────────────────────

async function adminPost(endpoint, body) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 35000);
  let res;
  try {
    res = await fetch('../../api/admin/' + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(body),
      signal: ctrl.signal,
    });
  } catch (e) {
    clearTimeout(timer);
    throw new Error(e.name === 'AbortError' ? 'Request timed out' : e.message);
  }
  clearTimeout(timer);
  if (res.status === 401) { handle401(); return null; }
  return res;
}

// ── Boot ───────────────────────────────────────────────────────────

async function initApp() {
  try {
    const res = await fetch('../../FFCGame/FFCGame/items.json');
    ffcData = await res.json();
  } catch (e) {
    setStatus(document.getElementById('global-status'), 'err', 'Could not load items.json');
    return;
  }
  renderFilterBar();
  renderGrid();
  bindEvents();
}

// ── Utilities ──────────────────────────────────────────────────────

function setStatus(el, type, msg) {
  el.className = 'status-msg' + (type ? ' ' + type : '');
  el.textContent = msg;
}

function nameToSlug(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function tagLabel(tag) {
  return tag.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

// ── Filter bar ────────────────────────────────────────────────────

function renderFilterBar() {
  const BUCKETS = ['groups', 'features', 'functions', 'classes'];
  BUCKETS.forEach(bucket => {
    const container = document.getElementById('bucket-' + bucket);
    // Remove existing pills (keep label and edit button)
    container.querySelectorAll('.filter-pill').forEach(p => p.remove());
    const editBtn = container.querySelector('.btn-edit-vocab');

    (ffcData.vocab[bucket] || []).forEach(tag => {
      const pill = document.createElement('button');
      pill.className = 'filter-pill' + (activeFilter.bucket === bucket && activeFilter.tag === tag ? ' active' : '');
      pill.dataset.bucket = bucket;
      pill.dataset.tag    = tag;
      pill.textContent    = tagLabel(tag);
      pill.addEventListener('click', () => { setFilter(bucket, tag); });
      container.insertBefore(pill, editBtn);
    });
  });

  // Highlight All pill
  document.querySelector('.filter-pill[data-bucket="all"]').classList.toggle('active', activeFilter.bucket === 'all');
}

function setFilter(bucket, tag) {
  activeFilter = { bucket, tag };
  renderFilterBar();
  renderGrid();
}

// ── Grid ──────────────────────────────────────────────────────────

function filteredItems() {
  if (activeFilter.bucket === 'all') return ffcData.items || [];
  const { bucket, tag } = activeFilter;
  const key = bucket; // groups, features, functions, classes
  return (ffcData.items || []).filter(it => (it[key] || []).includes(tag));
}

function renderGrid() {
  const grid = document.getElementById('image-grid');
  grid.innerHTML = '';
  filteredItems().forEach(item => {
    const card = document.createElement('div');
    card.className = 'img-card';

    const img = document.createElement('img');
    img.src = '../../FFCGame/FFCGame/_Resources/_imgSource/items/' + item.img;
    img.alt = item.label;
    img.onerror = () => { img.style.opacity = '.3'; };

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = item.label;

    card.appendChild(img);
    card.appendChild(label);
    card.addEventListener('click', () => openDetail(item));
    grid.appendChild(card);
  });
}

// ── Detail panel ──────────────────────────────────────────────────

const detailPanel = document.getElementById('detail-panel');

function openDetail(item) {
  detailItem = item;
  document.getElementById('dp-title').textContent = item.label;
  document.getElementById('dp-sub').textContent   = 'id: ' + item.id;
  document.getElementById('dp-thumb').src = '../../FFCGame/FFCGame/_Resources/_imgSource/items/' + item.img;
  document.getElementById('dp-label-input').value = item.label;
  document.getElementById('dp-url-input').value   = '';
  document.getElementById('dp-wiki-input').value  = item.label;
  document.getElementById('dp-wiki-results').innerHTML = '';
  setStatus(document.getElementById('dp-img-status'), '', '');
  setStatus(document.getElementById('dp-save-status'), '', '');

  renderDetailChips();
  detailPanel.classList.add('open');
}

function closeDetail() {
  detailPanel.classList.remove('open');
  detailItem = null;
}

function renderDetailChips() {
  const BUCKETS = ['groups', 'features', 'functions', 'classes'];
  BUCKETS.forEach(bucket => {
    const container = document.getElementById('dp-chips-' + bucket);
    container.innerHTML = '';
    (ffcData.vocab[bucket] || []).forEach(tag => {
      const chip = document.createElement('span');
      chip.className = 'chip' + ((detailItem[bucket] || []).includes(tag) ? ' active' : '');
      chip.textContent = tagLabel(tag);
      chip.dataset.tag    = tag;
      chip.dataset.bucket = bucket;
      chip.addEventListener('click', () => {
        const arr = detailItem[bucket] || (detailItem[bucket] = []);
        const idx = arr.indexOf(tag);
        if (idx >= 0) { arr.splice(idx, 1); chip.classList.remove('active'); }
        else { arr.push(tag); chip.classList.add('active'); }
      });
      container.appendChild(chip);
    });
  });
}

// ── Vocab modal ───────────────────────────────────────────────────

const vocabModal = document.getElementById('vocab-modal');

function openVocabModal(bucket) {
  vocabBucket = bucket;
  vocabDraft  = [...(ffcData.vocab[bucket] || [])];
  document.getElementById('vocab-title').textContent = 'Edit ' + tagLabel(bucket);
  setStatus(document.getElementById('vocab-modal-status'), '', '');
  document.getElementById('vocab-new-tag').value = '';
  renderVocabList();
  vocabModal.classList.add('open');
}

function renderVocabList() {
  const list = document.getElementById('vocab-list');
  list.innerHTML = '';
  vocabDraft.forEach((tag, i) => {
    const row = document.createElement('div');
    row.className = 'vocab-tag-row';
    const inp = document.createElement('input');
    inp.type  = 'text';
    inp.value = tag;
    inp.addEventListener('change', () => { vocabDraft[i] = inp.value.trim().replace(/\s+/g, '_').toLowerCase(); });

    const del = document.createElement('button');
    del.className   = 'btn-icon';
    del.textContent = '✕';
    del.title       = 'Delete "' + tag + '"';
    del.addEventListener('click', () => {
      if (!confirm(`Delete tag "${tag}" from all items?\nThis cannot be undone.`)) return;
      vocabDraft.splice(i, 1);
      renderVocabList();
    });

    row.appendChild(inp);
    row.appendChild(del);
    list.appendChild(row);
  });
}

// ── Wikimedia search ──────────────────────────────────────────────

async function runWikiSearch(query, urlInput, resultsEl) {
  if (!query) return;
  resultsEl.innerHTML = '<span style="font-size:.75rem;color:#9aa589">Searching…</span>';
  try {
    const searchUrl = `https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&srnamespace=6&srlimit=6&format=json&origin=*`;
    const hits = ((await (await fetch(searchUrl)).json()).query || {}).search || [];
    if (!hits.length) { resultsEl.innerHTML = '<span style="font-size:.75rem;color:#9aa589">No results.</span>'; return; }
    const titles = hits.slice(0, 6).map(h => h.title).join('|');
    const infoUrl = `https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(titles)}&prop=imageinfo&iiprop=url&iiurlwidth=400&format=json&origin=*`;
    const pages = Object.values(((await (await fetch(infoUrl)).json()).query || {}).pages || {});
    resultsEl.innerHTML = '';
    let count = 0;
    pages.forEach(page => {
      if (count >= 3) return;
      const ii = page.imageinfo && page.imageinfo[0];
      if (!ii) return;
      count++;
      const card = document.createElement('div');
      card.className = 'wiki-result';
      const img = document.createElement('img');
      img.src = ii.thumburl || ii.url;
      img.alt = page.title;
      const lbl = document.createElement('span');
      lbl.textContent = page.title.replace('File:', '');
      card.appendChild(img);
      card.appendChild(lbl);
      card.addEventListener('click', () => { urlInput.value = ii.url; });
      resultsEl.appendChild(card);
    });
    if (!count) resultsEl.innerHTML = '<span style="font-size:.75rem;color:#9aa589">No images.</span>';
  } catch {
    resultsEl.innerHTML = '<span style="font-size:.75rem;color:#f87171">Search failed.</span>';
  }
}

// ── Bind events ───────────────────────────────────────────────────

function bindEvents() {
  // All items filter
  document.querySelector('.filter-pill[data-bucket="all"]').addEventListener('click', () => setFilter('all', '__all__'));

  // Vocab edit buttons
  document.querySelectorAll('.btn-edit-vocab').forEach(btn => {
    btn.addEventListener('click', () => openVocabModal(btn.dataset.bucket));
  });

  // Detail panel close / backdrop
  document.getElementById('dp-close').addEventListener('click', closeDetail);
  detailPanel.addEventListener('click', e => { if (e.target === detailPanel) closeDetail(); });

  // Detail image save
  document.getElementById('dp-img-save').addEventListener('click', async () => {
    if (!detailItem) return;
    const url    = document.getElementById('dp-url-input').value.trim();
    const status = document.getElementById('dp-img-status');
    if (!url) { setStatus(status, 'err', 'Enter a URL.'); return; }
    setStatus(status, '', 'Saving…');
    try {
      const res = await adminPost('ffc-save-image', { id: detailItem.id, filename: detailItem.img, imageUrl: url });
      if (!res) { setStatus(status, '', ''); return; }
      if (res.ok) {
        const j = await res.json().catch(() => ({}));
        if (j.localPath) detailItem.img = j.localPath.split('/').pop();
        const saveRes = await adminPost('ffc-save-items', { items: ffcData });
        if (!saveRes || !saveRes.ok) { setStatus(status, 'err', 'Image saved but record update failed'); return; }
        setStatus(status, 'ok', 'Saved!');
        const localSrc = '../../FFCGame/FFCGame/_Resources/_imgSource/items/' + detailItem.img;
        document.getElementById('dp-thumb').src = localSrc;
        const gridImg = document.querySelector(`#image-grid .img-card img[alt="${detailItem.label}"]`);
        if (gridImg) gridImg.src = localSrc;
      } else {
        const j = await res.json().catch(() => ({}));
        setStatus(status, 'err', j.error || 'Error ' + res.status);
      }
    } catch (e) {
      setStatus(status, 'err', e.message || 'Network error');
    }
  });

  document.getElementById('dp-wiki-btn').addEventListener('click', () =>
    runWikiSearch(document.getElementById('dp-wiki-input').value.trim(),
      document.getElementById('dp-url-input'), document.getElementById('dp-wiki-results')));
  document.getElementById('dp-wiki-input').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('dp-wiki-btn').click(); });
  document.getElementById('dp-google-btn').addEventListener('click', () =>
    window.open('https://www.google.com/search?q=' + encodeURIComponent(document.getElementById('dp-wiki-input').value.trim()) + '&tbm=isch', '_blank'));

  // Detail save item
  document.getElementById('dp-save').addEventListener('click', async () => {
    if (!detailItem) return;
    const status = document.getElementById('dp-save-status');
    detailItem.label = document.getElementById('dp-label-input').value.trim() || detailItem.label;
    setStatus(status, '', 'Saving…');
    try {
      const res = await adminPost('ffc-save-items', { items: ffcData });
      if (!res) { setStatus(status, '', ''); return; }
      if (res.ok) {
        setStatus(status, 'ok', 'Saved!');
        renderGrid();
      } else {
        const j = await res.json().catch(() => ({}));
        setStatus(status, 'err', j.error || 'Error ' + res.status);
      }
    } catch (e) {
      setStatus(status, 'err', e.message || 'Network error');
    }
  });

  // Detail delete item
  document.getElementById('dp-delete').addEventListener('click', async () => {
    if (!detailItem) return;
    if (!confirm(`Delete item "${detailItem.label}"? This removes the record and image file.`)) return;
    const status = document.getElementById('dp-save-status');
    setStatus(status, '', 'Deleting…');
    try {
      await adminPost('ffc-remove-image', { localPath: 'FFCGame/FFCGame/_Resources/_imgSource/items/' + detailItem.img });
      ffcData.items = ffcData.items.filter(i => i.id !== detailItem.id);
      const res = await adminPost('ffc-save-items', { items: ffcData });
      if (!res) { setStatus(status, '', ''); return; }
      if (res.ok) {
        closeDetail();
        renderGrid();
        renderFilterBar();
      } else {
        const j = await res.json().catch(() => ({}));
        setStatus(status, 'err', j.error || 'Error ' + res.status);
      }
    } catch (e) {
      setStatus(status, 'err', e.message || 'Network error');
    }
  });

  // Vocab modal close / save
  document.getElementById('vocab-close-btn').addEventListener('click', () => vocabModal.classList.remove('open'));
  vocabModal.addEventListener('click', e => { if (e.target === vocabModal) vocabModal.classList.remove('open'); });

  document.getElementById('vocab-add-btn').addEventListener('click', () => {
    const inp = document.getElementById('vocab-new-tag');
    const tag = inp.value.trim().replace(/\s+/g, '_').toLowerCase();
    if (!tag) return;
    if (vocabDraft.includes(tag)) { return; }
    vocabDraft.push(tag);
    inp.value = '';
    renderVocabList();
  });
  document.getElementById('vocab-new-tag').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('vocab-add-btn').click(); });

  document.getElementById('vocab-save-btn').addEventListener('click', async () => {
    const status = document.getElementById('vocab-modal-status');
    // Cascade: remove deleted tags from all items
    const oldTags = new Set(ffcData.vocab[vocabBucket] || []);
    const newTags = new Set(vocabDraft);
    const removed = [...oldTags].filter(t => !newTags.has(t));

    if (removed.length) {
      ffcData.items.forEach(item => {
        item[vocabBucket] = (item[vocabBucket] || []).filter(t => !removed.includes(t));
      });
      // Also cascade from prompts
      const MODE_BUCKETS = {
        features:  ['feature'],
        functions: ['function'],
        classes:   ['classWithinGroup', 'classCrossCategory'],
        groups:    [],
      };
      (MODE_BUCKETS[vocabBucket] || []).forEach(mode => {
        if (ffcData.prompts[mode]) {
          removed.forEach(t => { delete ffcData.prompts[mode][t]; });
        }
      });
    }

    ffcData.vocab[vocabBucket] = [...vocabDraft];
    setStatus(status, '', 'Saving…');
    try {
      const res = await adminPost('ffc-save-items', { items: ffcData });
      if (!res) { setStatus(status, '', ''); return; }
      if (res.ok) {
        setStatus(status, 'ok', 'Saved!');
        vocabModal.classList.remove('open');
        renderFilterBar();
        renderGrid();
        if (detailItem) renderDetailChips();
      } else {
        const j = await res.json().catch(() => ({}));
        setStatus(status, 'err', j.error || 'Error ' + res.status);
      }
    } catch (e) {
      setStatus(status, 'err', e.message || 'Network error');
    }
  });

  // Add item form
  document.getElementById('btn-add-item').addEventListener('click', () => {
    const form = document.getElementById('add-item-form');
    const open = form.classList.toggle('open');
    document.getElementById('btn-add-item').textContent = open ? '✕ Cancel' : '＋ Add item';
  });
  document.getElementById('af-cancel').addEventListener('click', () => {
    document.getElementById('add-item-form').classList.remove('open');
    document.getElementById('btn-add-item').textContent = '＋ Add item';
  });
  document.getElementById('af-wiki-btn').addEventListener('click', () =>
    runWikiSearch(document.getElementById('af-wiki-query').value.trim(),
      document.getElementById('af-url'), document.getElementById('af-wiki-results')));
  document.getElementById('af-wiki-query').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('af-wiki-btn').click(); });
  document.getElementById('af-google-btn').addEventListener('click', () =>
    window.open('https://www.google.com/search?q=' + encodeURIComponent(document.getElementById('af-wiki-query').value.trim()) + '&tbm=isch', '_blank'));

  document.getElementById('af-submit').addEventListener('click', async () => {
    const itemId   = nameToSlug(document.getElementById('af-id').value.trim());
    const label    = document.getElementById('af-label').value.trim();
    const filename = document.getElementById('af-filename').value.trim();
    const url      = document.getElementById('af-url').value.trim();
    const status   = document.getElementById('af-status');
    if (!itemId || !label || !filename || !url) { setStatus(status, 'err', 'Fill in all fields.'); return; }
    if ((ffcData.items || []).find(i => i.id === itemId)) { setStatus(status, 'err', 'ID already exists.'); return; }

    setStatus(status, '', 'Saving image…');
    try {
      const imgRes = await adminPost('ffc-save-image', { id: itemId, filename, imageUrl: url });
      if (!imgRes) { setStatus(status, '', ''); return; }
      if (!imgRes.ok) {
        const j = await imgRes.json().catch(() => ({}));
        setStatus(status, 'err', j.error || 'Image error');
        return;
      }
      const imgJ = await imgRes.json().catch(() => ({}));
      const actualFilename = imgJ.localPath ? imgJ.localPath.split('/').pop() : filename;
      setStatus(status, '', 'Saving record…');
      const newItem = { id: itemId, img: actualFilename, label, groups: [], features: [], functions: [], classes: [] };
      ffcData.items.push(newItem);
      const res = await adminPost('ffc-save-items', { items: ffcData });
      if (!res) { setStatus(status, '', ''); return; }
      if (res.ok) {
        setStatus(status, 'ok', 'Added! Click item to assign tags.');
        document.getElementById('add-item-form').classList.remove('open');
        document.getElementById('btn-add-item').textContent = '＋ Add item';
        ['af-id','af-label','af-filename','af-url'].forEach(id => { document.getElementById(id).value = ''; });
        renderGrid();
        renderFilterBar();
      } else {
        const j = await res.json().catch(() => ({}));
        setStatus(status, 'err', j.error || 'Error ' + res.status);
      }
    } catch (e) {
      setStatus(status, 'err', e.message || 'Network error');
    }
  });
}
</script>
