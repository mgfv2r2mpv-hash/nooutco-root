<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature · Function · Class Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────── -->
  <header id="app-header">
    <a href="../../index.html" id="btn-back" title="Back to Games">← Games</a>
    <h1>Feature · Function · Class</h1>
    <div id="timer-section">
      <span id="timer-display">00:00</span>
      <button id="btn-timer-toggle" class="btn-timer" title="Pause / Resume">Pause</button>
      <button id="btn-timer-reset"  class="btn-timer" title="Reset timer">Reset</button>
    </div>
  </header>

  <!-- ── Settings bar ─────────────────────────────────────────────── -->
  <div id="settings-bar">

    <div class="setting-group">
      <label for="sel-mode">Mode</label>
      <select id="sel-mode">
        <option value="feature">Feature</option>
        <option value="function">Function</option>
        <option value="classWithinGroup">Class (within group)</option>
        <option value="classCrossCategory">Class (cross-category)</option>
      </select>
    </div>

    <div class="setting-group">
      <label for="sel-tag">Tag</label>
      <select id="sel-tag"></select>
    </div>

    <div class="setting-group setting-targets">
      <button type="button" id="btn-targets-toggle" class="btn-targets" aria-expanded="false">
        Targets <span id="targets-count" class="targets-count">0 of 0</span>
      </button>
    </div>

    <div class="setting-group">
      <label for="inp-size">Array Size</label>
      <input type="number" id="inp-size" min="2" max="10" value="4">
    </div>

    <div class="setting-group">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-persists">
        Prompt persists
      </label>
    </div>

    <div class="setting-group">
      <label for="sel-prompt-style">Prompt style</label>
      <select id="sel-prompt-style">
        <option value="sparkle">Sparkle</option>
        <option value="outline">Outline</option>
      </select>
      <button id="btn-prompt" class="btn-prompt" hidden>Prompt</button>
    </div>

    <div class="setting-group">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-auto-prompt">
        Auto-Prompt
      </label>
    </div>

    <div class="setting-group">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-prompt-delay" disabled>
        Prompt Delay
      </label>
      <select id="sel-prompt-delay" disabled>
        <option value="1">1s</option>
        <option value="2">2s</option>
        <option value="3" selected>3s</option>
        <option value="4">4s</option>
        <option value="5">5s</option>
        <option value="10">10s</option>
      </select>
    </div>

    <button id="btn-start" class="btn-primary">Start</button>
  </div>

  <!-- ── Target picker panel (hidden until toggled) ───────────────── -->
  <section id="target-panel" hidden>
    <div class="target-panel-header">
      <span class="target-panel-title">Targets for <span id="target-panel-mode-label"></span></span>
      <div class="target-panel-actions">
        <button type="button" id="btn-targets-all">Select all</button>
        <button type="button" id="btn-targets-none">Deselect all</button>
        <button type="button" id="btn-targets-close" title="Close" class="btn-targets-close">×</button>
      </div>
    </div>
    <div id="target-panel-body" class="target-panel-body"></div>
  </section>

  <!-- ── Game area (hidden until Start) ───────────────────────────── -->
  <main id="game-area" hidden>

    <section id="sample-section">
      <div class="area-label">Find</div>
      <div id="sample-card">
        <div id="sample-word"></div>
      </div>
    </section>

    <section id="comp-section">
      <div class="area-label">Choose the picture</div>
      <div id="comp-grid"></div>
    </section>

  </main>

  <!-- ── Bottom controls ──────────────────────────────────────────── -->
  <div id="bottom-bar">
    <button id="btn-print"      class="btn-print btn-icon" title="Print data" aria-label="Print data">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M18 8H6c-1.66 0-3 1.34-3 3v6h4v4h10v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H9v-5h6v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>
      </svg>
    </button>
    <button id="btn-clear-data" class="btn-clear-data btn-icon" title="Clear data" aria-label="Clear data">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
      </svg>
    </button>
  </div>

  <!-- ── Print-only section ───────────────────────────────────────── -->
  <div id="print-section">
    <div id="print-header">
      <h2>Feature · Function · Class — Session Results</h2>
      <div id="print-meta"></div>
    </div>
    <table id="results-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Mode</th>
          <th>Tag</th>
          <th>Target</th>
          <th>Array Size</th>
          <th>Errors</th>
          <th>Prompted</th>
          <th>Delay (s)</th>
          <th>Time (s)</th>
          <th>Outcome</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
    <div id="print-summary"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
