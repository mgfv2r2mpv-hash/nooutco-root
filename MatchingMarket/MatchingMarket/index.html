<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="version" content="1.0">
  <title>Matching Market v1.0</title>
  <!--
    IMPORTANT: This app discovers images by fetching directory listings.
    You must serve it via a local HTTP server that returns directory listings, e.g.:
      python3 -m http.server 8000
    Opening index.html as a file:// URL will NOT work for image discovery.

    Topic image folders (T_*) are NOT shipped inside this directory; the app
    discovers them from a manifest at ../../IDMatchGame/IDMatchGame/manifest.json.
  -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header id="app-header">
    <a href="../../index.html" id="btn-back" title="Back to Games">← Games</a>
    <h1>Matching Market</h1>
    <div id="timer-section">
      <span id="timer-display">00:00</span>
      <button id="btn-timer-toggle" class="btn-timer" title="Pause / Resume">Pause</button>
      <button id="btn-timer-reset"  class="btn-timer" title="Reset timer">Reset</button>
    </div>
  </header>

  <div id="settings-bar">
    <div class="setting-group">
      <label for="sel-topic">Topic<button type="button" class="help-btn" data-help="Choose the image category to use for this session.">?</button></label>
      <select id="sel-topic">
        <option value="">-- scanning --</option>
      </select>
    </div>

    <div class="setting-group">
      <label for="inp-size">Array Size<button type="button" class="help-btn" data-help="How many items appear on the market shelves (1–10).">?</button></label>
      <input type="number" id="inp-size" min="1" max="10" value="4">
    </div>

    <div class="setting-group setting-targets">
      <button type="button" id="btn-targets-toggle" class="btn-targets" aria-expanded="false">
        Targets <span id="targets-count" class="targets-count">0 of 0</span>
        <button type="button" class="help-btn" data-help="Choose which images from the topic can appear as the customer's request.">?</button>
      </button>
    </div>

    <div class="setting-group setting-extra">
      <button type="button" id="btn-extra-toggle" class="btn-extra" aria-expanded="false">
        ⚙ Settings
        <button type="button" class="help-btn" data-help="Open additional game options.">?</button>
      </button>
    </div>

    <div class="setting-group">
      <button id="btn-prompt" class="btn-prompt" hidden>Prompt</button>
    </div>

    <button id="btn-start" class="btn-primary">Start</button>
  </div>

  <section id="target-panel" hidden>
    <div class="target-panel-header">
      <span class="target-panel-title">Targets</span>
      <div class="target-panel-actions">
        <button type="button" id="btn-targets-all">Select all</button>
        <button type="button" id="btn-targets-none">Deselect all</button>
        <button type="button" id="btn-targets-close" title="Close" class="btn-targets-close">×</button>
      </div>
    </div>
    <div id="target-panel-body" class="target-panel-body"></div>
  </section>

  <section id="extra-panel" hidden>
    <div class="extra-panel-header">
      <span class="extra-panel-title">Options</span>
      <button type="button" id="btn-extra-close" class="btn-extra-close" title="Close">×</button>
    </div>
    <div class="extra-panel-body">
      <div class="extra-row">
        <label for="sel-anim-tier" style="font-weight:600;font-size:0.82rem;color:#4a5568;">Animation</label>
        <select id="sel-anim-tier">
          <option value="full">Full</option>
          <option value="light">Light</option>
          <option value="minimal">Minimal</option>
        </select>
        <button type="button" class="help-btn" data-help="Full = customer walks in & out per trial. Light = static customer, item flies into bag. Minimal = no character animation.">?</button>
      </div>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-caption">
        Show request caption
        <button type="button" class="help-btn" data-help="Shows the request as text below the speech-bubble image (e.g. 'I'd like an apple.').">?</button>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-same-customer" checked>
        Same customer on Retry
        <button type="button" class="help-btn" data-help="When on, the same customer character reappears if the trial is retried.">?</button>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-represent-errors" checked>
        Re-Present Errors
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-errorless">
        Errorless
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-no-error-anim">
        No Incorrect Animation
        <button type="button" class="help-btn" data-help="Suppresses the shake/red animation when an incorrect item is tapped.">?</button>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-non-target-distractor" checked>
        Non-Target Category Distractors
        <button type="button" class="help-btn" data-help="When on, images in the topic that are NOT selected as targets can still appear as distractors.">?</button>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-cross">
        Non-category distractors
        <button type="button" class="help-btn" data-help="When on, distractors are drawn from ALL topics, not just the current one.">?</button>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-persists">
        Prompt persists
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-auto-prompt">
        Auto-Prompt
      </label>
      <div class="extra-row">
        <label class="checkbox-label">
          <input type="checkbox" id="chk-prompt-delay" disabled>
          Prompt Delay
        </label>
        <select id="sel-prompt-delay" disabled>
          <option value="1">1s</option>
          <option value="2">2s</option>
          <option value="3" selected>3s</option>
          <option value="4">4s</option>
          <option value="5">5s</option>
          <option value="10">10s</option>
        </select>
      </div>
      <div class="extra-row">
        <label for="sel-prompt-style">Prompt style</label>
        <select id="sel-prompt-style">
          <option value="sparkle">Sparkle</option>
          <option value="outline">Outline</option>
        </select>
      </div>
    </div>
  </section>

  <main id="game-area" hidden>
    <div id="market-stage">

      <!-- Static backdrop: supermarket aisle with perspective, lit ceiling,
           and a defined foreground shelving unit (items are HTML on top). -->
      <svg id="market-backdrop" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
        <defs>
          <!-- Floor tiles fading toward the vanishing point -->
          <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#d9c79a"/>
            <stop offset="1" stop-color="#b59866"/>
          </linearGradient>
          <!-- Distant wall gradient -->
          <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#e7d9b6"/>
            <stop offset="1" stop-color="#cdb98a"/>
          </linearGradient>
          <!-- Ceiling band -->
          <linearGradient id="ceilGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#fdf6e3"/>
            <stop offset="1" stop-color="#e7d9b6"/>
          </linearGradient>
          <!-- Generic product silhouettes for the distant aisle shelves -->
          <pattern id="prodA" x="0" y="0" width="22" height="40" patternUnits="userSpaceOnUse">
            <rect x="2" y="4" width="8"  height="32" fill="#e94e3a" opacity="0.85"/>
            <rect x="12" y="2" width="8" height="34" fill="#f4c542" opacity="0.85"/>
          </pattern>
          <pattern id="prodB" x="0" y="0" width="22" height="40" patternUnits="userSpaceOnUse">
            <rect x="2" y="6" width="8"  height="30" fill="#3a8edb" opacity="0.85"/>
            <rect x="12" y="3" width="8" height="33" fill="#7ac74f" opacity="0.85"/>
          </pattern>
          <pattern id="prodC" x="0" y="0" width="22" height="40" patternUnits="userSpaceOnUse">
            <rect x="2" y="5" width="8"  height="31" fill="#e87434" opacity="0.85"/>
            <rect x="12" y="4" width="8" height="32" fill="#c43c8a" opacity="0.85"/>
          </pattern>
        </defs>

        <!-- Far wall & ceiling -->
        <rect x="0" y="0"   width="1000" height="120" fill="url(#ceilGrad)"/>
        <rect x="0" y="120" width="1000" height="380" fill="url(#wallGrad)"/>

        <!-- Ceiling fluorescent light strips -->
        <g>
          <rect x="60"  y="14" width="280" height="14" rx="3" fill="#fff8d4" stroke="#b8a76c" stroke-width="1.5"/>
          <rect x="380" y="14" width="280" height="14" rx="3" fill="#fff8d4" stroke="#b8a76c" stroke-width="1.5"/>
          <rect x="700" y="14" width="240" height="14" rx="3" fill="#fff8d4" stroke="#b8a76c" stroke-width="1.5"/>
          <!-- soft glow underneath -->
          <ellipse cx="200" cy="40"  rx="180" ry="18" fill="#fff5c0" opacity="0.5"/>
          <ellipse cx="520" cy="40"  rx="180" ry="18" fill="#fff5c0" opacity="0.5"/>
          <ellipse cx="820" cy="40"  rx="160" ry="18" fill="#fff5c0" opacity="0.5"/>
        </g>

        <!-- Distant aisle (perspective): vanishing-point shelves on either side -->
        <g opacity="0.92">
          <!-- left-side receding shelf unit -->
          <polygon points="0,170 360,250 360,430 0,470" fill="#9c8159" stroke="#5a4427" stroke-width="2"/>
          <!-- horizontal shelf rails -->
          <polygon points="0,230 360,290 360,300 0,238" fill="#7a5d3a"/>
          <polygon points="0,300 360,340 360,350 0,308" fill="#7a5d3a"/>
          <polygon points="0,370 360,390 360,400 0,378" fill="#7a5d3a"/>
          <!-- product silhouettes on left shelves -->
          <polygon points="20,206 350,256 350,288 20,232" fill="url(#prodA)"/>
          <polygon points="20,276 350,306 350,338 20,302" fill="url(#prodB)"/>
          <polygon points="20,346 350,356 350,388 20,372" fill="url(#prodC)"/>

          <!-- right-side receding shelf unit -->
          <polygon points="1000,170 640,250 640,430 1000,470" fill="#9c8159" stroke="#5a4427" stroke-width="2"/>
          <polygon points="1000,230 640,290 640,300 1000,238" fill="#7a5d3a"/>
          <polygon points="1000,300 640,340 640,350 1000,308" fill="#7a5d3a"/>
          <polygon points="1000,370 640,390 640,400 1000,378" fill="#7a5d3a"/>
          <polygon points="650,256 980,206 980,232 650,288" fill="url(#prodB)"/>
          <polygon points="650,306 980,276 980,302 650,338" fill="url(#prodC)"/>
          <polygon points="650,356 980,346 980,372 650,388" fill="url(#prodA)"/>
        </g>

        <!-- Central back aisle (vanishing-point endcap) -->
        <rect x="360" y="250" width="280" height="180" fill="#cdb98a"/>
        <g opacity="0.9">
          <rect x="370" y="260" width="260" height="14" fill="#a88a55"/>
          <rect x="380" y="280" width="240" height="40" fill="url(#prodA)"/>
          <rect x="380" y="328" width="240" height="40" fill="url(#prodB)"/>
          <rect x="380" y="376" width="240" height="40" fill="url(#prodC)"/>
        </g>
        <!-- Aisle number sign -->
        <g transform="translate(460,250)">
          <rect width="80" height="22" rx="3" fill="#2c6a3f" stroke="#1f4a2c" stroke-width="1.5"/>
          <text x="40" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#fff" font-weight="800">AISLE 3</text>
        </g>

        <!-- Floor with perspective tile lines -->
        <rect x="0" y="430" width="1000" height="170" fill="url(#floorGrad)"/>
        <g stroke="#a48956" stroke-width="1.5" opacity="0.7">
          <!-- horizontal tile lines fading to the vanishing point -->
          <line x1="0" y1="470" x2="1000" y2="470"/>
          <line x1="0" y1="510" x2="1000" y2="510"/>
          <line x1="0" y1="555" x2="1000" y2="555"/>
          <!-- radial perspective lines from vanishing point (~500,430) -->
          <line x1="500" y1="430" x2="0"    y2="600"/>
          <line x1="500" y1="430" x2="180"  y2="600"/>
          <line x1="500" y1="430" x2="340"  y2="600"/>
          <line x1="500" y1="430" x2="660"  y2="600"/>
          <line x1="500" y1="430" x2="820"  y2="600"/>
          <line x1="500" y1="430" x2="1000" y2="600"/>
        </g>

        <!-- "MARKET" sign band (kept for branding) -->
        <g>
          <rect x="0" y="150" width="1000" height="44" fill="#2c6a3f"/>
          <rect x="0" y="194" width="1000" height="4"  fill="#1f4a2c"/>
        </g>
        <text x="500" y="183" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="900" fill="#fff" letter-spacing="10">MARKET</text>

        <!-- Foreground shelving unit (defined, items are HTML on top) -->
        <g>
          <!-- top valance / header board -->
          <rect x="20"  y="208" width="740" height="20" fill="#7a5630" stroke="#3e2912" stroke-width="3"/>
          <rect x="22"  y="210" width="736" height="4"  fill="#a47148"/>
          <!-- left & right uprights -->
          <rect x="20"  y="228" width="22"  height="282" fill="#7a5630" stroke="#3e2912" stroke-width="2"/>
          <rect x="738" y="228" width="22"  height="282" fill="#7a5630" stroke="#3e2912" stroke-width="2"/>
          <!-- back panel -->
          <rect x="42"  y="228" width="696" height="282" fill="#d6b285" stroke="#7a5630" stroke-width="2"/>
          <!-- subtle wood-grain stripes on back panel -->
          <g stroke="#b8915f" stroke-width="1" opacity="0.55">
            <line x1="60"  y1="240" x2="720" y2="240"/>
            <line x1="60"  y1="332" x2="720" y2="332"/>
            <line x1="60"  y1="424" x2="720" y2="424"/>
          </g>
          <!-- shelf planks (horizontal dividers) -->
          <g>
            <rect x="20"  y="332" width="740" height="14" fill="#a47148" stroke="#3e2912" stroke-width="2"/>
            <rect x="20"  y="424" width="740" height="14" fill="#a47148" stroke="#3e2912" stroke-width="2"/>
            <rect x="20"  y="496" width="740" height="18" fill="#7a5630" stroke="#3e2912" stroke-width="2"/>
          </g>
          <!-- shelf-edge highlight -->
          <g stroke="#f3deb9" stroke-width="1.5" opacity="0.8">
            <line x1="22" y1="333" x2="758" y2="333"/>
            <line x1="22" y1="425" x2="758" y2="425"/>
          </g>
          <!-- price-tag rails -->
          <g fill="#fff" stroke="#7a5630" stroke-width="0.8" opacity="0.85">
            <rect x="22" y="346" width="736" height="6"/>
            <rect x="22" y="438" width="736" height="6"/>
          </g>
        </g>
      </svg>

      <!-- Shelf planks rendered behind the grid (HTML for easy row alignment) -->
      <div id="shelf-planks" aria-hidden="true"></div>

      <!-- Customer layer (procedural SVG inserted here) -->
      <div id="customer-layer"></div>

      <!-- Speech bubble with the sample (request) image -->
      <div id="speech-bubble" aria-hidden="true">
        <div id="speech-bubble-inner">
          <img id="sample-img" src="" alt="Customer request">
          <div id="speech-caption" hidden></div>
        </div>
        <div id="speech-bubble-tail"></div>
      </div>

      <!-- Paper market bag on the counter -->
      <div id="bag-on-counter">
        <svg viewBox="0 0 80 96" aria-hidden="true">
          <path d="M 8 30 L 8 90 Q 8 94 12 94 L 68 94 Q 72 94 72 90 L 72 30 Z" fill="#d4a86a" stroke="#7a5630" stroke-width="3" stroke-linejoin="round"/>
          <path d="M 8 30 L 20 14 L 60 14 L 72 30 Z" fill="#bf8d4f" stroke="#7a5630" stroke-width="3" stroke-linejoin="round"/>
          <path d="M 26 14 Q 30 6 36 14" fill="none" stroke="#7a5630" stroke-width="3" stroke-linecap="round"/>
          <path d="M 44 14 Q 50 6 54 14" fill="none" stroke="#7a5630" stroke-width="3" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- Floating emoji reaction layer -->
      <div id="floating-emojis" aria-hidden="true"></div>

      <!-- Comparison grid (HTML, sits on the shelves) -->
      <div id="comp-grid"></div>

    </div>

    <div id="comp-section"></div>
  </main>

  <div id="bottom-bar">
    <button id="btn-print"      class="btn-print btn-icon" title="Print data" aria-label="Print data">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M18 8H6c-1.66 0-3 1.34-3 3v6h4v4h10v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H9v-5h6v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>
      </svg>
    </button>
    <button id="btn-clear-data" class="btn-clear-data btn-icon" title="Clear data" aria-label="Clear data">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
      </svg>
    </button>
  </div>

  <div id="print-section">
    <div id="print-header">
      <h2>Matching Market &mdash; Session Results</h2>
      <div id="print-meta"></div>
    </div>
    <table id="results-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Topic</th>
          <th>Sample</th>
          <th>Array Size</th>
          <th>Errors</th>
          <th>Prompted</th>
          <th>Delay (s)</th>
          <th>Time (s)</th>
          <th>Outcome</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
    <div id="print-summary"></div>
  </div>

  <script src="../../tooltip-help.js"></script>
  <script src="characters.js"></script>
  <script src="game.js"></script>
  <script>
    const ADMIN_SECRET_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918";
    window.ADMIN_SECRET_HASH = ADMIN_SECRET_HASH;
  </script>
  <script src="../../admin-gear.js"></script>
</body>
</html>
