<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Manager — Admin</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #111; color: #eee; min-height: 100vh; }

/* ── Gear button + admin modal ── */
.admin-gear {
  position: fixed; bottom: 1rem; right: 1rem; z-index: 9999;
  font-size: 1.3rem; background: none; border: none; cursor: pointer;
  opacity: 0.35; transition: opacity 0.15s; padding: 0; line-height: 1;
}
.admin-gear:hover { opacity: 0.8; }
.admin-gear.authed { opacity: 1; filter: sepia(1) saturate(3) hue-rotate(80deg); }
#admin-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 10000;
  align-items: center; justify-content: center;
}
#admin-modal.open { display: flex; }
.admin-modal-box {
  background: #1e1e1e; border: 1px solid #333; border-radius: 12px;
  padding: 2rem; width: 320px; text-align: center;
}
.admin-modal-box h1 { font-size: 1.3rem; margin-bottom: 1.25rem; color: #fff; }
.admin-modal-box input {
  width: 100%; padding: 0.6rem 0.8rem; border-radius: 8px;
  border: 1px solid #444; background: #2a2a2a; color: #eee;
  font-size: 1rem; margin-bottom: 0.75rem; font-family: inherit;
}
.admin-modal-box .unlock-btn {
  width: 100%; padding: 0.6rem; border-radius: 8px;
  background: #3b82f6; color: #fff; border: none; cursor: pointer; font-size: 1rem;
}
.admin-modal-box .unlock-btn:hover { background: #2563eb; }
#admin-pw-error { color: #f87171; font-size: 0.85rem; margin-top: 0.5rem; min-height: 1.2em; }

/* ── App Shell ── */
#app { padding: 1rem 1.5rem 2rem; }

/* ── App Header ── */
.app-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
.btn-back {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 0.4rem 0.9rem; border-radius: 8px; border: 1px solid #444;
  background: #1e1e1e; color: #aaa; text-decoration: none; font-size: 0.9rem;
  white-space: nowrap; transition: background 0.15s;
}
.btn-back:hover { background: #2a2a2a; color: #fff; }
.header-divider { width: 1px; height: 28px; background: #333; flex-shrink: 0; }

/* ── Game Tabs ── */
.game-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.game-tab {
  padding: 0.45rem 1rem; border-radius: 8px; border: 1px solid #444;
  background: #1e1e1e; color: #aaa; cursor: pointer; font-size: 0.9rem;
}
.game-tab.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

/* ── Folder Tab Bar ── */
.folder-bar-wrap {
  display: flex; align-items: center; gap: 0.5rem;
  margin-bottom: 1rem; flex-wrap: wrap;
}
.folder-tab {
  padding: 0.35rem 0.9rem; border-radius: 6px; border: 1px solid #333;
  background: #1e1e1e; color: #aaa; cursor: pointer; font-size: 0.82rem;
}
.folder-tab.active { background: #334155; color: #fff; border-color: #475569; }
.folder-tab.archived-tab { border-color: #78350f; color: #fbbf24; }
.folder-tab.archived-tab.active { background: #451a03; }
.btn-new-topic {
  margin-left: auto; padding: 0.35rem 0.9rem; border-radius: 6px;
  border: 1px dashed #475569; background: transparent; color: #7dd3fc;
  cursor: pointer; font-size: 0.82rem;
}
.btn-new-topic:hover { background: #1e3a5f; }

/* ── Archive folder button ── */
.folder-action-bar {
  display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem;
}
.btn-rename {
  padding: 0.3rem 0.75rem; border-radius: 6px; font-size: 0.8rem;
  background: #1e293b; color: #93c5fd; border: 1px solid #334155; cursor: pointer;
}
.btn-rename:hover { background: #1e3a5f; }
.rename-inline { display: flex; align-items: center; gap: 0.4rem; }
.rename-inline input {
  padding: 0.25rem 0.5rem; border-radius: 6px; border: 1px solid #3b82f6;
  background: #0f172a; color: #e2e8f0; font-size: 0.82rem; width: 160px;
}
.btn-archive {
  padding: 0.3rem 0.75rem; border-radius: 6px; font-size: 0.8rem;
  background: #451a03; color: #fbbf24; border: 1px solid #78350f; cursor: pointer;
}
.btn-archive:hover { background: #7c2d12; }
.btn-restore {
  padding: 0.3rem 0.75rem; border-radius: 6px; font-size: 0.8rem;
  background: #14532d; color: #86efac; border: 1px solid #166534; cursor: pointer;
}
.btn-restore:hover { background: #15803d; }
.btn-purge {
  padding: 0.3rem 0.75rem; border-radius: 6px; font-size: 0.8rem;
  background: #4c0519; color: #fca5a5; border: 1px solid #7f1d1d; cursor: pointer;
}
.btn-purge:hover { background: #7f1d1d; }

/* ── Add Image ── */
.btn-add-image {
  padding: 0.3rem 0.75rem; border-radius: 6px; font-size: 0.8rem;
  background: #1e3a5f; color: #7dd3fc; border: 1px solid #1e40af; cursor: pointer;
}
.btn-add-image:hover { background: #1e40af; }
.add-form {
  background: #1a2433; border: 1px solid #334155; border-radius: 10px;
  padding: 1rem; margin-bottom: 1rem; display: none;
}
.add-form.open { display: block; }
.add-form h3 { font-size: 0.9rem; margin-bottom: 0.75rem; color: #93c5fd; }
.add-form label { display: block; font-size: 0.78rem; color: #94a3b8; margin-bottom: 0.25rem; margin-top: 0.5rem; }
.add-form input, .add-form textarea {
  width: 100%; padding: 0.4rem 0.6rem; border-radius: 6px;
  border: 1px solid #334155; background: #0f172a; color: #e2e8f0;
  font-size: 0.85rem;
}
.add-form textarea { resize: vertical; min-height: 70px; }
.add-form .form-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
.add-form .form-row button {
  padding: 0.4rem 1rem; border-radius: 6px; font-size: 0.85rem;
  cursor: pointer; border: none;
}
.btn-submit { background: #3b82f6; color: #fff; }
.btn-submit:hover { background: #2563eb; }
.btn-cancel-form { background: #374151; color: #d1d5db; }
.btn-cancel-form:hover { background: #4b5563; }

/* ── Image Grid ── */
.image-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 0.75rem;
}
.img-card {
  background: #1e1e1e; border: 1px solid #2e2e2e; border-radius: 8px;
  overflow: hidden; cursor: pointer; transition: border-color 0.15s;
  position: relative;
}
.img-card:hover { border-color: #3b82f6; }
.img-card img {
  width: 100%; aspect-ratio: 1; object-fit: contain;
  background: #2a2a2a; display: block; padding: 6px;
}
.img-card .label {
  font-size: 0.68rem; color: #94a3b8; padding: 0.35rem 0.4rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center;
}
.cdn-badge {
  position: absolute; top: 4px; right: 4px;
  background: #d97706; color: #fff; font-size: 0.6rem;
  padding: 1px 4px; border-radius: 3px; font-weight: 700;
}

/* ── Detail Panel ── */
#detail-panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #1a1a2e; border-top: 2px solid #334155;
  padding: 1.25rem 1.5rem 1.5rem; z-index: 500;
  transform: translateY(100%); transition: transform 0.25s ease;
  max-height: 85vh; overflow-y: auto;
}
#detail-panel.open { transform: translateY(0); }
.detail-header { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; }
.detail-thumb {
  width: 140px; height: 140px; object-fit: contain;
  background: #2a2a2a; border-radius: 8px; flex-shrink: 0;
}
.detail-meta { flex: 1; min-width: 0; }
.detail-meta h2 { font-size: 1rem; margin-bottom: 0.25rem; }
.detail-meta .detail-sub { font-size: 0.78rem; color: #94a3b8; }
.detail-close {
  background: none; border: none; color: #94a3b8; font-size: 1.4rem;
  cursor: pointer; line-height: 1; padding: 0 0.25rem;
}
.detail-close:hover { color: #fff; }

.detail-section { margin-bottom: 1rem; }
.detail-section label { display: block; font-size: 0.78rem; color: #94a3b8; margin-bottom: 0.3rem; }
.detail-row { display: flex; gap: 0.5rem; }
.detail-row input {
  flex: 1; padding: 0.4rem 0.6rem; border-radius: 6px;
  border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 0.85rem;
}
.btn-sm {
  padding: 0.4rem 0.85rem; border-radius: 6px; font-size: 0.82rem;
  cursor: pointer; border: none; white-space: nowrap;
}
.btn-blue { background: #3b82f6; color: #fff; }
.btn-blue:hover { background: #2563eb; }
.btn-gray { background: #374151; color: #d1d5db; }
.btn-gray:hover { background: #4b5563; }
.btn-red { background: #7f1d1d; color: #fca5a5; }
.btn-red:hover { background: #991b1b; }
.btn-amber { background: #78350f; color: #fde68a; }
.btn-amber:hover { background: #92400e; }

.wiki-results { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
.wiki-result {
  width: 90px; background: #1e1e1e; border: 1px solid #334155;
  border-radius: 6px; overflow: hidden; cursor: pointer;
}
.wiki-result:hover { border-color: #3b82f6; }
.wiki-result img { width: 100%; aspect-ratio: 1; object-fit: contain; background: #2a2a2a; display: block; }
.wiki-result span { display: block; font-size: 0.62rem; color: #94a3b8; padding: 2px 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.status-msg { font-size: 0.8rem; min-height: 1.2em; margin-top: 0.3rem; }
.status-msg.ok { color: #86efac; }
.status-msg.err { color: #f87171; }

.loading { color: #64748b; font-size: 0.9rem; padding: 1.5rem 0; }

/* ── Duplicate resolution modal ── */
.dup-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
}
.dup-box {
  background: #1e1e2e; border: 1px solid #475569; border-radius: 12px;
  padding: 1.5rem; width: 400px; max-width: calc(100vw - 2rem);
}
.dup-box h3 { font-size: .95rem; color: #f87171; margin-bottom: .4rem; }
.dup-box p  { font-size: .82rem; color: #94a3b8; margin-bottom: .9rem; }
.dup-rename-row { display: flex; gap: .4rem; margin-bottom: 1rem; align-items: center; }
.dup-rename-row label { font-size: .78rem; color: #94a3b8; white-space: nowrap; }
.dup-rename-row input {
  flex: 1; padding: .4rem .6rem; border-radius: 6px;
  border: 1px solid #3b82f6; background: #0f172a; color: #e2e8f0; font-size: .85rem;
}
.dup-actions { display: flex; flex-wrap: wrap; gap: .5rem; }
</style>
</head>
<body>

<button class="admin-gear" id="admin-gear" title="Admin">⚙️</button>
<div id="admin-modal">
  <div class="admin-modal-box">
    <h1>🔐 Image Manager</h1>
    <input type="password" id="admin-pw-input" placeholder="Admin password" autocomplete="current-password">
    <button class="unlock-btn" id="admin-unlock-btn">Unlock</button>
    <div id="admin-pw-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="app-header">
    <a class="btn-back" href="../../">← Games</a>
    <div class="header-divider"></div>
    <div class="game-tabs" id="game-tabs"></div>
  </div>
  <div id="main-content"><p class="loading">Loading…</p></div>
</div>

<!-- Detail Panel -->
<div id="detail-panel">
  <div class="detail-header">
    <img class="detail-thumb" id="dp-thumb" src="" alt="">
    <div class="detail-meta">
      <h2 id="dp-filename"></h2>
      <div class="detail-sub" id="dp-sub"></div>
    </div>
    <button class="detail-close" id="dp-close">✕</button>
  </div>

  <div class="detail-section" id="dp-displayname-section" style="background:#1e293b;border:1px solid #334155;border-radius:8px;padding:.75rem 1rem;">
    <label style="color:#7dd3fc;font-weight:600;">Display name <span id="dp-displayname-hint" style="color:#64748b;font-weight:400;">(optional — shown to learners; leave blank to use the filename)</span></label>
    <div class="detail-row">
      <input type="text" id="dp-displayname-input" placeholder="e.g. On  (multiple files like on-squirrel.svg, on-book.svg can share this label)">
      <button class="btn-sm btn-blue" id="dp-displayname-save-btn">Save</button>
    </div>
    <div class="status-msg" id="dp-displayname-status"></div>
  </div>

  <div class="detail-section">
    <label>Replace from URL</label>
    <div class="detail-row">
      <input type="url" id="dp-url-input" placeholder="https://…">
      <button class="btn-sm btn-blue" id="dp-save-btn">Save</button>
    </div>
    <div class="status-msg" id="dp-save-status"></div>
  </div>

  <div class="detail-section">
    <label>Search Wikimedia Commons</label>
    <div class="detail-row">
      <input type="text" id="dp-wiki-input" placeholder="Search query…">
      <button class="btn-sm btn-gray" id="dp-wiki-btn">Search</button>
      <button class="btn-sm btn-amber" id="dp-google-btn">Google ↗</button>
    </div>
    <div class="wiki-results" id="dp-wiki-results"></div>
  </div>

  <div class="detail-section">
    <button class="btn-sm btn-red" id="dp-remove-btn">Remove image</button>
    <span class="status-msg" id="dp-remove-status"></span>
  </div>
</div>

<script>
'use strict';

// ─── State ────────────────────────────────────────────────────────────────────

const GAMES = [
  { id: 'IDMatchGame',      label: 'Matching Game',     type: 'manifest' },
  { id: 'NameIDGame',       label: 'Receptive Words Game', type: 'manifest' },
  { id: 'FamousPersonGame', label: 'Famous Person Game', type: 'fpg'     },
  { id: 'FFCGame',          label: 'FFC Game',          type: 'ffc'      },
];

const ADMIN_SECRET_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918";

let token = localStorage.getItem('admin_token') || '';
let activeGame = GAMES[0];
let gameData = {}; // { [gameId]: { manifest | fpgPeople } }
let activeFolder = null;
let detailContext = null; // { gameId, folder, filename, person? }

// ─── Auth / Gear ──────────────────────────────────────────────────────────────

const adminGear    = document.getElementById('admin-gear');
const adminModal   = document.getElementById('admin-modal');
const adminPwInput = document.getElementById('admin-pw-input');
const adminPwError = document.getElementById('admin-pw-error');

function setGearAuthed(authed) { adminGear.classList.toggle('authed', authed); }

function showAdminModal(msg) {
  adminPwInput.value = '';
  adminPwError.textContent = msg || '';
  adminModal.classList.add('open');
  setTimeout(() => adminPwInput.focus(), 50);
}

if (token) { setGearAuthed(true); initApp(); }
else { showAdminModal(); }

adminGear.addEventListener('click', () => {
  adminModal.classList.toggle('open');
  if (adminModal.classList.contains('open')) {
    adminPwInput.value = '';
    adminPwError.textContent = '';
    setTimeout(() => adminPwInput.focus(), 50);
  }
});
adminModal.addEventListener('click', e => { if (e.target === adminModal) adminModal.classList.remove('open'); });

async function sha256Hex(str) {
  const buf    = new TextEncoder().encode(str);
  const digest = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function adminUnlock() {
  const pw = adminPwInput.value;
  if (!pw) { adminPwError.textContent = 'Enter your password.'; return; }
  const hash = await sha256Hex(pw);
  if (hash === ADMIN_SECRET_HASH) {
    token = hash;
    localStorage.setItem('admin_token', hash);
    setGearAuthed(true);
    adminModal.classList.remove('open');
    initApp();
  } else {
    adminPwError.textContent = 'Incorrect password.';
    adminPwInput.value = '';
    adminPwInput.focus();
  }
}

document.getElementById('admin-unlock-btn').addEventListener('click', adminUnlock);
adminPwInput.addEventListener('keydown', e => { if (e.key === 'Enter') adminUnlock(); });

function handle401() {
  token = '';
  localStorage.removeItem('admin_token');
  setGearAuthed(false);
  showAdminModal('Session expired — re-enter password.');
}

// ─── Fetch helpers ────────────────────────────────────────────────────────────

async function adminPost(endpoint, body) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 35000);
  let res;
  try {
    res = await fetch('../../api/admin/' + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify(body),
      signal: ctrl.signal,
    });
  } catch (err) {
    clearTimeout(timer);
    throw new Error(err.name === 'AbortError' ? 'Request timed out (35s)' : err.message);
  }
  clearTimeout(timer);
  if (res.status === 401) { handle401(); return null; }
  return res;
}

// ─── Data Loading ─────────────────────────────────────────────────────────────

async function loadGameData(game) {
  if (gameData[game.id]) return gameData[game.id];

  if (game.type === 'manifest') {
    const path = game.id === 'IDMatchGame'
      ? `../../IDMatchGame/IDMatchGame/manifest.json`
      : `../../NameIDGame/NameIDGame/manifest.json`;
    const res = await fetch(path);
    const m = await res.json();
    // archived is stored as object by worker; normalize to array of names for UI
    if (m.archived && !Array.isArray(m.archived)) {
      m.archived = Object.keys(m.archived);
    } else if (!m.archived) {
      m.archived = [];
    }
    gameData[game.id] = { manifest: m };
  } else if (game.type === 'ffc') {
    const res = await fetch('../../FFCGame/FFCGame/items.json');
    const data = await res.json();
    gameData[game.id] = { ffcData: data };
  } else {
    const res = await fetch('../../FamousPersonGame/index.html');
    const html = await res.text();
    const match = html.match(/const PEOPLE\s*=\s*(\[[\s\S]*?\n\];)/);
    let people = [];
    if (match) {
      try { people = Function('"use strict"; return ' + match[1])(); } catch(e) { console.error(e); }
    }
    gameData[game.id] = { fpgPeople: people };
  }
  return gameData[game.id];
}

// ─── App Init ─────────────────────────────────────────────────────────────────

function initApp() {
  renderGameTabs();
  switchGame(GAMES[0]);
}

function renderGameTabs() {
  const wrap = document.getElementById('game-tabs');
  wrap.innerHTML = '';
  GAMES.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'game-tab' + (g === activeGame ? ' active' : '');
    btn.textContent = g.label;
    btn.addEventListener('click', () => switchGame(g));
    wrap.appendChild(btn);
  });
}

async function switchGame(game) {
  activeGame = game;
  activeFolder = null;
  document.querySelectorAll('.game-tab').forEach((b, i) => {
    b.classList.toggle('active', GAMES[i] === game);
  });
  const content = document.getElementById('main-content');
  content.innerHTML = '<p class="loading">Loading…</p>';
  await loadGameData(game);
  renderFolderBar();
  renderContent();
}

// ─── Folder Bar ───────────────────────────────────────────────────────────────

function getFolders() {
  const d = gameData[activeGame.id];
  if (!d) return [];
  if (activeGame.type === 'fpg') return ['images'];
  if (activeGame.type === 'ffc') return ['__all__', ...(d.ffcData.vocab.groups || [])];
  return d.manifest.folders || [];
}

function getArchivedFolders() {
  const d = gameData[activeGame.id];
  if (!d || activeGame.type === 'fpg' || activeGame.type === 'ffc') return [];
  const a = d.manifest.archived;
  if (!a) return [];
  return Array.isArray(a) ? a : Object.keys(a);
}

function renderFolderBar() {
  const content = document.getElementById('main-content');

  const barWrap = document.createElement('div');
  barWrap.className = 'folder-bar-wrap';
  barWrap.id = 'folder-bar';

  const folders = getFolders();
  const archived = getArchivedFolders();

  if (!activeFolder || (!folders.includes(activeFolder) && activeFolder !== '__archived__')) {
    activeFolder = folders[0] || (archived.length ? '__archived__' : null);
  }

  folders.forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'folder-tab' + (activeFolder === f ? ' active' : '');
    if (f === '__all__') {
      btn.textContent = 'All Items';
    } else {
      btn.textContent = f.replace(/^T_/, '').replace(/_/g, ' ');
    }
    btn.dataset.folder = f;
    btn.addEventListener('click', () => { activeFolder = f; renderFolderBar(); renderContent(); });
    barWrap.appendChild(btn);
  });

  if (archived.length) {
    const btn = document.createElement('button');
    btn.className = 'folder-tab archived-tab' + (activeFolder === '__archived__' ? ' active' : '');
    btn.textContent = '📦 Archived (' + archived.length + ')';
    btn.addEventListener('click', () => { activeFolder = '__archived__'; renderFolderBar(); renderContent(); });
    barWrap.appendChild(btn);
  }

  if (activeGame.type === 'manifest') {
    const newBtn = document.createElement('button');
    newBtn.className = 'btn-new-topic';
    newBtn.textContent = '+ New Topic';
    newBtn.addEventListener('click', showNewTopicModal);
    barWrap.appendChild(newBtn);
  }

  content.innerHTML = '';
  content.appendChild(barWrap);
}

// ─── Content Area ─────────────────────────────────────────────────────────────

function renderContent() {
  const content = document.getElementById('main-content');
  // Remove everything after folder bar
  while (content.children.length > 1) content.removeChild(content.lastChild);

  if (activeFolder === '__archived__') {
    renderArchivedView(content);
    return;
  }

  // Folder action bar
  if (activeGame.type === 'manifest' && activeFolder) {
    const bar = document.createElement('div');
    bar.className = 'folder-action-bar';
    const renameBtn = document.createElement('button');
    renameBtn.className = 'btn-rename';
    renameBtn.textContent = '✏ Rename';
    renameBtn.addEventListener('click', () => showRenameInline(bar, renameBtn, activeFolder));

  grid.className = 'image-grid';
  grid.id = 'image-grid';

  const images = getImagesForFolder(activeFolder);
  images.forEach(item => grid.appendChild(buildCard(item)));

  content.appendChild(grid);

function getImagesForFolder(folder) {
  const d = gameData[activeGame.id];
  if (!d) return [];

  if (activeGame.type === 'ffc') {
    const items = d.ffcData.items || [];
    const filtered = folder === '__all__'
      ? items
      : items.filter(it => (it.groups || []).includes(folder));
    return filtered.map(it => ({ type: 'ffc', item: it }));
  }

  if (activeGame.type === 'fpg') {
    return d.fpgPeople.map(p => ({ type: 'fpg', person: p }));
  }

  const paths = (d.manifest.images && d.manifest.images[folder]) || [];
  return paths.map(p => ({ type: 'manifest', path: p, folder }));
}

function buildCard(item) {
  const card = document.createElement('div');
  card.className = 'img-card';

  const img = document.createElement('img');
  const label = document.createElement('div');
  label.className = 'label';

  if (item.type === 'ffc') {
    const it = item.item;
    img.src = '../../FFCGame/FFCGame/_Resources/_imgSource/items/' + it.img;
    img.alt = it.label;
    label.textContent = it.label;
    card.addEventListener('click', () => openDetail({ type: 'ffc', item: it }));
  } else if (item.type === 'fpg') {
    const p = item.person;
    const isCDN = p.img && p.img.startsWith('https://');
    img.src = isCDN ? p.img : '../../FamousPersonGame/' + p.img;
    img.alt = p.name;
    label.textContent = p.name;
    if (isCDN) {
      const badge = document.createElement('span');
      badge.className = 'cdn-badge';
      badge.textContent = 'CDN';
      card.appendChild(badge);
    }
    card.addEventListener('click', () => openDetail({ type: 'fpg', person: p }));
  } else {
    img.src = '../../' + activeGame.id + '/' + activeGame.id + '/' + item.path;
    img.alt = item.path;
    const filename = item.path.split('/').pop();
    const displayName = gameData[activeGame.id]?.manifest?.displayNames?.[item.path];
    if (displayName) {
      label.innerHTML = `<span style="color:#7dd3fc;">"${escapeHtml(displayName)}"</span> · ${escapeHtml(filename)}`;
      label.title = `Display name: "${displayName}"\nFilename: ${filename}`;
    } else {
      label.textContent = filename;
    }
    card.addEventListener('click', () => openDetail({ type: 'manifest', path: item.path, folder: item.folder, gameId: activeGame.id }));
  }

  img.onerror = () => { img.style.opacity = '0.3'; };
  card.appendChild(img);
  card.appendChild(label);
  return card;
}

    if (wq && !wq.value) {
      wq.value = activeGame.type === 'manifest'
        ? activeFolder.replace(/^T_/, '').replace(/_/g, ' ')
        : '';
    }
  }
}

// ─── Topic Actions ────────────────────────────────────────────────────────────

async function doArchiveTopic(folder) {
  if (!confirm(`Archive folder "${folder}"? It will be moved to the Archived tab.`)) return;
  const res = await adminPost('archive-topic', { game: activeGame.id, folder });
  if (!res) return;
  if (res.ok) {
    const m = gameData[activeGame.id].manifest;
    m.folders = m.folders.filter(f => f !== folder);
    const archName = folder.replace(/^T_/, '_a_T_');
    if (!m.archived) m.archived = [];
    m.archived.push(archName);
    activeFolder = m.folders[0] || (m.archived.length ? '__archived__' : null);
    renderFolderBar();
    renderContent();
  } else {
    const j = await res.json().catch(() => ({}));
    alert('Error: ' + (j.error || res.status));
  }
}

async function doRestoreTopic(archFolder) {
  if (!confirm(`Restore "${archFolder}"?`)) return;
  const res = await adminPost('restore-topic', { game: activeGame.id, folder: archFolder });
  if (!res) return;
  if (res.ok) {
    const m = gameData[activeGame.id].manifest;
    m.archived = m.archived.filter(f => f !== archFolder);
    const restored = archFolder.replace(/^_a_T_/, 'T_');
    m.folders.push(restored);
    activeFolder = restored;
    renderFolderBar();
    renderContent();
  } else {
    const j = await res.json().catch(() => ({}));
    alert('Error: ' + (j.error || res.status));
  }
}

async function doPurgeTopic(archFolder) {
  if (!confirm(`Permanently delete "${archFolder}"? This cannot be undone.`)) return;
  const res = await adminPost('purge-topic', { game: activeGame.id, folder: archFolder });
  if (!res) return;
  if (res.ok) {
    const m = gameData[activeGame.id].manifest;
    m.archived = m.archived.filter(f => f !== archFolder);
    activeFolder = m.folders[0] || (m.archived.length ? '__archived__' : null);
    renderFolderBar();
    renderContent();
  } else {
    const j = await res.json().catch(() => ({}));
    alert('Error: ' + (j.error || res.status));
  }
}

// ─── Rename Topic ─────────────────────────────────────────────────────────────

function showRenameInline(bar, renameBtn, folder) {
  if (bar.querySelector('.rename-inline')) return;
  renameBtn.style.display = 'none';

  const wrap = document.createElement('div');
  wrap.className = 'rename-inline';

  const input = document.createElement('input');
  input.type = 'text';
  input.value = folder.replace(/^T_/, '');
  attachSanitize(input, sanitizeSlug);

  const okBtn = document.createElement('button');
  okBtn.className = 'btn-sm btn-blue';
  okBtn.textContent = 'OK';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn-sm btn-gray';
  cancelBtn.textContent = 'Cancel';

  const status = document.createElement('span');
  status.style.cssText = 'font-size:.78rem;';

  wrap.appendChild(input);
  wrap.appendChild(okBtn);
  wrap.appendChild(cancelBtn);
  wrap.appendChild(status);
  bar.insertBefore(wrap, renameBtn.nextSibling);
  input.focus();
  input.select();

  function close() { wrap.remove(); renameBtn.style.display = ''; }
  cancelBtn.addEventListener('click', close);
  input.addEventListener('keydown', e => { if (e.key === 'Escape') close(); if (e.key === 'Enter') okBtn.click(); });

  okBtn.addEventListener('click', async () => {
    const newName = input.value.trim();
    if (!newName || newName === folder.replace(/^T_/, '')) { close(); return; }
    const newFolder = 'T_' + newName;
    okBtn.disabled = cancelBtn.disabled = true;
    status.textContent = 'Renaming…';
    status.style.color = '#94a3b8';
    try {
      const res = await adminPost('rename-topic', { game: activeGame.id, folder, newFolder });
      if (!res) { close(); return; }
      if (res.ok) {
        const m = gameData[activeGame.id].manifest;
        m.folders = [...m.folders.filter(f => f !== folder), newFolder].sort();
        m.images[newFolder] = (m.images[folder] || []).map(p => p.replace(`/${folder}/`, `/${newFolder}/`));
        delete m.images[folder];
        activeFolder = newFolder;
        renderFolderBar();
        renderContent();
      } else {
        const j = await res.json().catch(() => ({}));
        status.textContent = j.error || 'Error ' + res.status;
        status.style.color = '#f87171';
        okBtn.disabled = cancelBtn.disabled = false;
      }
    } catch (err) {
      status.textContent = err.message || 'Network error';
      status.style.color = '#f87171';
      okBtn.disabled = cancelBtn.disabled = false;
    }
  });
}

    <input type="url" id="nt-url" placeholder="https://…" style="width:100%;padding:.4rem .6rem;border-radius:6px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:.85rem;margin-bottom:.75rem;">
    <div style="display:flex;gap:.5rem;margin-top:.25rem;">
      <button id="nt-submit" style="flex:1;padding:.4rem;border-radius:6px;background:#3b82f6;color:#fff;border:none;cursor:pointer;">Create</button>
      <button id="nt-cancel" style="flex:1;padding:.4rem;border-radius:6px;background:#374151;color:#d1d5db;border:none;cursor:pointer;">Cancel</button>
    </div>
    <div id="nt-status" style="font-size:.78rem;min-height:1.2em;margin-top:.4rem;"></div>
  `;

  overlay.appendChild(box);
  document.body.appendChild(overlay);

  box.querySelector('#nt-cancel').addEventListener('click', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  attachSanitize(box.querySelector('#nt-name'), sanitizeSlug);
  attachSanitize(box.querySelector('#nt-filename'), sanitizeFilename);

  box.querySelector('#nt-submit').addEventListener('click', async () => {
    const name = box.querySelector('#nt-name').value.trim().replace(/^T_/, '');
    const filename = box.querySelector('#nt-filename').value.trim();
    const url = box.querySelector('#nt-url').value.trim();
    const status = box.querySelector('#nt-status');
    if (!name || !filename || !url) { setStatus(status, 'err', 'All fields required.'); return; }
    const folder = 'T_' + name;
    setStatus(status, '', 'Creating…');
    try {
      const res = await adminPost('save-image', {
        game: activeGame.id, folder, filename, imageUrl: url,
      });
      if (!res) { setStatus(status, '', ''); return; }
      if (res.ok) {
        const m = gameData[activeGame.id].manifest;
        if (!m.folders.includes(folder)) m.folders.push(folder);
        if (!m.images) m.images = {};
        if (!m.images[folder]) m.images[folder] = [];
        const path = `_Resources/_imgSource/${folder}/${filename}`;
        m.images[folder].push(path);
        activeFolder = folder;
        overlay.remove();
        renderFolderBar();
        renderContent();
      } else {
        const j = await res.json().catch(() => ({}));
        setStatus(status, 'err', j.error || 'Error ' + res.status);
      }
    } catch (err) {
      setStatus(status, 'err', err.message || 'Network error');
    }
  });
}

// ─── Detail Panel ─────────────────────────────────────────────────────────────

const dpThumb = document.getElementById('dp-thumb');
const dpFilename = document.getElementById('dp-filename');
const dpSub = document.getElementById('dp-sub');
const dpUrlInput = document.getElementById('dp-url-input');

const dpWikiInput = document.getElementById('dp-wiki-input');
const dpWikiBtn = document.getElementById('dp-wiki-btn');
const dpGoogleBtn = document.getElementById('dp-google-btn');
const dpWikiResults = document.getElementById('dp-wiki-results');
const dpRemoveBtn = document.getElementById('dp-remove-btn');
const dpRemoveStatus = document.getElementById('dp-remove-status');
const dpDisplayNameSection = document.getElementById('dp-displayname-section');

function openDetail(ctx) {
  detailContext = ctx;
  dpUrlInput.value = '';
  dpWikiInput.value = '';
  dpWikiResults.innerHTML = '';
  setStatus(dpSaveStatus, '', '');
  setStatus(dpRemoveStatus, '', '');
  setStatus(dpDisplayNameStatus, '', '');
  dpDisplayNameInput.value = '';

  const hint = document.getElementById('dp-displayname-hint');
  dpDisplayNameSection.style.display = '';
  if (ctx.type === 'manifest') {
    hint.textContent = '(optional — shown to learners; leave blank to use the filename)';
    dpDisplayNameInput.placeholder = 'e.g. On  (multiple files like on-squirrel.svg, on-book.svg can share this label)';
    const manifest = gameData[ctx.gameId]?.manifest;
    dpDisplayNameInput.value = manifest?.displayNames?.[ctx.path] || '';
  } else if (ctx.type === 'ffc') {
    hint.textContent = '(item label shown to learners)';
    dpDisplayNameInput.placeholder = 'e.g. Pencil';
    dpDisplayNameInput.value = ctx.item.label;
  } else if (ctx.type === 'fpg') {
    hint.textContent = '(person\'s name shown to learners)';
    dpDisplayNameInput.placeholder = 'e.g. Albert Einstein';
    dpDisplayNameInput.value = ctx.person.name;
  }

  if (ctx.type === 'ffc') {
    const it = ctx.item;
    dpThumb.src = '../../FFCGame/FFCGame/_Resources/_imgSource/items/' + it.img;
    dpFilename.textContent = it.label;
    dpSub.textContent = 'id: ' + it.id + '  |  groups: ' + (it.groups || []).join(', ');
    dpWikiInput.value = it.label;
  } else if (ctx.type === 'fpg') {
    const p = ctx.person;
    const isCDN = p.img && p.img.startsWith('https://');
    dpThumb.src = isCDN ? p.img : '../../FamousPersonGame/' + p.img;
    dpFilename.textContent = p.name;
    dpSub.textContent = [p.years, p.emoji, p.tag].filter(Boolean).join(' · ');
    dpWikiInput.value = p.name;
  } else {
    dpThumb.src = '../../' + ctx.gameId + '/' + ctx.gameId + '/' + ctx.path;
    const filename = ctx.path.split('/').pop();
    dpFilename.textContent = filename;
    dpSub.textContent = ctx.path;
    dpWikiInput.value = filename.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
  }

  detailPanel.classList.add('open');
}

function closeDetail() {
  detailPanel.classList.remove('open');
  detailContext = null;
}

// Save
dpSaveBtn.addEventListener('click', async () => {
  if (!detailContext) return;
  const ctx = detailContext;
  const url = dpUrlInput.value.trim();
  if (!url) { setStatus(dpSaveStatus, 'err', 'Enter a URL.'); return; }
  setStatus(dpSaveStatus, '', 'Saving…');

  let body;
  let endpoint = 'save-image';
  if (ctx.type === 'ffc') {
    body = { id: ctx.item.id, filename: ctx.item.img, imageUrl: url };
    endpoint = 'ffc-save-image';
  } else if (ctx.type === 'fpg') {
    const p = ctx.person;
    body = { game: 'FamousPersonGame', folder: 'images', filename: p.img.split('/').pop(), imageUrl: url, personName: p.name };
  } else {
    const filename = ctx.path.split('/').pop();
    body = { game: ctx.gameId, folder: ctx.folder, filename, imageUrl: url };
  }

  try {
    const res = await adminPost(endpoint, body);
    if (detailContext !== ctx) return;
    if (!res) { setStatus(dpSaveStatus, '', ''); return; }
    if (res.ok) {
      const j = await res.json().catch(() => ({}));
      if (ctx.type === 'ffc' && j.localPath) {
        ctx.item.img = j.localPath.split('/').pop();
        dpThumb.src = '../../FFCGame/FFCGame/_Resources/_imgSource/items/' + ctx.item.img;
        const d = gameData['FFCGame'].ffcData;
        const saveRes = await adminPost('ffc-save-items', { items: d });
        setStatus(dpSaveStatus, saveRes && saveRes.ok ? 'ok' : 'err',
          saveRes && saveRes.ok ? 'Saved!' : 'Image saved but record update failed');
      } else {
        dpThumb.src = url;
        if (ctx.type === 'fpg' && j.localPath) ctx.person.img = j.localPath;
        setStatus(dpSaveStatus, 'ok', 'Saved!');
      }
    } else {
      const j = await res.json().catch(() => ({}));
      setStatus(dpSaveStatus, 'err', j.error || 'Error ' + res.status);
    }
  } catch (err) {
    setStatus(dpSaveStatus, 'err', err.message || 'Network error');
  }
});

// ─── Shared Wikimedia search ──────────────────────────────────────────────────

async function runWikiSearch(query, urlInput, resultsEl, onSelect) {
  if (!query) return;
  resultsEl.innerHTML = '<span style="font-size:.8rem;color:#64748b">Searching…</span>';
  try {
    const searchUrl = `https://commons.wikimedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&srnamespace=6&srlimit=6&format=json&origin=*`;
    const hits = ((await (await fetch(searchUrl)).json()).query || {}).search || [];
    if (!hits.length) { resultsEl.innerHTML = '<span style="font-size:.8rem;color:#64748b">No results.</span>'; return; }
    const titles = hits.slice(0, 6).map(h => h.title).join('|');
    const infoUrl = `https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(titles)}&prop=imageinfo&iiprop=url&iiurlwidth=400&format=json&origin=*`;
    const pages = Object.values(((await (await fetch(infoUrl)).json()).query || {}).pages || {});
    resultsEl.innerHTML = '';
    let count = 0;
    pages.forEach(page => {
      if (count >= 3) return;
      const ii = page.imageinfo && page.imageinfo[0];
      if (!ii) return;
      count++;
      const card = document.createElement('div');
      card.className = 'wiki-result';
      const img = document.createElement('img');
      img.src = ii.thumburl || ii.url;
      img.alt = page.title;
      const lbl = document.createElement('span');
      lbl.textContent = page.title.replace('File:', '');
      card.appendChild(img);
      card.appendChild(lbl);
      card.addEventListener('click', () => { urlInput.value = ii.url; if (onSelect) onSelect(); });
      resultsEl.appendChild(card);
    });
    if (!count) resultsEl.innerHTML = '<span style="font-size:.8rem;color:#64748b">No images found.</span>';
  } catch (e) {
    resultsEl.innerHTML = '<span style="font-size:.8rem;color:#f87171">Search failed.</span>';
  }
}

dpDisplayNameSaveBtn.addEventListener('click', async () => {
  if (!detailContext) return;
  const ctx = detailContext;
  const displayName = dpDisplayNameInput.value.trim();
  setStatus(dpDisplayNameStatus, '', 'Saving…');
  try {
    let res;

      res = await adminPost('save-display-name', { game: ctx.gameId, localPath: ctx.path, displayName });

      if (!res) { setStatus(dpDisplayNameStatus, '', ''); return; }
      if (res.ok) {
        const manifest = gameData[ctx.gameId]?.manifest;
        if (manifest) {
          if (!manifest.displayNames) manifest.displayNames = {};
          if (displayName) manifest.displayNames[ctx.path] = displayName;
          else delete manifest.displayNames[ctx.path];

        setStatus(dpDisplayNameStatus, 'ok', displayName ? 'Saved.' : 'Cleared.');
      } else {
        const j = await res.json().catch(() => ({}));
        setStatus(dpDisplayNameStatus, 'err', j.error || 'Error ' + res.status);
      }
    } else if (ctx.type === 'ffc') {
      if (!displayName) { setStatus(dpDisplayNameStatus, 'err', 'Label cannot be empty.'); return; }
      res = await adminPost('save-display-name', { game: 'FFCGame', itemId: ctx.item.id, displayName });
      if (detailContext !== ctx) return;
      if (!res) { setStatus(dpDisplayNameStatus, '', ''); return; }
      if (res.ok) {
        ctx.item.label = displayName;
        dpFilename.textContent = displayName;
        setStatus(dpDisplayNameStatus, 'ok', 'Saved.');
      } else {
        const j = await res.json().catch(() => ({}));
        setStatus(dpDisplayNameStatus, 'err', j.error || 'Error ' + res.status);
      }
    } else if (ctx.type === 'fpg') {
      if (!displayName) { setStatus(dpDisplayNameStatus, 'err', 'Name cannot be empty.'); return; }
      const oldName = ctx.person.name;
      res = await adminPost('save-display-name', { game: 'FamousPersonGame', personName: oldName, displayName });
      if (detailContext !== ctx) return;
      if (!res) { setStatus(dpDisplayNameStatus, '', ''); return; }
      if (res.ok) {
        ctx.person.name = displayName;
        dpFilename.textContent = displayName;
        setStatus(dpDisplayNameStatus, 'ok', 'Saved.');
      } else {
        const j = await res.json().catch(() => ({}));
        setStatus(dpDisplayNameStatus, 'err', j.error || 'Error ' + res.status);
      }
    }
  } catch (err) {
    setStatus(dpDisplayNameStatus, 'err', err.message || 'Network error');

dpGoogleBtn.addEventListener('click', () => {

// Remove
dpRemoveBtn.addEventListener('click', async () => {
  if (!detailContext) return;
  if (!confirm('Remove this image? This cannot be undone.')) return;

  if (detailContext.type === 'ffc') {
    const it = detailContext.item;
    const d  = gameData['FFCGame'].ffcData;
    setStatus(dpRemoveStatus, '', 'Removing…');
    try {
      // Remove image file
      const imgRes = await adminPost('ffc-remove-image', { localPath: '_Resources/_imgSource/items/' + it.img });
      // Remove item record regardless of image result
      d.items = d.items.filter(i => i.id !== it.id);
      const itemsRes = await adminPost('ffc-save-items', { items: d });
      if (!itemsRes) { setStatus(dpRemoveStatus, '', ''); return; }
      if (itemsRes.ok) {
        setStatus(dpRemoveStatus, 'ok', 'Removed.');
        const grid = document.getElementById('image-grid');
        if (grid) {
          grid.querySelectorAll('.img-card').forEach(card => {
            if (card.querySelector('img')?.alt === it.label) card.remove();
          });
        }
        setTimeout(closeDetail, 800);
      } else {
        const j = await itemsRes.json().catch(() => ({}));
        setStatus(dpRemoveStatus, 'err', j.error || 'Error ' + itemsRes.status);
      }
    } catch (err) {
      setStatus(dpRemoveStatus, 'err', err.message || 'Network error');
    }
    return;
  }

  let body;
  if (detailContext.type === 'fpg') {
    const p = detailContext.person;
    body = { game: 'FamousPersonGame', folder: 'images', filename: p.img.split('/').pop(), personName: p.name };
  } else {
    body = { game: detailContext.gameId, folder: detailContext.folder, filename: detailContext.path.split('/').pop() };
  }

  try {
    const res = await adminPost('remove-image', body);
    if (!res) { setStatus(dpRemoveStatus, '', ''); return; }
    if (res.ok) {
      setStatus(dpRemoveStatus, 'ok', 'Removed.');
      const grid = document.getElementById('image-grid');
      if (grid) {
        const cards = grid.querySelectorAll('.img-card');
        cards.forEach(card => {
          const img = card.querySelector('img');
          if (img && (img.src === dpThumb.src || img.alt === dpFilename.textContent)) {
            card.remove();
          }
        });
      }
      setTimeout(closeDetail, 800);
    } else {
      const j = await res.json().catch(() => ({}));
      setStatus(dpRemoveStatus, 'err', j.error || 'Error ' + res.status);
    }
  } catch (err) {
    setStatus(dpRemoveStatus, 'err', err.message || 'Network error');
  }
});

// ─── Utilities ────────────────────────────────────────────────────────────────

function setStatus(el, type, msg) {
  el.className = 'status-msg' + (type ? ' ' + type : '');
  el.textContent = msg;
}

function nameToSlug(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

function sanitizeFilename(val) {
  return val.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9.\-]/g, '').replace(/-{2,}/g, '-');
}

function sanitizeSlug(val) {
  return val.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-]/g, '').replace(/-{2,}/g, '-');
}

function attachSanitize(input, fn) {
  input.addEventListener('input', () => {
    const pos = input.selectionStart;
    const clean = fn(input.value);
    if (clean !== input.value) { input.value = clean; input.setSelectionRange(pos, pos); }
  });
}

// ─── Duplicate detection ─────────────────────────────────────────────────────

function getManifestFilenames(folder) {
  const paths = gameData[activeGame.id]?.manifest?.images?.[folder] || [];
  return paths.map(p => p.split('/').pop());
}

function getFFCFilenames() {
  return (gameData['FFCGame']?.ffcData?.items || []).map(i => i.img);
}

function getFPGNames() {
  return (gameData['FamousPersonGame']?.fpgPeople || []).map(p => p.name);
}

function incrementName(name, existing) {
  const dot  = name.lastIndexOf('.');
  const base = dot >= 0 ? name.slice(0, dot) : name;
  const ext  = dot >= 0 ? name.slice(dot) : '';
  const clean = base.replace(/-(\d+)$/, '');
  let n = 2;
  while (existing.includes(`${clean}-${n}${ext}`)) n++;
  return `${clean}-${n}${ext}`;
}

// Returns a Promise that resolves to:
//   { action: 'rename', newName: string }
//   { action: 'overwrite' }
//   { action: 'keep-both', newName: string }
//   { action: 'cancel' }
function showDuplicateModal(name, existingNames, isPersonName = false) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'dup-overlay';

    const autoName = incrementName(name, existingNames);
    const itemWord = isPersonName ? 'name' : 'filename';

    const box = document.createElement('div');
    box.className = 'dup-box';
    box.innerHTML = `
      <h3>Duplicate ${itemWord}</h3>
      <p><strong style="color:#fde68a;">${escapeHtml(name)}</strong> already exists${isPersonName ? '' : ' in this folder'}. Choose how to proceed:</p>
      <div class="dup-rename-row">
        <label>Rename to:</label>
        <input type="text" id="dup-rename-input" value="${escapeHtml(name)}">
      </div>
      <div class="dup-actions">
        <button class="btn-sm btn-blue" id="dup-rename-btn">Rename</button>
        <button class="btn-sm btn-gray" id="dup-overwrite-btn">Overwrite</button>
        <button class="btn-sm btn-amber" id="dup-keepboth-btn">Keep Both <span style="color:#94a3b8;font-size:.75em;">(→ ${escapeHtml(autoName)})</span></button>
        <button class="btn-sm btn-gray" id="dup-cancel-btn">Cancel</button>
      </div>
    `;

    overlay.appendChild(box);
    document.body.appendChild(overlay);

    const input = box.querySelector('#dup-rename-input');
    if (!isPersonName) attachSanitize(input, sanitizeFilename);
    input.focus();
    input.select();

    function close(result) { overlay.remove(); resolve(result); }

    box.querySelector('#dup-rename-btn').addEventListener('click', () => {
      const v = input.value.trim();
      if (!v || v === name) return;
      close({ action: 'rename', newName: v });
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') box.querySelector('#dup-rename-btn').click();
      if (e.key === 'Escape') close({ action: 'cancel' });
    });
    box.querySelector('#dup-overwrite-btn').addEventListener('click', () => close({ action: 'overwrite' }));
    box.querySelector('#dup-keepboth-btn').addEventListener('click', () => close({ action: 'keep-both', newName: autoName }));
    box.querySelector('#dup-cancel-btn').addEventListener('click', () => close({ action: 'cancel' }));
    overlay.addEventListener('click', e => { if (e.target === overlay) close({ action: 'cancel' }); });
  });
}
