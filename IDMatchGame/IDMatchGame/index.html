<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="version" content="1.0">
  <title>Identical Matching Game v1.0</title>
  <!--
    IMPORTANT: This app discovers images by fetching directory listings.
    You must serve it via a local HTTP server that returns directory listings, e.g.:
      python3 -m http.server 8000
    Opening index.html as a file:// URL will NOT work for image discovery.
  -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────── -->
  <header id="app-header">
    <a href="../../index.html" id="btn-back" title="Back to Games">← Games</a>
    <h1>Matching Game</h1>
    <div id="timer-section">
      <span id="timer-display">00:00</span>
      <button id="btn-timer-toggle" class="btn-timer" title="Pause / Resume">Pause</button>
      <button id="btn-timer-reset"  class="btn-timer" title="Reset timer">Reset</button>
    </div>
  </header>

  <!-- ── Settings bar ─────────────────────────────────────────────── -->
  <div id="settings-bar">
    <div class="setting-group">
      <label for="sel-topic">Topic</label>
      <select id="sel-topic">
        <option value="">-- scanning --</option>
      </select>
    </div>

    <div class="setting-group">
      <label for="inp-size">Array Size</label>
      <input type="number" id="inp-size" min="1" max="10" value="4">
    </div>

    <div class="setting-group">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-cross">
        Non-category distractors
      </label>
    </div>

    <div class="setting-group">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-persists">
        Prompt persists
      </label>
    </div>

    <div class="setting-group">
      <label for="sel-prompt-style">Prompt style</label>
      <select id="sel-prompt-style">
        <option value="sparkle">Sparkle</option>
        <option value="outline">Outline</option>
      </select>
      <button id="btn-prompt" class="btn-prompt" hidden>Prompt</button>
    </div>

    <div class="setting-group">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-auto-prompt">
        Auto-Prompt
      </label>
    </div>

    <div class="setting-group">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-prompt-delay" disabled>
        Prompt Delay
      </label>
      <select id="sel-prompt-delay" disabled>
        <option value="1">1s</option>
        <option value="2">2s</option>
        <option value="3" selected>3s</option>
        <option value="4">4s</option>
        <option value="5">5s</option>
        <option value="10">10s</option>
      </select>
    </div>

    <button id="btn-start" class="btn-primary">Start</button>
  </div>

  <!-- ── Game area (hidden until Start) ───────────────────────────── -->
  <main id="game-area" hidden>

    <section id="sample-section">
      <div class="area-label">Sample</div>
      <div id="sample-card">
        <img id="sample-img" src="" alt="Sample stimulus">
      </div>
    </section>

    <section id="comp-section">
      <div class="area-label">Choose the match</div>
      <div id="comp-grid"></div>
    </section>

  </main>

  <!-- ── Bottom controls ──────────────────────────────────────────── -->
  <div id="bottom-bar">
    <button id="btn-print"      class="btn-print btn-icon" title="Print data" aria-label="Print data">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M18 8H6c-1.66 0-3 1.34-3 3v6h4v4h10v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H9v-5h6v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>
      </svg>
    </button>
    <button id="btn-clear-data" class="btn-clear-data btn-icon" title="Clear data" aria-label="Clear data">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
      </svg>
    </button>
  </div>

  <!-- ── Print-only section ───────────────────────────────────────── -->
  <div id="print-section">
    <div id="print-header">
      <h2>Matching Game &mdash; Session Results</h2>
      <div id="print-meta"></div>
    </div>
    <table id="results-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Topic</th>
          <th>Sample</th>
          <th>Array Size</th>
          <th>Errors</th>
          <th>Prompted</th>
          <th>Delay (s)</th>
          <th>Time (s)</th>
          <th>Outcome</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
    <div id="print-summary"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
