<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Master — nooutco.me</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Inter, -apple-system, sans-serif;
      background: var(--bg, #eaeee7);
      min-height: 100vh;
      padding: 32px 20px;
      color: #2d3a1f;
    }

    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 9px 18px;
      border: 1.5px solid #b8cfa0;
      border-radius: 10px;
      background: transparent;
      color: #374528;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .nav-back:hover { background: #dde8d4; }

    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1a1f14;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 14px;
      color: #7a9460;
      margin-bottom: 28px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 540px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      background: #fff;
      border-radius: 14px;
      border: 1px solid #d4e0c4;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: #7a9460;
      box-shadow: 0 4px 16px rgba(55,69,40,0.09);
    }

    .card-icon {
      font-size: 42px;
      line-height: 1;
      flex-shrink: 0;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #7a9460;
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a1f14;
      margin-bottom: 3px;
    }
    .card-desc {
      font-size: 13px;
      color: #5a6b4a;
      line-height: 1.4;
    }

    /* Password gate */
    #gate {
      max-width: 360px;
      background: #fff;
      border: 1px solid #d4e0c4;
      border-radius: 14px;
      padding: 32px 28px;
    }
    #gate h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1f14;
    }
    #gate p {
      font-size: 13px;
      color: #7a9460;
      margin-bottom: 20px;
    }
    #gate input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d4e0c4;
      border-radius: 9px;
      font-size: 15px;
      outline: none;
      margin-bottom: 12px;
    }
    #gate input:focus { border-color: #7a9460; }
    #gate button {
      width: 100%;
      padding: 11px;
      background: #374528;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    #gate button:hover { background: #2a3620; }
    #gate-error {
      font-size: 13px;
      color: #c0392b;
      margin-top: 8px;
      min-height: 18px;
    }
  </style>
</head>
<body>

  <div class="nav-row">
    <a class="nav-back" href="../">← Games</a>
  </div>

  <!-- Password gate (hidden once authed) -->
  <div id="gate">
    <h2>Game Master</h2>
    <p>Enter the admin password to continue.</p>
    <input type="password" id="gate-pw" placeholder="Password" autocomplete="current-password">
    <button id="gate-btn">Unlock</button>
    <div id="gate-error"></div>
  </div>

  <!-- Main content (hidden until authed) -->
  <div id="main" hidden>
    <h1>Game Master</h1>
    <p class="subtitle">Manage game content and settings:</p>

    <div class="list">

      <a class="card" href="../AdminTools/ImageManager/">
        <div class="card-icon">🖼️</div>
        <div>
          <div class="card-label">Asset Management</div>
          <div class="card-title">Image Manager</div>
          <div class="card-desc">Add, replace, or remove images for all games</div>
        </div>
      </a>

      <a class="card" href="../AdminTools/FFCGManager/">
        <div class="card-icon">🏷️</div>
        <div>
          <div class="card-label">FFC Game Content</div>
          <div class="card-title">FFC Manager</div>
          <div class="card-desc">Manage groups, features, functions, classes, and item tags</div>
        </div>
      </a>

    </div>
  </div>

  <script>
    const bgs = [
      '#eaeee7','#e8eef4','#f4eae8','#eee8f4',
      '#f4f0e8','#e8f4ee','#f4ece8','#eaf0f4',
      '#f0f4e8','#f4e8f0',
    ];
    document.documentElement.style.setProperty('--bg', bgs[Math.floor(Math.random() * bgs.length)]);

    const TOKEN_KEY = 'adminToken';

    function unlock() {
      const main = document.getElementById('main');
      const gate = document.getElementById('gate');
      main.removeAttribute('hidden');
      gate.setAttribute('hidden', '');
    }

    const storedToken = sessionStorage.getItem(TOKEN_KEY);
    if (storedToken) {
      (async () => {
        try {
          const res = await fetch('../api/admin/ping', {
            method: 'POST',
            headers: { Authorization: `Bearer ${storedToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({}),
          });
          if (res.ok) {
            unlock();
          } else if (res.status === 401) {
            sessionStorage.removeItem(TOKEN_KEY);
            document.getElementById('gate-error').textContent = 'Session expired — re-enter password.';
          }
        } catch {
          document.getElementById('gate-error').textContent = 'Could not reach server.';
        }
      })();
    }

    document.getElementById('gate-btn').addEventListener('click', async () => {
      const pwInput = document.getElementById('gate-pw');
      const pw      = pwInput.value.trim();
      const errEl   = document.getElementById('gate-error');
      errEl.textContent = '';
      if (!pw) { errEl.textContent = 'Enter a password.'; return; }

      try {
        const res = await fetch('../api/admin/ping', {
          method: 'POST',
          headers: { Authorization: `Bearer ${pw}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({}),
        });
        if (res.ok) {
          sessionStorage.setItem(TOKEN_KEY, pw);
          unlock();
        } else if (res.status === 401) {
          errEl.textContent = 'Incorrect password.';
          pwInput.value = '';
          pwInput.focus();
        } else {
          errEl.textContent = 'Could not reach server.';
          pwInput.value = '';
        }
      } catch {
        errEl.textContent = 'Could not reach server.';
        pwInput.value = '';
      }
    });

    document.getElementById('gate-pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('gate-btn').click();
    });
  </script>
</body>
</html>
