<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Master — nooutco.me</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Inter, -apple-system, sans-serif;
      background: var(--bg, #eaeee7);
      min-height: 100vh;
      padding: 32px 20px;
      color: #2d3a1f;
    }

    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 9px 18px;
      border: 1.5px solid #b8cfa0;
      border-radius: 10px;
      background: transparent;
      color: #374528;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .nav-back:hover { background: #dde8d4; }

    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1a1f14;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 14px;
      color: #7a9460;
      margin-bottom: 28px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 540px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      background: #fff;
      border-radius: 14px;
      border: 1px solid #d4e0c4;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: #7a9460;
      box-shadow: 0 4px 16px rgba(55,69,40,0.09);
    }

    .card-icon {
      font-size: 42px;
      line-height: 1;
      flex-shrink: 0;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #7a9460;
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a1f14;
      margin-bottom: 3px;
    }
    .card-desc {
      font-size: 13px;
      color: #5a6b4a;
      line-height: 1.4;
    }

    /* Gear button + admin modal */
    .admin-gear {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
      font-size: 1.5rem; background: none; border: none; cursor: pointer;
      opacity: 0.35; transition: opacity 0.15s; padding: 0; line-height: 1;
    }
    .admin-gear:hover { opacity: 0.75; }
    .admin-gear.authed { opacity: 1; filter: sepia(1) saturate(3) hue-rotate(80deg); }
    #admin-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 10000;
      align-items: center; justify-content: center;
    }
    #admin-modal.open { display: flex; }
    .admin-modal-box {
      background: #fff; border: 1px solid #d4e0c4; border-radius: 14px;
      padding: 28px; width: 320px;
    }
    .admin-modal-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: #1a1f14; }
    .admin-modal-box p  { font-size: 13px; color: #7a9460; margin-bottom: 20px; }
    .admin-modal-box input {
      width: 100%; padding: 10px 14px; border: 1.5px solid #d4e0c4;
      border-radius: 9px; font-size: 15px; outline: none; margin-bottom: 12px;
      font-family: inherit;
    }
    .admin-modal-box input:focus { border-color: #7a9460; }
    .admin-modal-box .unlock-btn {
      width: 100%; padding: 11px; background: #374528; color: #fff;
      border: none; border-radius: 9px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .admin-modal-box .unlock-btn:hover { background: #2a3620; }
    #admin-pw-error { font-size: 13px; color: #c0392b; margin-top: 8px; min-height: 18px; }
  </style>
</head>
<body>

  <div class="nav-row">
    <a class="nav-back" href="../">← Games</a>
  </div>

  <button class="admin-gear" id="admin-gear" title="Admin">⚙️</button>
  <div id="admin-modal">
    <div class="admin-modal-box">
      <h2>Game Master</h2>
      <p>Enter the admin password to continue.</p>
      <input type="password" id="admin-pw-input" placeholder="Password" autocomplete="current-password">
      <button class="unlock-btn" id="admin-unlock-btn">Unlock</button>
      <div id="admin-pw-error"></div>
    </div>
  </div>

  <!-- Main content (hidden until authed) -->
  <div id="main" hidden>
    <h1>Game Master</h1>
    <p class="subtitle">Manage game content and settings:</p>

    <div class="list">

      <a class="card" href="../AdminTools/ImageManager/">
        <div class="card-icon">🖼️</div>
        <div>
          <div class="card-label">Asset Management</div>
          <div class="card-title">Image Manager</div>
          <div class="card-desc">Add, replace, or remove images for all games</div>
        </div>
      </a>

      <a class="card" href="../AdminTools/FFCGManager/">
        <div class="card-icon">🏷️</div>
        <div>
          <div class="card-label">FFC Game Content</div>
          <div class="card-title">FFC Manager</div>
          <div class="card-desc">Manage groups, features, functions, classes, and item tags</div>
        </div>
      </a>

    </div>
  </div>

  <script>
    const bgs = [
      '#eaeee7','#e8eef4','#f4eae8','#eee8f4',
      '#f4f0e8','#e8f4ee','#f4ece8','#eaf0f4',
      '#f0f4e8','#f4e8f0',
    ];
    document.documentElement.style.setProperty('--bg', bgs[Math.floor(Math.random() * bgs.length)]);

    const ADMIN_SECRET_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918";

    const adminGear    = document.getElementById('admin-gear');
    const adminModal   = document.getElementById('admin-modal');
    const adminPwInput = document.getElementById('admin-pw-input');
    const adminPwError = document.getElementById('admin-pw-error');

    let token = localStorage.getItem('admin_token') || '';

    function setGearAuthed(authed) { adminGear.classList.toggle('authed', authed); }

    function revealApp() { document.getElementById('main').removeAttribute('hidden'); }

    if (token) {
      setGearAuthed(true);
      revealApp();
    } else {
      adminModal.classList.add('open');
      setTimeout(() => adminPwInput.focus(), 50);
    }

    adminGear.addEventListener('click', () => {
      adminModal.classList.toggle('open');
      if (adminModal.classList.contains('open')) {
        adminPwInput.value = '';
        adminPwError.textContent = '';
        setTimeout(() => adminPwInput.focus(), 50);
      }
    });
    adminModal.addEventListener('click', e => { if (e.target === adminModal) adminModal.classList.remove('open'); });

    async function sha256Hex(str) {
      const buf    = new TextEncoder().encode(str);
      const digest = await crypto.subtle.digest('SHA-256', buf);
      return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function adminUnlock() {
      const pw = adminPwInput.value;
      if (!pw) { adminPwError.textContent = 'Enter a password.'; return; }
      const hash = await sha256Hex(pw);
      if (hash === ADMIN_SECRET_HASH) {
        token = hash;
        localStorage.setItem('admin_token', hash);
        setGearAuthed(true);
        adminModal.classList.remove('open');
        revealApp();
      } else {
        adminPwError.textContent = 'Incorrect password.';
        adminPwInput.value = '';
        adminPwInput.focus();
      }
    }

    document.getElementById('admin-unlock-btn').addEventListener('click', adminUnlock);
    adminPwInput.addEventListener('keydown', e => { if (e.key === 'Enter') adminUnlock(); });
  </script>
</body>
</html>
