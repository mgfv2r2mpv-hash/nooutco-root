<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Master — nooutco.me</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Inter, -apple-system, sans-serif;
      background: var(--bg, #eaeee7);
      min-height: 100vh;
      padding: 32px 20px;
      color: #2d3a1f;
    }

    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 9px 18px;
      border: 1.5px solid #b8cfa0;
      border-radius: 10px;
      background: transparent;
      color: #374528;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .nav-back:hover { background: #dde8d4; }

    .nav-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border: 1.5px solid #b8cfa0;
      border-radius: 10px;
      background: transparent;
      opacity: 0.45;
    }
    .nav-icon svg { width: 18px; height: 18px; fill: #5a6b4a; }

    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1a1f14;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 14px;
      color: #7a9460;
      margin-bottom: 28px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 540px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      background: #fff;
      border-radius: 14px;
      border: 1px solid #d4e0c4;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: #7a9460;
      box-shadow: 0 4px 16px rgba(55,69,40,0.09);
    }

    .card-icon {
      font-size: 42px;
      line-height: 1;
      flex-shrink: 0;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #7a9460;
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a1f14;
      margin-bottom: 3px;
    }
    .card-desc {
      font-size: 13px;
      color: #5a6b4a;
      line-height: 1.4;
    }

    /* Password gate */
    #gate {
      max-width: 360px;
      background: #fff;
      border: 1px solid #d4e0c4;
      border-radius: 14px;
      padding: 32px 28px;
    }
    #gate h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #1a1f14;
    }
    #gate p {
      font-size: 13px;
      color: #7a9460;
      margin-bottom: 20px;
    }
    #gate input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d4e0c4;
      border-radius: 9px;
      font-size: 15px;
      outline: none;
      margin-bottom: 12px;
    }
    #gate input:focus { border-color: #7a9460; }
    #gate button {
      width: 100%;
      padding: 11px;
      background: #374528;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    #gate button:hover { background: #2a3620; }
    #gate-error {
      font-size: 13px;
      color: #c0392b;
      margin-top: 8px;
      min-height: 18px;
    }
  </style>
</head>
<body>

  <div class="nav-row">
    <a class="nav-back" href="../">← Games</a>
    <span class="nav-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08s-.03-.74-.07-1.08l2.32-1.82a.55.55 0 0 0 .13-.71l-2.2-3.82a.55.55 0 0 0-.67-.24l-2.74 1.1c-.57-.44-1.18-.81-1.86-1.08l-.41-2.92A.544.544 0 0 0 14 2h-4c-.27 0-.5.19-.54.44l-.41 2.92c-.68.27-1.29.64-1.86 1.08L4.45 5.34a.55.55 0 0 0-.67.24L1.58 9.4a.54.54 0 0 0 .13.71l2.32 1.82c-.04.34-.07.69-.07 1.08s.03.74.07 1.08L1.71 15.9a.55.55 0 0 0-.13.71l2.2 3.82c.13.24.41.33.67.24l2.74-1.1c.57.44 1.18.81 1.86 1.08l.41 2.92c.04.25.27.44.54.44h4c.27 0 .5-.19.54-.44l.41-2.92c.68-.27 1.29-.64 1.86-1.08l2.74 1.1c.26.09.54 0 .67-.24l2.2-3.82a.54.54 0 0 0-.13-.71l-2.32-1.81z"/>
      </svg>
    </span>
  </div>

  <!-- Password gate (hidden once authed) -->
  <div id="gate">
    <h2>Game Master</h2>
    <p>Enter the admin password to continue.</p>
    <input type="password" id="gate-pw" placeholder="Password" autocomplete="current-password">
    <button id="gate-btn">Unlock</button>
    <div id="gate-error"></div>
  </div>

  <!-- Main content (hidden until authed) -->
  <div id="main" hidden>
    <h1>Game Master</h1>
    <p class="subtitle">Manage game content and settings:</p>

    <div class="list">

      <a class="card" href="../AdminTools/ImageManager/">
        <div class="card-icon">🖼️</div>
        <div>
          <div class="card-label">Asset Management</div>
          <div class="card-title">Image Manager</div>
          <div class="card-desc">Add, replace, or remove images for all games</div>
        </div>
      </a>

      <a class="card" href="../AdminTools/FFCGManager/">
        <div class="card-icon">🏷️</div>
        <div>
          <div class="card-label">FFC Game Content</div>
          <div class="card-title">FFC Manager</div>
          <div class="card-desc">Manage groups, features, functions, classes, and item tags</div>
        </div>
      </a>

    </div>
  </div>

  <script>
    const bgs = [
      '#eaeee7','#e8eef4','#f4eae8','#eee8f4',
      '#f4f0e8','#e8f4ee','#f4ece8','#eaf0f4',
      '#f0f4e8','#f4e8f0',
    ];
    document.documentElement.style.setProperty('--bg', bgs[Math.floor(Math.random() * bgs.length)]);

    const TOKEN_KEY = 'adminToken';

    function unlock() {
      const main = document.getElementById('main');
      const gate = document.getElementById('gate');
      main.removeAttribute('hidden');
      gate.setAttribute('hidden', '');
    }

    if (sessionStorage.getItem(TOKEN_KEY)) {
      unlock();
    }

    document.getElementById('gate-btn').addEventListener('click', async () => {
      const pw   = document.getElementById('gate-pw').value.trim();
      const errEl = document.getElementById('gate-error');
      errEl.textContent = '';
      if (!pw) { errEl.textContent = 'Enter a password.'; return; }

      try {
        const res = await fetch('../api/admin/ping', {
          method: 'POST',
          headers: { Authorization: `Bearer ${pw}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({}),
        });
        if (res.ok || res.status === 404) {
          sessionStorage.setItem(TOKEN_KEY, pw);
          unlock();
        } else {
          errEl.textContent = 'Incorrect password.';
        }
      } catch {
        errEl.textContent = 'Could not reach server.';
      }
    });

    document.getElementById('gate-pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('gate-btn').click();
    });
  </script>
</body>
</html>
