<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="version" content="1.0">
  <title>The Name Game v1.0</title>
  <!--
    IMPORTANT: This app discovers images by fetching directory listings.
    You must serve it via a local HTTP server that returns directory listings, e.g.:
      python3 -m http.server 8000
    Opening index.html as a file:// URL will NOT work for image discovery.
  -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────── -->
  <header id="app-header">
    <a href="../../index.html" id="btn-back" title="Back to Games">← Back</a>
    <h1>The Name Game</h1>
    <div id="timer-section">
      <span id="timer-display">00:00</span>
      <button id="btn-timer-toggle" class="btn-timer" title="Pause / Resume">Pause</button>
      <button id="btn-timer-reset"  class="btn-timer" title="Reset timer">Reset</button>
    </div>
  </header>

  <!-- ── Settings bar ─────────────────────────────────────────────── -->
  <div id="settings-bar">
    <div class="setting-group">
      <label for="sel-topic">Topic</label>
      <select id="sel-topic">
        <option value="">-- scanning --</option>
      </select>
    </div>

    <div class="setting-group setting-targets">
      <button type="button" id="btn-targets-toggle" class="btn-targets" aria-expanded="false">
        Targets <span id="targets-count" class="targets-count">0 of 0</span>
      </button>
    </div>

    <div class="setting-group">
      <label for="inp-size">Array Size</label>
      <input type="number" id="inp-size" min="1" max="10" value="4">
    </div>

    <div class="setting-group">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-cross">
        Non-category distractors
      </label>
    </div>

    <div class="setting-group">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-persists">
        Prompt persists
      </label>
    </div>

    <div class="setting-group">
      <label for="sel-prompt-style">Prompt style</label>
      <select id="sel-prompt-style">
        <option value="sparkle">Sparkle</option>
        <option value="outline">Outline</option>
      </select>
      <button id="btn-prompt" class="btn-prompt" hidden>Prompt</button>
    </div>

    <div class="setting-group">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-auto-prompt">
        Auto-Prompt
      </label>
    </div>

    <div class="setting-group">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-prompt-delay" disabled>
        Prompt Delay
      </label>
      <select id="sel-prompt-delay" disabled>
        <option value="1">1s</option>
        <option value="2">2s</option>
        <option value="3" selected>3s</option>
        <option value="4">4s</option>
        <option value="5">5s</option>
        <option value="10">10s</option>
      </select>
    </div>

    <button id="btn-start" class="btn-primary">Start</button>
  </div>

  <!-- ── Target picker panel (hidden until toggled) ───────────────── -->
  <section id="target-panel" hidden>
    <div class="target-panel-header">
      <span class="target-panel-title">Targets for <span id="target-panel-topic-label"></span></span>
      <div class="target-panel-actions">
        <button type="button" id="btn-targets-all">Select all</button>
        <button type="button" id="btn-targets-none">Deselect all</button>
        <button type="button" id="btn-targets-close" title="Close" class="btn-targets-close">×</button>
      </div>
    </div>
    <div id="target-panel-body" class="target-panel-body"></div>
  </section>

  <!-- ── Game area (hidden until Start) ───────────────────────────── -->
  <main id="game-area" hidden>

    <section id="sample-section">
      <div class="area-label">Find</div>
      <div id="sample-card">
        <div id="sample-word"></div>
      </div>
    </section>

    <section id="comp-section">
      <div class="area-label">Choose the picture</div>
      <div id="comp-grid"></div>
    </section>

  </main>

  <!-- ── Bottom controls ──────────────────────────────────────────── -->
  <div id="bottom-bar">
    <button id="btn-print"      class="btn-print">Print Data</button>
    <button id="btn-clear-data" class="btn-clear-data">Clear Data</button>
  </div>

  <!-- ── Print-only section ───────────────────────────────────────── -->
  <div id="print-section">
    <div id="print-header">
      <h2>Name Game &mdash; Session Results</h2>
      <div id="print-meta"></div>
    </div>
    <table id="results-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Topic</th>
          <th>Target Word</th>
          <th>Array Size</th>
          <th>Errors</th>
          <th>Prompted</th>
          <th>Delay (s)</th>
          <th>Time (s)</th>
          <th>Outcome</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
    <div id="print-summary"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
