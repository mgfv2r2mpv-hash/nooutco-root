<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="version" content="1.0">
  <title>Receptive Words Game v1.0</title>
  <!--
    IMPORTANT: This app discovers images by fetching directory listings.
    You must serve it via a local HTTP server that returns directory listings, e.g.:
      python3 -m http.server 8000
    Opening index.html as a file:// URL will NOT work for image discovery.
  -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────── -->
  <header id="app-header">
    <a href="../../index.html" id="btn-back" title="Back to Games">← Games</a>
    <h1>Receptive Words Game</h1>
    <div id="timer-section">
      <span id="timer-display">00:00</span>
      <button id="btn-timer-toggle" class="btn-timer" title="Pause / Resume">Pause</button>
      <button id="btn-timer-reset"  class="btn-timer" title="Reset timer">Reset</button>
    </div>
  </header>

  <!-- ── Settings bar ─────────────────────────────────────────────── -->
  <div id="settings-bar">
    <div class="setting-group">
      <label for="sel-topic">Topic<button type="button" class="help-btn" data-help="Choose the image category to use for this session.">?</button></label>
      <select id="sel-topic">
        <option value="">-- scanning --</option>
      </select>
    </div>

    <div class="setting-group">
      <label for="inp-size">Array Size<button type="button" class="help-btn" data-help="How many images appear in the choice array (1–10).">?</button></label>
      <input type="number" id="inp-size" min="1" max="10" value="4">
    </div>

    <div class="setting-group setting-targets">
      <button type="button" id="btn-targets-toggle" class="btn-targets" aria-expanded="false">
        Targets <span id="targets-count" class="targets-count">0 of 0</span>
        <button type="button" class="help-btn" data-help="Choose which images from the topic can appear as the target (correct answer).">?</button>
      </button>
    </div>

    <div class="setting-group setting-extra">
      <button type="button" id="btn-extra-toggle" class="btn-extra" aria-expanded="false">
        ⚙ Settings
        <button type="button" class="help-btn" data-help="Open additional game options.">?</button>
      </button>
    </div>

    <div class="setting-group">
      <button id="btn-prompt" class="btn-prompt" hidden>Prompt</button>
    </div>

    <button id="btn-start" class="btn-primary">Start</button>
  </div>

  <!-- ── Target picker panel (hidden until toggled) ───────────────── -->
  <section id="target-panel" hidden>
    <div class="target-panel-header">
      <span class="target-panel-title">Targets for <span id="target-panel-topic-label"></span></span>
      <div class="target-panel-actions">
        <button type="button" id="btn-targets-all">Select all</button>
        <button type="button" id="btn-targets-none">Deselect all</button>
        <button type="button" id="btn-targets-close" title="Close" class="btn-targets-close">×</button>
      </div>
    </div>
    <div id="target-panel-body" class="target-panel-body"></div>
  </section>

  <!-- ── Extra settings panel (hidden until toggled) ──────────────── -->
  <section id="extra-panel" hidden>
    <div class="extra-panel-header">
      <span class="extra-panel-title">Options</span>
      <button type="button" id="btn-extra-close" class="btn-extra-close" title="Close">×</button>
    </div>
    <div class="extra-panel-body">
      <label class="checkbox-label">
        <input type="checkbox" id="chk-represent-errors" checked>
        Re-Present Errors
        <button type="button" class="help-btn" data-help="After an incorrect response, the same target is repeated (with tiles reshuffled and a prompt applied) before moving on.">?</button>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-errorless">
        Errorless
        <button type="button" class="help-btn" data-help="The correct answer is highlighted immediately at the start of each trial so the client always responds correctly.">?</button>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-no-error-anim">
        No Incorrect Animation
        <button type="button" class="help-btn" data-help="Suppresses the shake/red animation when the client taps an incorrect image.">?</button>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-non-target-distractor" checked>
        Non-Target Category Distractors
        <button type="button" class="help-btn" data-help="When on, images in the topic that are NOT selected as targets can still appear as distractors. When off, only selected targets appear in the array.">?</button>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-cross">
        Non-category distractors
        <button type="button" class="help-btn" data-help="When on, distractors are drawn from ALL topics, not just the current one.">?</button>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-persists">
        Prompt persists
        <button type="button" class="help-btn" data-help="The prompt highlight stays visible for the whole trial instead of fading after a moment.">?</button>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" id="chk-auto-prompt">
        Auto-Prompt
        <button type="button" class="help-btn" data-help="Automatically applies a prompt at the start of every trial (or after a delay if Prompt Delay is on).">?</button>
      </label>
      <div class="extra-row">
        <label class="checkbox-label">
          <input type="checkbox" id="chk-prompt-delay" disabled>
          Prompt Delay
          <button type="button" class="help-btn" data-help="Wait the selected number of seconds before the auto-prompt appears.">?</button>
        </label>
        <select id="sel-prompt-delay" disabled>
          <option value="1">1s</option>
          <option value="2">2s</option>
          <option value="3" selected>3s</option>
          <option value="4">4s</option>
          <option value="5">5s</option>
          <option value="10">10s</option>
        </select>
      </div>
      <div class="extra-row">
        <label for="sel-prompt-style">Prompt style<button type="button" class="help-btn" data-help="Visual style used to highlight the correct answer when prompted.">?</button></label>
        <select id="sel-prompt-style">
          <option value="sparkle">Sparkle</option>
          <option value="outline">Outline</option>
        </select>
      </div>
    </div>
  </section>

  <!-- ── Game area (hidden until Start) ───────────────────────────── -->
  <main id="game-area" hidden>

    <section id="sample-section">
      <div class="area-label">Find</div>
      <div id="sample-card">
        <div id="sample-word"></div>
      </div>
    </section>

    <section id="comp-section">
      <div class="area-label">Choose the picture</div>
      <div id="comp-grid"></div>
    </section>

  </main>

  <!-- ── Bottom controls ──────────────────────────────────────────── -->
  <div id="bottom-bar">
    <button id="btn-print"      class="btn-print btn-icon" title="Print data" aria-label="Print data">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M18 8H6c-1.66 0-3 1.34-3 3v6h4v4h10v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H9v-5h6v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>
      </svg>
    </button>
    <button id="btn-clear-data" class="btn-clear-data btn-icon" title="Clear data" aria-label="Clear data">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/>
      </svg>
    </button>
  </div>

  <!-- ── Print-only section ───────────────────────────────────────── -->
  <div id="print-section">
    <div id="print-header">
      <h2>Receptive Words Game &mdash; Session Results</h2>
      <div id="print-meta"></div>
    </div>
    <table id="results-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Topic</th>
          <th>Target Word</th>
          <th>Array Size</th>
          <th>Errors</th>
          <th>Prompted</th>
          <th>Delay (s)</th>
          <th>Time (s)</th>
          <th>Outcome</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
    <div id="print-summary"></div>
  </div>

  <script src="../../tooltip-help.js"></script>
  <script src="game.js"></script>
  <script>
    const ADMIN_SECRET_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918";
    window.ADMIN_SECRET_HASH = ADMIN_SECRET_HASH;
  </script>
  <script src="../../admin-gear.js"></script>
</body>
</html>
