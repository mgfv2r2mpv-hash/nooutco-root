<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assessment Notes</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Inter, sans-serif;
      background: #f0f4ec;
      min-height: 100vh;
      padding: 32px 20px;
      color: #2d3a1f;
    }
    .info-tip {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin-left: 6px;
      vertical-align: middle;
    }
    .info-bubble {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      visibility: hidden;
      opacity: 0;
      background: #2d3a1f;
      color: white;
      padding: 9px 12px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 400;
      line-height: 1.55;
      width: 260px;
      text-align: left;
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.12s ease;
      white-space: normal;
      box-shadow: 0 4px 14px rgba(45, 58, 31, 0.18);
    }
    .info-bubble::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #2d3a1f;
    }
    .info-tip:hover .info-bubble,
    .info-tip:focus-within .info-bubble {
      visibility: visible;
      opacity: 1;
    }
    /* Output sections: responsive 2-up grid; any card can expand to a full row */
    .output-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
    .output-grid .full-row { grid-column: 1 / -1; }
    @media (max-width: 640px) { .output-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ─── Admin Auth ───────────────────────────────────────────
    // To change the admin password, replace ADMIN_SECRET_HASH below with the
    // SHA-256 hex digest of your new password. Default password: "admin".
    const ADMIN_SECRET_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918";
    async function sha256Hex(str) {
      const buf = new TextEncoder().encode(str);
      const digest = await crypto.subtle.digest("SHA-256", buf);
      return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, "0")).join("");
    }
    const hasAdminToken = () => localStorage.getItem("admin_token") === ADMIN_SECRET_HASH;

    const PROVIDERS = {
      gemini:    { label: "Gemini",    placeholder: "AIza...",    keyLabel: "Google AI Studio Key", hint: "Get key at aistudio.google.com",    keyPageUrl: "https://aistudio.google.com/app/apikey",          howToUrl: "https://aistudio.google.com",                          freeTier: true  },
      openai:    { label: "OpenAI",    placeholder: "sk-...",     keyLabel: "OpenAI API Key",       hint: "Get key at platform.openai.com",   keyPageUrl: "https://platform.openai.com/api-keys",             howToUrl: "https://platform.openai.com/docs/quickstart",          freeTier: false },
      anthropic: { label: "Anthropic", placeholder: "sk-ant-...", keyLabel: "Anthropic API Key",    hint: "Get key at console.anthropic.com", keyPageUrl: "https://console.anthropic.com/settings/keys",      howToUrl: "https://docs.anthropic.com/en/api/getting-started",    freeTier: false },
    };

    // Canonical option lists — both the menu the AI may choose from and the
    // strings the output checklist renders. They match the EHR form.
    const ACTIVITIES = [
      "Administration of assessment tool",
      "Caregiver/Guardian interview",
      "Functional Behavior Assessment",
      "Functional Analysis",
      "Client Observation",
      "Review results with parent",
    ];

    const REPORTING = [
      "Medical Record Review",
      "Analysis of past data",
      "Assessment Scoring / Interpretation of results",
      "Treatment plan / goal development",
      "Report Review and Edits",
    ];

    const GROUP_OPTIONS = { activities: ACTIVITIES, reporting: REPORTING };

    // Output render config — suggested checkboxes, then the narrative field.
    const FORM_SECTIONS = [
      { kind: "checklist", heading: "Activities Performed",                  group: "activities" },
      { kind: "checklist", heading: "Assessment Reporting Tasks",            group: "reporting" },
      { kind: "narrative", heading: "Brief Summary of Activities Completed", key: "narrative" },
    ];

    const menu = (arr) => arr.map(x => `"${x}"`).join(" | ");

    async function callProvider(provider, apiKey, systemPrompt, userPrompt) {
      const res = await fetch("/api/llm-call", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          provider,
          apiKey,
          systemPrompt,
          userPrompt,
          model: provider === "anthropic" ? "claude-haiku-4-5-20251001" : provider === "openai" ? "gpt-4o-mini" : "gemini-2.5-flash",
          maxTokens: 1400,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(`API error ${res.status}: ${err?.error || res.statusText}`);
      }

      const data = await res.json();
      let raw;
      if (provider === "anthropic") raw = data.content.map(b => b.text || "").join("");
      else if (provider === "openai") raw = data.choices[0].message.content;
      else raw = data.candidates[0].content.parts[0].text;

      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error("No JSON found in response. Try again.");
      return JSON.parse(match[0]);
    }

    function ApiKeyHelpBox({ provider }) {
      const prov = PROVIDERS[provider];
      return (
        <div style={{ marginTop: 10, background: "#f7fbf3", border: "1px solid #c0d4a8", borderRadius: 8, padding: "12px 16px", fontSize: 13, color: "#374528", lineHeight: 1.6 }}>
          <p style={{ fontWeight: 600, marginBottom: 5 }}>What is an API key?</p>
          <p style={{ marginBottom: 8 }}>An API key is like a personal access code that lets this tool connect directly to an AI service on your behalf — so you don't have to copy and paste. You create one on the AI provider's website; it stays in your browser and is never shared.</p>
          <p>
            <a href={prov.howToUrl} target="_blank" rel="noopener noreferrer" style={{ color: "#374528", fontWeight: 600 }}>How to get a {prov.label} API key →</a>
            {prov.freeTier && <span style={{ marginLeft: 10, background: "#d4edda", color: "#155724", padding: "2px 8px", borderRadius: 12, fontSize: 11, fontWeight: 700 }}>Free tier available</span>}
          </p>
        </div>
      );
    }

    function ApiErrorMessage({ error, rawError, provider, isAdmin, onGeneratePrompt }) {
      if (!error) return null;
      const isApiError = /API error \d{3}/i.test(error) || error === "NO_KEY";
      if (!isApiError) return <p style={{ color: "#c0392b", fontSize: 13, marginBottom: 12 }}>{error}</p>;

      const prov = PROVIDERS[provider];
      const statusMatch = error.match(/error (\d{3})/i);
      const status = statusMatch ? parseInt(statusMatch[1]) : null;

      let heading, body, actions, showOptions = false;
      if (error === "NO_KEY") {
        heading = "You'll need an API key to use direct generation.";
        body = "An API key is a free personal access code from the AI provider. Once you add it above, this tool connects directly and builds your note automatically.";
        actions = [{ href: prov.keyPageUrl, text: `Get your ${prov.label} API key →` }];
        if (!prov.freeTier) actions.push({ href: PROVIDERS.gemini.keyPageUrl, text: "Or try Gemini — it has a free tier →" });
      } else if (status === 401 || status === 403) {
        heading = "Your API key wasn't accepted.";
        body = "Double-check that you copied the full key exactly — even one missing character will cause this error. Keys can be regenerated on the provider's website if needed.";
        actions = [{ href: prov.keyPageUrl, text: `Review your ${prov.label} API keys →` }];
      } else if (status === 429) {
        heading = "The AI service is temporarily busy or you've hit a usage limit.";
        body = "This can happen if the service is under heavy load or you've used your free quota for today. Try again in a few minutes, or use one of the options below.";
        actions = []; showOptions = true;
      } else if (status === 402) {
        heading = "Your API account needs funds to continue.";
        body = "The AI service rejected the request because your account balance is too low. You can add credits, switch to a service with a free tier, or use Generate Prompt for free.";
        actions = []; showOptions = true;
      } else {
        heading = "Something went wrong generating your note.";
        body = "Check your API key and try again. If the problem continues, the service may be temporarily unavailable.";
        actions = [{ href: prov.keyPageUrl, text: `Check your ${prov.label} API keys →` }];
      }

      return (
        <div style={{ background: "#fff5f5", border: "1.5px solid #e8b4b4", borderRadius: 9, padding: "14px 18px", marginBottom: 12, fontSize: 13, lineHeight: 1.6 }}>
          <p style={{ fontWeight: 700, color: "#7a2020", marginBottom: 5 }}>{heading}</p>
          <p style={{ color: "#5a3030", marginBottom: (showOptions || (actions && actions.length)) ? 10 : 0 }}>{body}</p>
          {actions && actions.map((a, i) => (
            <p key={i} style={{ marginBottom: 4 }}><a href={a.href} target="_blank" rel="noopener noreferrer" style={{ color: "#374528", fontWeight: 600 }}>{a.text}</a></p>
          ))}
          {showOptions && (
            <ul style={{ margin: "4px 0 0", paddingLeft: 18, color: "#5a3030", display: "flex", flexDirection: "column", gap: 5 }}>
              <li><strong>Use Generate Prompt (free, no key needed):</strong>{" "}<a href="#" onClick={e => { e.preventDefault(); onGeneratePrompt(); }} style={{ color: "#374528", fontWeight: 600 }}>Click here to generate a prompt</a>{" "}you can paste into any free AI chat like ChatGPT or Gemini.</li>
              {provider !== "gemini" && <li><strong>Try Gemini's free tier:</strong>{" "}Switch the provider above to Gemini and{" "}<a href={PROVIDERS.gemini.keyPageUrl} target="_blank" rel="noopener noreferrer" style={{ color: "#374528", fontWeight: 600 }}>get a free API key here</a>.</li>}
              <li><strong>Add funds to your account:</strong>{" "}<a href={prov.keyPageUrl} target="_blank" rel="noopener noreferrer" style={{ color: "#374528", fontWeight: 600 }}>Visit {prov.label} to manage your account →</a></li>
            </ul>
          )}
          {isAdmin && rawError && (
            <div style={{ marginTop: 10 }} className="info-tip">
              <span style={{ fontSize: 12, color: "#7a2020", cursor: "help", borderBottom: "1px dashed #e8b4b4" }}>Technical details ▾</span>
              <span className="info-bubble" role="tooltip" style={{ width: 360, fontFamily: "monospace", fontSize: 11, whiteSpace: "pre-wrap", wordBreak: "break-all", textAlign: "left" }}>
                {rawError}
                <button onClick={() => navigator.clipboard.writeText(rawError)} style={{ display: "block", marginTop: 8, padding: "3px 10px", fontSize: 11, borderRadius: 5, border: "1px solid #c0d4a8", background: "white", cursor: "pointer", color: "#374528" }}>Copy error</button>
              </span>
            </div>
          )}
        </div>
      );
    }

    // Read-only checklist that mirrors a real-form checkbox group: the whole
    // option list is shown, with AI-suggested options ticked (and bolded).
    function Checklist({ options, selected }) {
      const sel = Array.isArray(selected) ? selected : [];
      return (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", columnGap: 20, rowGap: 7 }}>
          {options.map(label => {
            const on = sel.includes(label);
            return (
              <div key={label} style={{ display: "flex", alignItems: "flex-start", gap: 9 }}>
                <span aria-hidden="true" style={{
                  flexShrink: 0, marginTop: 1, width: 17, height: 17, borderRadius: 4,
                  border: on ? "1.5px solid #374528" : "1.5px solid #c0d4a8",
                  background: on ? "#374528" : "white", color: "white",
                  fontSize: 12, fontWeight: 700, lineHeight: "15px", textAlign: "center",
                }}>{on ? "✓" : ""}</span>
                <span style={{ fontSize: 13.5, lineHeight: 1.45, color: on ? "#2d3a1f" : "#9aab86", fontWeight: on ? 600 : 400 }}>{label}</span>
              </div>
            );
          })}
        </div>
      );
    }

    function App() {
      const [provider,         setProvider]         = React.useState(() => localStorage.getItem("assess_provider") || "gemini");
      const [apiKey,           setApiKey]           = React.useState(() => localStorage.getItem(`assess_key_${localStorage.getItem("assess_provider") || "gemini"}`) || "");
      const [showKey,          setShowKey]          = React.useState(false);
      const [summaryNotes,     setSummaryNotes]     = React.useState("");
      const [output,           setOutput]           = React.useState(null);
      const [loading,          setLoading]          = React.useState(false);
      const [error,            setError]            = React.useState("");
      const [rawError,         setRawError]         = React.useState("");
      const [copied,           setCopied]           = React.useState(null);
      const [copiedPrompt,     setCopiedPrompt]     = React.useState(false);
      const [isAdmin,          setIsAdmin]          = React.useState(() => hasAdminToken());
      const [promptText,       setPromptText]       = React.useState("");
      const [expanded,         setExpanded]         = React.useState(() => new Set());
      const toggleExpand = (i) => setExpanded(prev => {
        const next = new Set(prev);
        next.has(i) ? next.delete(i) : next.add(i);
        return next;
      });

      React.useEffect(() => {
        const onStorage = () => setIsAdmin(hasAdminToken());
        window.addEventListener("storage", onStorage);
        return () => window.removeEventListener("storage", onStorage);
      }, []);

      const switchProvider = (p) => {
        setProvider(p);
        localStorage.setItem("assess_provider", p);
        setApiKey(localStorage.getItem(`assess_key_${p}`) || "");
        setError(""); setRawError("");
      };

      const saveApiKey = (val) => {
        setApiKey(val);
        if (val) localStorage.setItem(`assess_key_${provider}`, val);
        else     localStorage.removeItem(`assess_key_${provider}`);
      };

      const SYSTEM_CORE = `You are documenting a Behavior Analyst's assessment session. From the analyst's summary notes you (a) write a polished clinical narrative for the "Brief Summary of activities completed" field in the EHR session note and (b) conservatively infer which assessment checkboxes apply on the form, for the analyst to review before ticking. Write in third-person clinical prose. Do not write to sound sophisticated — plain, precise clinical language is the standard. The narrative must be 5–8 sentences. Stick strictly to what is reported; do not embellish sparse notes or invent activities, instruments, scores, or outcomes that were not indicated. Frame all content for medical necessity. Scope to assessment activities, ongoing protocol revision, and follow-up items only.

CHECKBOX INFERENCE: For "activities" and "reporting" you are given the EXACT allowed option labels. Return ONLY values copied verbatim from those lists, and only those clearly supported by the notes. If a group is unsupported, return an empty array.

Terminology standards (apply rigorously):
- Reinforcement is contingent on behavior, not delivered to people. Never write that a person — client, caregiver, or staff — "was reinforced." Write "[behavior] was reinforced" or "reinforcement was delivered contingent on [behavior]." People engage in behaviors; behaviors are what get reinforced, prompted, faded, shaped, or extinguished.
- Use precise behavior-analytic verbs and procedure names: administered [tool], conducted a preference assessment, conducted a functional assessment / FA / FBA, ran probes, established baseline, observed, interviewed, scored, identified function. Do not substitute loose synonyms ("looked at," "worked on," "explored") unless the raw notes use them.
- Name assessment instruments and procedures specifically when indicated (e.g., VB-MAPP, AFLS, Vineland-3, MSWO, indirect FA) rather than generic phrases like "assessment was conducted."
- Avoid colloquial or value-laden phrasing ("did great," "amazing progress," "had a hard time"). Use objective, observable descriptions and quantitative detail where reported.`;

      const JSON_FORMAT_BLOCK = `\n\nOUTPUT FORMAT\nReturn ONLY a single JSON object. No markdown, no preamble. Use EXACTLY these keys; arrays hold verbatim option labels (empty [] if unsupported); "narrative" is the 5–8 sentence clinical summary.\n{\n  "activities": [],\n  "reporting": [],\n  "narrative": ""\n}`;

      const LABELED_FORMAT_BLOCK = `\n\nOUTPUT FORMAT\nReturn labeled sections in the exact order below. For each "[tick]" line, list ONLY the options that apply, comma-separated and verbatim from that section's allowed list; if none apply write "None selected." For "[narrative]" write the 5–8 sentence summary. No JSON, no preamble, no commentary.\n\nACTIVITIES PERFORMED [tick]\nASSESSMENT REPORTING TASKS [tick]\nBRIEF SUMMARY OF ACTIVITIES COMPLETED [narrative]`;

      const buildUserPrompt = () => [
        `Summary notes of activities (primary source — use as the basis of the narrative and the checkbox inference):`,
        summaryNotes.trim() || "(none provided)",
        ``,
        `ALLOWED CHECKBOX OPTIONS (return only verbatim values from these lists):`,
        `- activities: ${menu(ACTIVITIES)}`,
        `- reporting: ${menu(REPORTING)}`,
      ].join("\n");

      const normalizeOutput = (raw) => {
        const o = raw && typeof raw === "object" ? raw : {};
        return {
          activities: (Array.isArray(o.activities) ? o.activities : []).filter(v => ACTIVITIES.includes(v)),
          reporting:  (Array.isArray(o.reporting)  ? o.reporting  : []).filter(v => REPORTING.includes(v)),
          narrative:  typeof o.narrative === "string" ? o.narrative : "",
        };
      };

      const handleGenerate = async () => {
        if (!summaryNotes.trim()) { setError("Please enter Summary Notes of Activities."); return; }
        if (!apiKey.trim())       { setError("NO_KEY"); setRawError(""); return; }
        setError(""); setRawError("");
        setLoading(true);
        setOutput(null);
        try {
          const parsed = await callProvider(provider, apiKey, SYSTEM_CORE + JSON_FORMAT_BLOCK, buildUserPrompt());
          setOutput(normalizeOutput(parsed));
        } catch (e) {
          setRawError(e.message || "");
          setError(e.message || "API error: generation failed");
        } finally {
          setLoading(false);
        }
      };

      const handleGeneratePrompt = () => {
        if (!summaryNotes.trim()) { setError("Please enter Summary Notes of Activities."); return; }
        setError(""); setRawError("");
        setPromptText(`${SYSTEM_CORE + LABELED_FORMAT_BLOCK}\n\n---\n\n${buildUserPrompt()}`);
        setCopiedPrompt(false);
      };

      const handleCopyPromptText = () => {
        if (!promptText) return;
        navigator.clipboard.writeText(promptText);
        setCopiedPrompt(true);
        setTimeout(() => setCopiedPrompt(false), 1800);
      };

      const handleCopy = (id, text) => {
        navigator.clipboard.writeText(text);
        setCopied(id);
        setTimeout(() => setCopied(null), 1800);
      };

      const sectionToText = (s) => {
        if (s.kind === "narrative") return `${s.heading}\n${output[s.key] || ""}`;
        const ticks = output[s.group] || [];
        return `${s.heading}\nTick: ${ticks.length ? ticks.join(", ") : "None selected"}`;
      };

      const handleCopyAll = () => {
        if (!output) return;
        navigator.clipboard.writeText(FORM_SECTIONS.map(sectionToText).join("\n\n"));
        setCopied("all");
        setTimeout(() => setCopied(null), 1800);
      };

      const card      = { background: "white", borderRadius: 12, border: "1px solid #c0d4a8", padding: 24, marginBottom: 20 };
      const lbl       = { fontSize: 13, fontWeight: 600, color: "#374528", textTransform: "uppercase", letterSpacing: "0.04em", display: "block", marginBottom: 8 };
      const subLbl    = { fontSize: 14, fontWeight: 600, color: "#374528", display: "block", marginBottom: 10 };
      const inputBase = { width: "100%", padding: "10px 14px", borderRadius: 8, border: "1.5px solid #c0d4a8", fontSize: 14, color: "#2d3a1f", background: "#fafcf8" };
      const prov      = PROVIDERS[provider];

      return (
        <div style={{ maxWidth: 820, margin: "0 auto" }}>

          {/* Header */}
          <div style={{ marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <h1 style={{ fontSize: 26, fontWeight: 700, color: "#2d3a1f", marginBottom: 4 }}>Assessment Note Tool</h1>
              <p style={{ fontSize: 14, color: "#5a6b4a" }}>Describe what was done — the tool drafts the clinical summary and suggests which checkboxes to select on your EHR form.</p>
            </div>
            <a href="/" style={{ padding: "7px 16px", borderRadius: 8, border: "1.5px solid #c0d4a8", background: "white", color: "#374528", fontSize: 13, fontWeight: 600, textDecoration: "none", whiteSpace: "nowrap", marginLeft: 16 }}>← Back</a>
          </div>

          {/* Disclaimer */}
          <div style={{ marginBottom: 24, padding: "14px 18px", borderRadius: 10, border: "1.5px solid #d4b483", background: "#fdf6e8", color: "#5a4420", fontSize: 13, lineHeight: 1.55 }}>
            <strong style={{ color: "#7a5a1a" }}>Disclaimer:</strong> Use of these AI-assisted queries is subject to the legal and regulatory constraints of the user's jurisdiction. These tools do not remove the user's responsibility to review all output for accuracy and to maintain compliance with the ethical standards of their credentialing board for professional behavior analysis work.{" "}
            <strong style={{ color: "#7a5a1a" }}>Do not enter any PHI (Protected Health Information) into this tool.</strong> PHI is any detail that could identify a specific client — including names, dates of birth, addresses, phone numbers, ID or insurance numbers, or any other personal identifiers.
          </div>

          {/* API Settings */}
          <div style={card}>
            <div style={{ marginBottom: 20 }}>
              <p style={lbl}>AI Provider</p>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {Object.entries(PROVIDERS).map(([id, p]) => (
                  <button
                    key={id}
                    onClick={() => switchProvider(id)}
                    style={{
                      padding: "8px 18px", borderRadius: 8,
                      border: provider === id ? "2px solid #374528" : "1.5px solid #c0d4a8",
                      background: provider === id ? "#374528" : "white",
                      color: provider === id ? "white" : "#374528",
                      fontWeight: 600, fontSize: 14, cursor: "pointer",
                    }}
                  >
                    {p.label}
                  </button>
                ))}
              </div>
            </div>

            <div>
              <label style={lbl}>{prov.keyLabel}</label>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <input
                  type={showKey ? "text" : "password"}
                  value={apiKey}
                  onChange={e => saveApiKey(e.target.value)}
                  placeholder={prov.placeholder}
                  style={{ ...inputBase, flex: 1 }}
                />
                <button
                  onClick={() => setShowKey(v => !v)}
                  style={{ padding: "9px 14px", borderRadius: 8, border: "1.5px solid #c0d4a8", background: "white", color: "#374528", fontSize: 13, cursor: "pointer" }}
                >
                  {showKey ? "Hide" : "Show"}
                </button>
              </div>
              <p style={{ fontSize: 12, color: "#7a9460", marginTop: 7 }}>{prov.hint} — saved in this browser only.</p>
              <ApiKeyHelpBox provider={provider} />
            </div>
          </div>

          {/* Inputs card */}
          <div style={card}>

            {/* Summary notes of activities */}
            <div style={{ marginBottom: 20 }}>
              <label style={subLbl}>Summary Notes of Activities <span style={{ color: "#c0392b" }}>*</span></label>
              <p style={{ fontSize: 12.5, color: "#7a9460", marginBottom: 10, lineHeight: 1.55 }}>
                Describe what was done this session — which assessment tools/interviews/observations/analyses you ran, reporting tasks (record review, scoring, treatment-plan work), findings, scores, and follow-up items. Name instruments (e.g. VB-MAPP, Vineland-3). The tool drafts the narrative and suggests which activity and reporting checkboxes to select on your form.
              </p>
              <textarea
                value={summaryNotes}
                onChange={e => setSummaryNotes(e.target.value)}
                placeholder={"No PHI. Bullets are fine, e.g.:\n- VB-MAPP milestones administered, levels 1–2 complete\n- Caregiver interview re: increase in tantrums over past 2 weeks\n- Observed 4 instances of elopement during 30-min play\n- Scored protocol; began treatment-plan goal development\n- Need to schedule follow-up for preference assessment"}
                style={{ ...inputBase, height: 200, resize: "vertical", lineHeight: 1.6 }}
              />
            </div>

            <ApiErrorMessage error={error} rawError={rawError} provider={provider} isAdmin={isAdmin} onGeneratePrompt={handleGeneratePrompt} />

            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <button
                onClick={handleGenerate}
                disabled={loading}
                style={{
                  padding: "11px 28px", borderRadius: 8, border: "none",
                  background: loading ? "#a0b890" : "#374528",
                  color: "white", fontSize: 15, fontWeight: 600,
                  cursor: loading ? "not-allowed" : "pointer",
                }}
              >
                {loading ? "Generating…" : "Generate Summary"}
              </button>
              <button
                onClick={handleGeneratePrompt}
                style={{
                  padding: "11px 18px", borderRadius: 8,
                  border: "1.5px solid #374528",
                  background: "white", color: "#374528",
                  fontSize: 14, fontWeight: 600, cursor: "pointer",
                }}
              >
                Generate Prompt
              </button>
            </div>
          </div>

          {/* Generated Prompt output */}
          {promptText && (
            <div style={{ ...card }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <h2 style={{ fontSize: 17, fontWeight: 700, color: "#2d3a1f" }}>Generated Prompt</h2>
                <button
                  onClick={handleCopyPromptText}
                  style={{ padding: "7px 16px", borderRadius: 7, border: "1.5px solid #374528", background: "white", color: "#374528", fontSize: 13, fontWeight: 600, cursor: "pointer" }}
                >
                  {copiedPrompt ? "Copied!" : "Copy"}
                </button>
              </div>
              <textarea
                readOnly
                value={promptText}
                style={{ width: "100%", minHeight: 220, padding: 12, borderRadius: 8, border: "1px solid #c0d4a8", fontSize: 13, color: "#2d3a1f", lineHeight: 1.6, resize: "vertical", background: "#f7fbf3", fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace" }}
              />
            </div>
          )}

          {/* Output — suggested checkbox ticks + narrative, mirroring the EHR form */}
          {output && (
            <div style={{ ...card, marginBottom: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <h2 style={{ fontSize: 17, fontWeight: 700, color: "#2d3a1f" }}>Generated Summary</h2>
                <button
                  onClick={handleCopyAll}
                  style={{ padding: "7px 16px", borderRadius: 7, border: "1.5px solid #374528", background: copied === "all" ? "#374528" : "white", color: copied === "all" ? "white" : "#374528", fontSize: 13, fontWeight: 600, cursor: "pointer" }}
                >
                  {copied === "all" ? "Copied!" : "Copy All"}
                </button>
              </div>
              <p style={{ fontSize: 13, color: "#7a9460", marginBottom: 20, lineHeight: 1.55 }}>Checklists are suggestions from your notes — review, then tick the matching boxes on your form. The narrative is editable before you copy it.</p>

              <div className="output-grid">
                {FORM_SECTIONS.map((s, i) => {
                  const isNarrative = s.kind === "narrative";
                  const isOpen = expanded.has(i);
                  // Checklists span the full row; narratives sit 2-up and expand on demand.
                  const fullRow = !isNarrative || isOpen;
                  return (
                  <div key={i} className={fullRow ? "full-row" : undefined} style={{ borderRadius: 9, border: "1px solid #ddecd0", background: "#f7fbf3", padding: 16 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10, gap: 8 }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: "#374528" }}>{s.heading}</span>
                      <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                        {isNarrative && (
                          <button
                            onClick={() => toggleExpand(i)}
                            title={isOpen ? "Collapse to half width" : "Expand to full row"}
                            style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #c0d4a8", background: "white", color: "#374528", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}
                          >
                            {isOpen ? "⤡ Collapse" : "⤢ Expand"}
                          </button>
                        )}
                        <button
                          onClick={() => handleCopy("sec" + i, sectionToText(s))}
                          style={{ padding: "4px 12px", borderRadius: 6, border: "1px solid #c0d4a8", background: "white", color: "#374528", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}
                        >
                          {copied === "sec" + i ? "Copied!" : "Copy"}
                        </button>
                      </div>
                    </div>

                    {isNarrative && (
                      <textarea
                        value={output[s.key]}
                        onChange={e => setOutput(prev => ({ ...prev, [s.key]: e.target.value }))}
                        style={{ width: "100%", minHeight: isOpen ? 180 : 140, padding: 12, borderRadius: 8, border: "1px solid #c0d4a8", fontSize: 14, color: "#2d3a1f", lineHeight: 1.7, resize: "vertical", background: "white" }}
                      />
                    )}

                    {s.kind === "checklist" && (
                      (output[s.group] && output[s.group].length)
                        ? <Checklist options={GROUP_OPTIONS[s.group]} selected={output[s.group]} />
                        : <p style={{ fontSize: 13, color: "#9aab86", fontStyle: "italic" }}>No selection suggested — leave blank or review your notes.</p>
                    )}
                  </div>
                  );
                })}
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
