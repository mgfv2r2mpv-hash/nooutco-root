<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAP Goals</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="/assets/notes-gate.js"></script>
  <script src="/assets/notes-scrub.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Inter, sans-serif;
      background: #f0f4ec;
      min-height: 100vh;
      padding: 32px 20px;
      color: #2d3a1f;
    }
    .info-tip {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin-left: 6px;
      vertical-align: middle;
    }
    .info-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid #c0d4a8;
      background: #eef4e6;
      color: #5a7040;
      font-size: 11px;
      font-weight: 700;
      cursor: help;
      line-height: 1;
      user-select: none;
    }
    .info-icon:focus { outline: 2px solid #5a7040; outline-offset: 1px; }
    .info-bubble {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      visibility: hidden;
      opacity: 0;
      background: #2d3a1f;
      color: white;
      padding: 9px 12px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 400;
      line-height: 1.55;
      width: 320px;
      text-align: left;
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.12s ease;
      white-space: normal;
      box-shadow: 0 4px 14px rgba(45, 58, 31, 0.18);
    }
    .info-bubble::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #2d3a1f;
    }
    .info-tip:hover .info-bubble,
    .info-tip:focus-within .info-bubble {
      visibility: visible;
      opacity: 1;
    }
    /* Output sections: responsive 2-up grid; any card can expand to a full row */
    .output-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
    .output-grid .full-row { grid-column: 1 / -1; }
    @media (max-width: 640px) { .output-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Non-JSX strings and helpers — no Babel transform needed -->
  <script>
    window.SAP_SMART_TOOLTIP = `SMART goals are: Specific (clearly defines the target behavior and context — what, where, with whom), Measurable (includes quantifiable criteria, e.g. "4 out of 5 opportunities" or "80% accuracy"), Achievable (realistic within the authorization period given the client's current baseline), Relevant (tied to the client's diagnosis, functional independence, and medical necessity — not academics), and Time-bound (specifies a timeframe, e.g. "within 1 authorization period" or "across 3 consecutive sessions").`;

    window.SAP_SYSTEM_PROMPT = [
      "You are a BCBA writing a Service Authorization Plan (SAP) for behavior technicians to implement.",
      "Output concise, operational procedures. Exception: the Purpose field states the clinical indication — what functional skill deficit or behavioral barrier is targeted, and what independence or safety outcome the goal supports. This is required for medical necessity.",
      "All other fields: no rationale, no prose, no padding. Staff are trained; do not explain ABA concepts.",
      "",
      "Given a treatment goal and SAP specifications, return ONLY a JSON object (no markdown fences, no preamble) with this exact structure:",
      "",
      '{',
      '  "refinedGoal": "Refined SMART goal. Preserve clinician wording wherever possible — only fill in missing SMART elements (Specific target + context, Measurable criterion, Achievable, Relevant to functional independence/medical necessity, Time-bound). Add \'by the end of 1 authorization period\' if timeframe is missing.",',
      '  "exercise": {',
      '    "purpose": "* [clinical indication: functional skill deficit or behavioral barrier addressed]\\n* [functional outcome: independence or safety gain this goal targets]",',
      '    "teachingStrategy": "[Method name]. [One sentence on application — no rationale paragraph.]",',
      '    "lessonSetUp": "* [setup item]\\n* [setup item]\\n* [setup item if needed]",',
      '    "sd": "* [What adult says/does — use [CLIENT] for the client]\\ne.g., [3 example questions/demands in neutral third-person]\\n* [Delivery condition]",',
      '    "correctResponse": "+ [criterion]\\n+ [criterion]\\n+ [criterion if needed]",',
      '    "incorrectResponse": "- [criterion]\\n- [criterion]\\n- [criterion if needed]",',
      '    "masteryCriteria": "Minimum [N] trials at [X]% accuracy across [N] consecutive sessions.",',
      '    "promptHierarchy": "Use [Least-to-Most or Most-to-Least] Prompting\\n* I — Independent: [brief description]\\n* G — Gesture: [brief description]\\n* PV — Partial Verbal: [brief description]\\n* FV — Full Verbal: [brief description]"',
      '  },',
      '  "generalization": {',
      '    "criteria": "[2-3 sentences: contexts, people, stimuli. No padding.]",',
      '    "maintenance": "[Schedule, probe structure, accuracy threshold. 2-4 sentences.]"',
      '  },',
      '  "errorCorrection": {',
      '    "initial": "(1) [step]\\n(2) [step]\\n(3) [step]\\n\\n[One additional rule if warranted — omit if not]",',
      '    "maintenance": "(1) [step]\\n(2) [step]\\n[One additional rule if warranted — omit if not]"',
      '  }',
      '}',
      '',
      "Style rules — follow exactly:",
      "- Use [CLIENT] everywhere in place of any client name or the client in procedures",
      "- Use * for general bullets, + for correct response items, - for incorrect response items",
      "- Prompt hierarchy: always I, G, PV, FV notation unless specs specify otherwise",
      "- masteryCriteria: exactly one line",
      "- No sentence starting with It is important to, Rationale:, This ensures, Note that, or similar",
      "- Lesson Set Up: actual setup steps only — no reminders about data sheets or timers",
      "- SD examples: neutral third-person phrasing",
      "- Keep every section as short as operationally complete allows",
      "",
      "Terminology standards — non-negotiable:",
      "- Reinforcement is contingent on behavior, never delivered to people. Never write [CLIENT] is reinforced. Write deliver reinforcement contingent on [target behavior] or [behavior] is reinforced on [schedule].",
      "- Use precise behavior-analytic verbs: prompt, fade, model, shape, chain, present the SD, deliver/withhold reinforcement, run a probe, conduct a trial, mass trial, intersperse.",
      "- Do not substitute loose synonyms (reward, encourage, motivate). Plain operational language only.",
    ].join("\n");

    window.sapBuildUserPrompt = function(goal, sapSpecs) {
      return "Treatment Goal:\n" + goal + "\n\nSAP Specifications:\n" + (sapSpecs.trim() || "(No additional specifications provided — apply standard best-practice defaults.)");
    };

    window.sapBuildGeneratePrompt = function(goal, sapSpecs) {
      var sys = [
        "You are a BCBA writing a Service Authorization Plan (SAP) for behavior technicians.",
        "Output concise, operational procedures. Exception: the Purpose field states the clinical indication (what functional skill deficit is targeted and what independence outcome the goal supports).",
        "All other fields: no rationale, no prose padding. Staff are trained.",
        "",
        "Terminology standards — non-negotiable:",
        "- Reinforcement is contingent on behavior, never delivered to people. Never write [CLIENT] is reinforced.",
        "- Use precise behavior-analytic verbs: prompt, fade, model, shape, chain, present the SD, errorless teaching, DRO, DRA, time delay, BST.",
        "- Do not substitute loose synonyms (reward, encourage, motivate). Plain operational language only.",
        "",
        "Given a treatment goal and SAP specifications, return exactly the following labeled sections",
        "(label on its own line, content below, blank line before next label).",
        "No preamble, no commentary after the last section.",
        "",
        "REFINED TREATMENT GOAL",
        "[Refined SMART goal — preserve clinician wording wherever possible. Only fill in missing SMART elements. If timeframe is missing add 'by the end of 1 authorization period'.]",
        "",
        "EXERCISE",
        "Purpose:",
        "[* clinical indication: functional skill deficit or behavioral barrier addressed]",
        "[* functional outcome: independence or safety gain this goal targets]",
        "",
        "Teaching Strategy:",
        "[Method name. One sentence on application.]",
        "",
        "Lesson Set Up:",
        "[* bullet list of actual setup steps]",
        "",
        "SD (Demand / Discriminative Stimulus):",
        "[* What adult says/does — use [CLIENT] for client]",
        "[e.g., 3 example questions/demands in neutral third-person]",
        "[* Delivery condition]",
        "",
        "Correct Response:",
        "[+ criterion]",
        "[+ criterion]",
        "",
        "Incorrect Response:",
        "[- criterion]",
        "[- criterion]",
        "",
        "Mastery Criteria:",
        "[One line: Minimum N trials at X% accuracy across N consecutive sessions.]",
        "",
        "Prompt Hierarchy:",
        "Use [Least-to-Most or Most-to-Least] Prompting",
        "[* I — Independent: brief description]",
        "[* G — Gesture: brief description]",
        "[* PV — Partial Verbal: brief description]",
        "[* FV — Full Verbal: brief description]",
        "",
        "GENERALIZATION",
        "Generalization Criteria:",
        "[2-3 sentences: conditions, contexts, people, stimuli]",
        "",
        "Maintenance Criteria:",
        "[Schedule, probe structure, accuracy threshold. 2-4 sentences.]",
        "",
        "ERROR CORRECTION",
        "During Initial Teaching:",
        "[(1) step]",
        "[(2) step]",
        "[(3) step]",
        "[One additional rule if warranted]",
        "",
        "During Maintenance:",
        "[(1) step]",
        "[(2) step]",
        "[One additional rule if warranted]",
        "",
        "Note: After 2 consecutive maintenance probes below Maintenance Criteria, contact BCBA so a skill can re-enter teaching.",
      ].join("\n");

      var user = "Treatment Goal:\n" + goal + "\n\nSAP Specifications:\n" + (sapSpecs.trim() || "(No additional specifications — apply best-practice defaults.)");
      return sys + "\n\n---\n\n" + user;
    };

    window.sapFormatExercise = function(ex) {
      var parts = [];
      if (ex.purpose)           parts.push("Purpose:\n"                               + ex.purpose);
      if (ex.teachingStrategy)  parts.push("Teaching Strategy:\n"                     + ex.teachingStrategy);
      if (ex.lessonSetUp)       parts.push("Lesson Set Up:\n"                         + ex.lessonSetUp);
      if (ex.sd)                parts.push("SD (Demand / Discriminative Stimulus):\n" + ex.sd);
      if (ex.correctResponse)   parts.push("Correct Response:\n"                      + ex.correctResponse);
      if (ex.incorrectResponse) parts.push("Incorrect Response:\n"                    + ex.incorrectResponse);
      if (ex.masteryCriteria)   parts.push("Mastery Criteria:\n"                      + ex.masteryCriteria);
      if (ex.promptHierarchy)   parts.push("Prompt Hierarchy:\n"                      + ex.promptHierarchy);
      return parts.join("\n\n");
    };

    window.sapFormatGeneralization = function(gen) {
      var parts = [];
      if (gen.criteria)    parts.push("Generalization Criteria:\n" + gen.criteria);
      if (gen.maintenance) parts.push("Maintenance Criteria:\n"    + gen.maintenance);
      return parts.join("\n\n");
    };

    window.sapFormatErrorCorrection = function(ec) {
      var parts = [];
      if (ec.initial)     parts.push("During Initial Teaching:\n" + ec.initial);
      if (ec.maintenance) parts.push("During Maintenance:\n"      + ec.maintenance);
      parts.push("Note: After 2 consecutive maintenance probes below Maintenance Criteria, contact BCBA so a skill can re-enter teaching.");
      return parts.join("\n\n");
    };

  </script>

  <script type="text/babel">
    const SMART_TOOLTIP     = window.SAP_SMART_TOOLTIP;
    const SYSTEM_PROMPT     = window.SAP_SYSTEM_PROMPT;

    function InfoTooltip({ text }) {
      return (
        <span className="info-tip">
          <span className="info-icon" tabIndex="0" role="button" aria-label="More information">i</span>
          <span className="info-bubble" role="tooltip">{text}</span>
        </span>
      );
    }

    function Tip({ text }) {
      return (
        <div style={{
          fontSize: 12,
          color: "#5a7040",
          background: "#eef4e6",
          border: "1px solid #c8dba8",
          borderRadius: 7,
          padding: "7px 11px",
          marginBottom: 10,
          lineHeight: 1.55,
        }}>{text}</div>
      );
    }

    function App() {
      const [loggedIn, setLoggedIn] = React.useState(() => !!(window.NotesGate && NotesGate.isLoggedIn()));
      const TOOL_ID = "sap";
      const canUse  = loggedIn && !!(window.NotesGate && NotesGate.canUseTool(TOOL_ID));
      React.useEffect(() => (window.NotesGate ? NotesGate.subscribe(setLoggedIn) : undefined), []);

      const [goal,     setGoal]     = React.useState("");
      const [sapSpecs, setSapSpecs] = React.useState("");

      const [output,       setOutput]       = React.useState(null);
      const [loading,      setLoading]      = React.useState(false);
      const [error,        setError]        = React.useState("");
      const [copied,       setCopied]       = React.useState(null);
      const [promptText,   setPromptText]   = React.useState("");
      const [scrubNotice,  setScrubNotice]  = React.useState("");
      const [expanded,     setExpanded]     = React.useState(() => new Set());
      const toggleExpand = (i) => setExpanded(prev => {
        const next = new Set(prev);
        next.has(i) ? next.delete(i) : next.add(i);
        return next;
      });
      const [copiedPrompt, setCopiedPrompt] = React.useState(false);

      const validate = () => {
        if (!goal.trim()) return "Please enter a treatment goal.";
        return null;
      };

      const collectFreeText = () => [goal, sapSpecs].join("\n");

      const handleGenerate = async () => {
        const err = validate();
        if (err) { setError(err); return; }
        if (!NotesGate.isLoggedIn()) { NotesGate.openLogin(); return; }
        setError("");
        if (!(await NotesScrub.acknowledge())) return;
        const review = await NotesScrub.review({ freeText: collectFreeText() });
        if (review.cancelled) return;
        setScrubNotice(NotesScrub.noticeText(review.map));
        setLoading(true); setOutput(null);
        try {
          const parsed = await NotesGate.generateNote({ systemPrompt: SYSTEM_PROMPT, userPrompt: NotesScrub.applyMap(window.sapBuildUserPrompt(goal, sapSpecs), review.map), tool: TOOL_ID });
          setOutput({
            refinedGoal:     parsed.refinedGoal || "",
            exercise:        window.sapFormatExercise(parsed.exercise || {}),
            generalization:  window.sapFormatGeneralization(parsed.generalization || {}),
            errorCorrection: window.sapFormatErrorCorrection(parsed.errorCorrection || {}),
          });
          setPromptText("");
        } catch (e) {
          setError(e.message || "Generation failed. Please try again.");
          const _tok = localStorage.getItem("notes_auth_token");
          if (_tok) fetch(NotesGate.apiUrl("/api/error-report"), { method: "POST", headers: { "Content-Type": "application/json", Authorization: "Bearer " + _tok }, body: JSON.stringify({ message: e.message || "unknown", tool: TOOL_ID, timestamp: new Date().toISOString() }) }).catch(() => {});
        } finally {
          setLoading(false);
        }
      };

      const handleGeneratePrompt = async () => {
        const err = validate();
        if (err) { setError(err); return; }
        setError("");
        if (!(await NotesScrub.acknowledge())) return;
        const review = await NotesScrub.review({ freeText: collectFreeText() });
        if (review.cancelled) return;
        setScrubNotice(NotesScrub.noticeText(review.map));
        setPromptText(NotesScrub.applyMap(window.sapBuildGeneratePrompt(goal, sapSpecs), review.map));
        setCopiedPrompt(false);
      };

      const handleCopyAll = () => {
        if (!output) return;
        const parts = [];
        if (output.refinedGoal)     parts.push("Treatment Goal (Refined):\n" + output.refinedGoal);
        if (output.exercise)        parts.push("Exercise\n"                  + output.exercise);
        if (output.generalization)  parts.push("Generalization\n"            + output.generalization);
        if (output.errorCorrection) parts.push("Error Correction\n"          + output.errorCorrection);
        navigator.clipboard.writeText(parts.join("\n\n"));
        setCopied("all");
        setTimeout(() => setCopied(null), 1800);
      };

      const card      = { background: "white", borderRadius: 12, border: "1px solid #c0d4a8", padding: 24, marginBottom: 20 };
      const subLbl    = { fontSize: 15, fontWeight: 700, color: "#2d3a1f", display: "block", marginBottom: 6 };
      const lbl       = { fontSize: 13, fontWeight: 600, color: "#374528", textTransform: "uppercase", letterSpacing: "0.04em", display: "block", marginBottom: 8 };
      const hint      = { fontSize: 12, color: "#7a9460", marginBottom: 10, lineHeight: 1.55 };
      const inputBase = { width: "100%", padding: "10px 14px", borderRadius: 8, border: "1.5px solid #c0d4a8", fontSize: 14, color: "#2d3a1f", background: "#fafcf8" };

      return (
        <div style={{ maxWidth: 820, margin: "0 auto" }}>

          {/* Header */}
          <div style={{ marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <h1 style={{ fontSize: 26, fontWeight: 700, color: "#2d3a1f", marginBottom: 4 }}>SAP Goals &amp; Planning Tool</h1>
              <p style={{ fontSize: 14, color: "#5a6b4a" }}>Enter a treatment goal and SAP specifications &mdash; generate a prompt or draft a complete Service Authorization Plan for clinical review.</p>
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "flex-end" }}>
              <a href="../scrubber.html" target="_blank" style={{ padding: "7px 16px", borderRadius: 8, border: "1.5px solid #c0d4a8", background: "#f0f4ec", color: "#374528", fontSize: 13, fontWeight: 600, textDecoration: "none", whiteSpace: "nowrap" }}>Scrubber →</a>
              <a href="/" style={{ padding: "7px 16px", borderRadius: 8, border: "1.5px solid #c0d4a8", background: "white", color: "#374528", fontSize: 13, fontWeight: 600, textDecoration: "none", whiteSpace: "nowrap" }}>&larr; Back</a>
            </div>
          </div>

          {/* Disclaimer */}
          <div style={{ marginBottom: 24, padding: "14px 18px", borderRadius: 10, border: "1.5px solid #d4b483", background: "#fdf6e8", color: "#5a4420", fontSize: 13, lineHeight: 1.55 }}>
            <strong style={{ color: "#7a5a1a" }}>Disclaimer:</strong> Use of these AI-assisted queries is subject to the legal and regulatory constraints of the user&apos;s jurisdiction. These tools do not remove the user&apos;s responsibility to review all output for accuracy and to maintain compliance with the ethical standards of their credentialing board for professional behavior analysis work.{" "}
            <strong style={{ color: "#7a5a1a" }}>Do not enter any PHI (Protected Health Information) into this tool.</strong> PHI is any detail that could identify a specific client &mdash; including names, dates of birth, addresses, phone numbers, ID or insurance numbers, or any other personal identifiers.
          </div>

          {/* Treatment Goal */}
          <div style={card}>
            <label style={subLbl}>
              Treatment Goal
              <InfoTooltip text={SMART_TOOLTIP} />
            </label>
            <p style={hint}>
              Write a SMART goal tied to the client&apos;s diagnosis and functional needs &mdash; without PHI. Hover the{" "}
              <span style={{ display: "inline-flex", width: 15, height: 15, borderRadius: "50%", border: "1px solid #c0d4a8", background: "#eef4e6", color: "#5a7040", fontSize: 10, fontWeight: 700, alignItems: "center", justifyContent: "center", verticalAlign: "middle" }}>i</span>
              {" "}icon to see what makes a goal SMART.
            </p>
            <textarea
              value={goal}
              onChange={e => setGoal(e.target.value)}
              placeholder="e.g., [Client] will independently request preferred items or activities using their AAC device in 4 out of 5 opportunities, absent behaviors targeted for reduction, across 3 consecutive sessions within 1 authorization period, as measured by direct observation during structured and unstructured activities."
              style={{ ...inputBase, height: 120, resize: "vertical", lineHeight: 1.6 }}
            />
            <p style={{ fontSize: 12, color: "#aaa", marginTop: 4 }}>{goal.length} characters</p>
          </div>

          {/* SAP Specifications */}
          <div style={card}>
            <label style={subLbl}>SAP Specifications</label>
            <Tip text="The AI will draft a best-practice SAP template based on your goal — but it has no access to client-specific details. Include relevant considerations here (without PHI): teaching format (DTT vs NET), prompt hierarchy preferences, number of trials, mastery criteria, generalization targets (settings, people, stimuli), error correction protocol, session structure, or any deviations from standard practice. The more context you provide, the more tailored the draft will be." />
            <textarea
              value={sapSpecs}
              onChange={e => setSapSpecs(e.target.value)}
              placeholder={"Bullet points or fragments are fine, e.g.:\n- DTT format, 10 trials per session\n- Least to most prompt hierarchy\n- Mastery: 80% accuracy across 3 consecutive sessions\n- Generalize across 3 staff and 2 settings\n- Error correction: no-no prompt during acquisition\n- Maintenance: same error correction as acquisition"}
              style={{ ...inputBase, height: 150, resize: "vertical", lineHeight: 1.6 }}
            />
            <p style={{ fontSize: 12, color: "#aaa", marginTop: 4 }}>{sapSpecs.length} characters</p>
          </div>

          {/* Error + Buttons */}
          <div style={{ marginBottom: 20 }}>
            {error && <p style={{ color: "#c0392b", fontSize: 13, marginBottom: 12 }}>{error}</p>}
            {scrubNotice && (
              <div style={{ margin: "0 0 16px", borderRadius: 10, border: "2px solid #c8962a", overflow: "hidden" }}>
                <div style={{ padding: "8px 14px", background: "#fdf3dc", color: "#5a3d00", fontSize: 12, lineHeight: 1.5 }}>
                  <strong>Removed before this left your device:</strong> {scrubNotice}{" "}
                  <span style={{ color: "#7a6020" }}>— substitute back in your EHR.</span>
                </div>
                <div style={{ padding: "10px 14px", background: "#fff8ec", color: "#3d2a00", fontSize: 13.5, fontWeight: 600, lineHeight: 1.55 }}>
                  ⚠️ {NotesScrub.SCRUB_GUIDANCE}
                </div>
              </div>
            )}
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <button onClick={!loggedIn ? () => NotesGate.openLogin() : (canUse ? handleGenerate : undefined)} disabled={loading || (loggedIn && !canUse)} style={{
                  padding: "11px 28px", borderRadius: 8, border: "none",
                  background: (loading || (loggedIn && !canUse)) ? "#a0b890" : "#374528",
                  color: "white", fontSize: 15, fontWeight: 600,
                  cursor: (loading || (loggedIn && !canUse)) ? "not-allowed" : "pointer",
                }}>
                  {!loggedIn ? "Log in" : (canUse ? (loading ? "Generating…" : "Generate SAP") : "No access for this tool")}
                </button>
              <button onClick={handleGeneratePrompt} style={{
                padding: "11px 18px", borderRadius: 8,
                border: "1.5px solid #374528",
                background: isAdmin ? "white" : "#374528",
                color: isAdmin ? "#374528" : "white",
                fontSize: 14, fontWeight: 600, cursor: "pointer",
              }}>
                Generate Prompt
              </button>
              {loggedIn && (
                <button onClick={() => NotesGate.logout()} style={{
                  marginLeft: "auto", padding: "9px 16px", borderRadius: 8,
                  border: "1.5px solid #c0d4a8", background: "white", color: "#5a6b4a", fontSize: 13, fontWeight: 600, cursor: "pointer",
                }}>
                  Log out
                </button>
              )}
            </div>
          </div>

          {/* Generated Prompt */}
          {promptText && (
            <div style={card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <div>
                  <h2 style={{ fontSize: 17, fontWeight: 700, color: "#2d3a1f" }}>Generated Prompt</h2>
                  <p style={{ fontSize: 13, color: "#5a6b4a", marginTop: 3 }}>Copy and paste into your AI of choice. It will return a refined SMART goal and complete SAP draft &mdash; no preamble, no editorializing.</p>
                </div>
                <button
                  onClick={() => { navigator.clipboard.writeText(promptText); setCopiedPrompt(true); setTimeout(() => setCopiedPrompt(false), 1800); }}
                  style={{ padding: "7px 16px", borderRadius: 7, border: "1.5px solid #374528", background: "white", color: "#374528", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", marginLeft: 16 }}
                >
                  {copiedPrompt ? "Copied!" : "Copy"}
                </button>
              </div>
              <textarea
                readOnly
                value={promptText}
                style={{ width: "100%", minHeight: 240, padding: 12, borderRadius: 8, border: "1px solid #c0d4a8", fontSize: 13, color: "#2d3a1f", lineHeight: 1.6, resize: "vertical", background: "#f7fbf3", fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace" }}
              />
            </div>
          )}

          {/* Generated SAP Output (admin only) */}
          {output && (
            <div style={{ ...card, marginBottom: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <h2 style={{ fontSize: 17, fontWeight: 700, color: "#2d3a1f" }}>Generated SAP Draft</h2>
                <button
                  onClick={handleCopyAll}
                  style={{ padding: "7px 16px", borderRadius: 7, border: "1.5px solid #374528", background: "white", color: "#374528", fontSize: 13, fontWeight: 600, cursor: "pointer" }}
                >
                  {copied === "all" ? "Copied!" : "Copy All"}
                </button>
              </div>

              <p style={{ fontSize: 12, color: "#7a9460", marginBottom: 16, fontStyle: "italic" }}>All sections are editable &mdash; review and refine before using in an authorization.</p>

              <div className="output-grid">
                {[
                  { id: "refinedGoal",     label: "Treatment Goal (Refined)", height: 100 },
                  { id: "exercise",        label: "Exercise",                 height: 420 },
                  { id: "generalization",  label: "Generalization",           height: 180 },
                  { id: "errorCorrection", label: "Error Correction",         height: 220 },
                ].map(({ id, label, height }, i) => {
                  const isOpen = expanded.has(i);
                  return (
                  <div key={id} className={isOpen ? "full-row" : undefined} style={{ borderRadius: 9, border: "1px solid #ddecd0", background: "#f7fbf3", padding: 16 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8, gap: 8 }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: "#374528" }}>{label}</span>
                      <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                        <button
                          onClick={() => toggleExpand(i)}
                          title={isOpen ? "Collapse to half width" : "Expand to full row"}
                          style={{ padding: "4px 10px", borderRadius: 6, border: "1px solid #c0d4a8", background: "white", color: "#374528", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}
                        >
                          {isOpen ? "⤡ Collapse" : "⤢ Expand"}
                        </button>
                        <button
                          onClick={() => { navigator.clipboard.writeText(output[id] || ""); setCopied(id); setTimeout(() => setCopied(null), 1800); }}
                          style={{ padding: "4px 12px", borderRadius: 6, border: "1px solid #c0d4a8", background: "white", color: "#374528", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}
                        >
                          {copied === id ? "Copied!" : "Copy"}
                        </button>
                      </div>
                    </div>
                    <textarea
                      value={output[id] || ""}
                      onChange={e => setOutput(prev => ({ ...prev, [id]: e.target.value }))}
                      style={{ width: "100%", minHeight: height, padding: 10, borderRadius: 7, border: "1px solid #c0d4a8", fontSize: 14, color: "#2d3a1f", lineHeight: 1.65, resize: "vertical", background: "white", fontFamily: "inherit" }}
                    />
                  </div>
                  );
                })}
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
