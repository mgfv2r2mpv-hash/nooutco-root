<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="c">
      <circle cx="50" cy="46" r="41"/>
    </clipPath>
  </defs>
  <!-- Blue circle -->
  <circle cx="50" cy="46" r="41" fill="#8fbdd3"/>
  <!-- N shape clipped to circle -->
