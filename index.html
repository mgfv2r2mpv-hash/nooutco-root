<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Outcome</title>
  <link rel="icon" type="image/png" href="N-O.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #edf0e9;
      min-height: 100vh;
      padding: 48px 24px;
    }

    h1 {
      font-size: 30px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 32px;
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 680px;
    }

    .tile {
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 22px 26px;
      background: #fff;
      border-radius: 10px;
      border: 1px solid #dde0d8;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .tile:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      border-color: #c8ccc3;
    }
    .tile:active { opacity: 0.85; }
    .tile-emoji { font-size: 36px; line-height: 1; flex-shrink: 0; }
    .tile-text { display: flex; flex-direction: column; gap: 3px; }
    .tile-category { font-size: 11px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: #7d9068; }
    .tile-name { font-size: 17px; font-weight: 700; color: #1a1a1a; }
    .tile-desc { font-size: 13px; color: #666; line-height: 1.4; }
  </style>
</head>
<body>
  <h1>No Outcome - Progress is a Process</h1>
  <p class="subtitle">Choose an Option:</p>

  <div class="grid">
    <a class="tile" href="https://games.nooutco.me">
      <div class="tile-emoji">👾</div>
      <div class="tile-text">
        <div class="tile-category">Games &amp; Activities</div>
        <div class="tile-name">Games</div>
        <div class="tile-desc">Fun Session Activities</div>
      </div>
    </a>
    <a class="tile" href="https://tools.nooutco.me">
      <div class="tile-emoji">🗃️</div>
      <div class="tile-text">
        <div class="tile-category">Supervisor Tools</div>
        <div class="tile-name">Tools</div>
        <div class="tile-desc">Helpful Supervision Utilities</div>
      </div>
    </a>
  </div>
</body>
</html>
