<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games — nooutco.me</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Inter, -apple-system, sans-serif;
      background: var(--bg, #eaeee7);
      min-height: 100vh;
      padding: 32px 20px;
      color: #2d3a1f;
    }

    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 9px 18px;
      border: 1.5px solid #b8cfa0;
      border-radius: 10px;
      background: transparent;
      color: #374528;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }
    .nav-back:hover { background: #dde8d4; }
    .btn-admin {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border: 1.5px solid #b8cfa0;
      border-radius: 10px;
      background: transparent;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-admin:hover { background: #dde8d4; }
    .btn-admin svg { width: 18px; height: 18px; fill: #5a6b4a; }

    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1a1f14;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 14px;
      color: #7a9460;
      margin-bottom: 28px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 540px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      background: #fff;
      border-radius: 14px;
      border: 1px solid #d4e0c4;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: #7a9460;
      box-shadow: 0 4px 16px rgba(55,69,40,0.09);
    }

    .card-icon {
      font-size: 42px;
      line-height: 1;
      flex-shrink: 0;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #7a9460;
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a1f14;
      margin-bottom: 3px;
    }
    .card-desc {
      font-size: 13px;
      color: #5a6b4a;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="nav-row">
    <a class="nav-back" href="https://nooutco.me">← Home</a>
    <a class="btn-admin" href="./AdminTools/ImageManager/" title="Image Manager">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08s-.03-.74-.07-1.08l2.32-1.82a.55.55 0 0 0 .13-.71l-2.2-3.82a.55.55 0 0 0-.67-.24l-2.74 1.1c-.57-.44-1.18-.81-1.86-1.08l-.41-2.92A.544.544 0 0 0 14 2h-4c-.27 0-.5.19-.54.44l-.41 2.92c-.68.27-1.29.64-1.86 1.08L4.45 5.34a.55.55 0 0 0-.67.24L1.58 9.4a.54.54 0 0 0 .13.71l2.32 1.82c-.04.34-.07.69-.07 1.08s.03.74.07 1.08L1.71 15.9a.55.55 0 0 0-.13.71l2.2 3.82c.13.24.41.33.67.24l2.74-1.1c.57.44 1.18.81 1.86 1.08l.41 2.92c.04.25.27.44.54.44h4c.27 0 .5-.19.54-.44l.41-2.92c.68-.27 1.29-.64 1.86-1.08l2.74 1.1c.26.09.54 0 .67-.24l2.2-3.82a.54.54 0 0 0-.13-.71l-2.32-1.81z"/>
      </svg>
    </a>
  </div>

  <h1>Games and Activities</h1>
  <p class="subtitle">Choose a game:</p>

  <div class="list">
    
    <a class="card" href="./IDMatchGame/IDMatchGame/index.html">
      <div class="card-icon">🧩</div>
      <div>
        <div class="card-label">Discrimination Skills</div>
        <div class="card-title">Matching Game</div>
        <div class="card-desc">Find the matching image from a set of choices</div>
      </div>
    </a>

    <a class="card" href="./NameIDGame/NameIDGame/index.html">
      <div class="card-icon">🔤</div>
      <div>
        <div class="card-label">Receptive Language</div>
        <div class="card-title">The Name Game</div>
        <div class="card-desc">Find by name, build receptive language skills</div>
      </div>
    </a>

    <a class="card" href="./FamousPersonGame/">
      <div class="card-icon">🤩</div>
      <div>
        <div class="card-label">Conversation Skills (Advanced)</div>
        <div class="card-title">Famous Person Game</div>
        <div class="card-desc">Reciprocal conversation practice</div>
      </div>
    </a>
    
  </div>

  <script>
    const bgs = [
      '#eaeee7', // sage
      '#e8eef4', // slate blue
      '#f4eae8', // dusty rose
      '#eee8f4', // soft lavender
      '#f4f0e8', // warm cream
      '#e8f4ee', // mint
      '#f4ece8', // peach
      '#eaf0f4', // sky
      '#f0f4e8', // light lime
      '#f4e8f0', // blush
    ];
    document.documentElement.style.setProperty('--bg', bgs[Math.floor(Math.random() * bgs.length)]);
  </script>
</body>
</html>
