<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games — nooutco.me</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Inter, -apple-system, sans-serif;
      background: var(--bg, #eaeee7);
      min-height: 100vh;
      padding: 32px 20px;
      color: #2d3a1f;
    }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 9px 18px;
      border: 1.5px solid #b8cfa0;
      border-radius: 10px;
      background: transparent;
      color: #374528;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 28px;
      transition: background 0.15s;
    }
    .nav-back:hover { background: #dde8d4; }

    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #1a1f14;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 14px;
      color: #7a9460;
      margin-bottom: 28px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 540px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      background: #fff;
      border-radius: 14px;
      border: 1px solid #d4e0c4;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      border-color: #7a9460;
      box-shadow: 0 4px 16px rgba(55,69,40,0.09);
    }

    .card-icon {
      font-size: 42px;
      line-height: 1;
      flex-shrink: 0;
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #7a9460;
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: #1a1f14;
      margin-bottom: 3px;
    }
    .card-desc {
      font-size: 13px;
      color: #5a6b4a;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <a class="nav-back" href="https://nooutco.me">← Home</a>

  <h1>Games and Activities</h1>
  <p class="subtitle">Choose a game:</p>

  <div class="list">
    <a class="card" href="./FamousGame/FamousPerson/TheGame.html">
      <div class="card-icon">🤩</div>
      <div>
        <div class="card-label">Client Activity</div>
        <div class="card-title">Famous Person Game</div>
        <div class="card-desc">Reciprocal conversation practice</div>
      </div>
    </a>

    <a class="card" href="./IDMatchGame/IDMatchGame/index.html">
      <div class="card-icon">🧩</div>
      <div>
        <div class="card-label">Client Activity</div>
        <div class="card-title">Identical Matching Game</div>
        <div class="card-desc">Find the matching image from a set of choices</div>
      </div>
    </a>

    <a class="card" href="./NameIDGame/NameIDGame/index.html">
      <div class="card-icon">🔤</div>
      <div>
        <div class="card-label">Client Activity</div>
        <div class="card-title">The Name Game</div>
        <div class="card-desc">Find by name, build receptive language skills</div>
      </div>
    </a>
  </div>

  <script>
    const bgs = [
      '#eaeee7', // sage
      '#e8eef4', // slate blue
      '#f4eae8', // dusty rose
      '#eee8f4', // soft lavender
      '#f4f0e8', // warm cream
      '#e8f4ee', // mint
      '#f4ece8', // peach
      '#eaf0f4', // sky
      '#f0f4e8', // light lime
      '#f4e8f0', // blush
    ];
    document.documentElement.style.setProperty('--bg', bgs[Math.floor(Math.random() * bgs.length)]);
  </script>
</body>
</html>
