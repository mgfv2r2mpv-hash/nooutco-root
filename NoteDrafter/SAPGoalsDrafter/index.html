<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAP Goals & Planning Tool</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Inter, sans-serif;
      background: #f0f4ec;
      min-height: 100vh;
      padding: 32px 20px;
      color: #2d3a1f;
    }
    .info-tip {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin-left: 6px;
      vertical-align: middle;
    }
    .info-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid #c0d4a8;
      background: #eef4e6;
      color: #5a7040;
      font-size: 11px;
      font-weight: 700;
      cursor: help;
      line-height: 1;
      user-select: none;
    }
    .info-icon:focus { outline: 2px solid #5a7040; outline-offset: 1px; }
    .info-bubble {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      visibility: hidden;
      opacity: 0;
      background: #2d3a1f;
      color: white;
      padding: 9px 12px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 400;
      line-height: 1.55;
      width: 320px;
      text-align: left;
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.12s ease;
      white-space: normal;
      box-shadow: 0 4px 14px rgba(45, 58, 31, 0.18);
    }
    .info-bubble::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #2d3a1f;
    }
    .info-tip:hover .info-bubble,
    .info-tip:focus-within .info-bubble {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const ADMIN_SECRET_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918";
    async function sha256Hex(str) {
      const buf = new TextEncoder().encode(str);
      const digest = await crypto.subtle.digest("SHA-256", buf);
      return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, "0")).join("");
    }
    const hasAdminToken = () => localStorage.getItem("admin_token") === ADMIN_SECRET_HASH;

    const PROVIDERS = {
      gemini:    { label: "Gemini",    placeholder: "AIza...",    keyLabel: "Google AI Studio Key", hint: "Get key at aistudio.google.com",    keyPageUrl: "https://aistudio.google.com/app/apikey",          howToUrl: "https://aistudio.google.com",                          freeTier: true  },
      openai:    { label: "OpenAI",    placeholder: "sk-...",     keyLabel: "OpenAI API Key",       hint: "Get key at platform.openai.com",   keyPageUrl: "https://platform.openai.com/api-keys",             howToUrl: "https://platform.openai.com/docs/quickstart",          freeTier: false },
      anthropic: { label: "Anthropic", placeholder: "sk-ant-...", keyLabel: "Anthropic API Key",    hint: "Get key at console.anthropic.com", keyPageUrl: "https://console.anthropic.com/settings/keys",      howToUrl: "https://docs.anthropic.com/en/api/getting-started",    freeTier: false },
    };

    async function callProvider(provider, apiKey, systemPrompt, userPrompt) {
      const res = await fetch("/api/llm-call", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          provider,
          apiKey,
          systemPrompt,
          userPrompt,
          model: provider === "anthropic" ? "claude-haiku-4-5-20251001" : provider === "openai" ? "gpt-4o-mini" : "gemini-2.5-flash",
          maxTokens: 2400,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(`API error ${res.status}: ${err?.error || res.statusText}`);
      }

      const data = await res.json();
      let raw;
      if (provider === "anthropic") raw = data.content.map(b => b.text || "").join("");
      else if (provider === "openai") raw = data.choices[0].message.content;
      else raw = data.candidates[0].content.parts[0].text;

      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error("No JSON found in response. Try again.");
      return JSON.parse(match[0]);
    }

    function InfoTooltip({ text }) {
      return (
        <span className="info-tip">
          <span className="info-icon" tabIndex="0" role="button" aria-label="More information">i</span>
          <span className="info-bubble" role="tooltip">{text}</span>
        </span>
      );
    }

    function Tip({ text }) {
      return (
        <div style={{
          fontSize: 12,
          color: "#5a7040",
          background: "#eef4e6",
          border: "1px solid #c8dba8",
          borderRadius: 7,
          padding: "7px 11px",
          marginBottom: 10,
          lineHeight: 1.55,
        }}>{text}</div>
      );
    }

    const SMART_TOOLTIP = "SMART goals are: Specific (clearly defines the target behavior and context — what, where, with whom), Measurable (includes quantifiable criteria, e.g. \"4 out of 5 opportunities\" or \"80% accuracy\"), Achievable (realistic within the authorization period given the client's current baseline), Relevant (tied to the client's diagnosis, functional independence, and medical necessity — not academics), and Time-bound (specifies a timeframe, e.g. \"within 1 authorization period\" or \"across 3 consecutive sessions\").";

    const SYSTEM_PROMPT = `You are a BCBA writing a Service Authorization Plan (SAP) for behavior technicians to implement. Write concise, operational procedures — no rationale paragraphs, no clinical prose, no padding. Staff are trained; do not explain ABA concepts.

Given a treatment goal and SAP specifications, return ONLY a JSON object (no markdown fences, no preamble) with this exact structure:

{
  "refinedGoal": "Refined SMART goal that funders will accept. Preserve the clinician's wording wherever possible — if the input already contains all five SMART elements (Specific target + context, Measurable quantitative criterion such as '80% accuracy' or '4 of 5 opportunities', Achievable, Relevant to functional independence / medical necessity, and an explicit Time-bound phrase such as 'within 1 authorization period' or 'by the end of 1 authorization period'), return it essentially as-is with at most minor polish. Only fill in missing SMART elements; do not rewrite a complete goal. If the timeframe is missing, add 'by the end of 1 authorization period' unless the SAP specs give a different timeframe. Equivalent timeframe phrasings already present in the input (e.g. 'within 1 authorization period', 'across 3 consecutive sessions within 1 authorization period') satisfy the time-bound requirement and must not be replaced.",
  "exercise": {
    "purpose": "* [one-line functional domain or skill deficit addressed]\n* [one-line functional outcome or independence gain]",
    "teachingStrategy": "[Method name]. [One sentence on application — no rationale paragraph.]",
    "lessonSetUp": "* [setup item]\n* [setup item]\n* [setup item if needed]",
    "sd": "* [What adult says/does — use [CLIENT] for the client]\ne.g., [3 example questions/demands in neutral third-person, not 'you']\n* [Delivery condition, e.g. 'once, at conversational volume, after [CLIENT] is attending']",
    "correctResponse": "+ [criterion]\n+ [criterion]\n+ [criterion if needed]",
    "incorrectResponse": "- [criterion]\n- [criterion]\n- [criterion if needed]",
    "masteryCriteria": "Minimum [N] trials at [X]% accuracy across [N] consecutive sessions.",
    "promptHierarchy": "Use [Least-to-Most or Most-to-Least] Prompting\n* I — Independent: [brief description]\n* G — Gesture: [brief description]\n* PV — Partial Verbal: [brief description]\n* FV — Full Verbal: [brief description]"
  },
  "generalization": {
    "criteria": "[2–3 sentences: contexts, people, stimuli. No padding.]",
    "maintenance": "[Schedule, probe structure, accuracy threshold. 2–4 sentences.]"
  },
  "errorCorrection": {
    "initial": "(1) [step]\n(2) [step]\n(3) [step]\n\n[One additional rule if warranted — omit if not]",
    "maintenance": "(1) [step]\n(2) [step]\n[One additional rule if warranted — omit if not]"
  }
}

Style rules — follow exactly:
- Use [CLIENT] everywhere in place of any client name or "the client" in procedures
- Use * for general bullets, + for correct response items, - for incorrect response items
- Prompt hierarchy: always I, G, PV, FV notation unless specs specify otherwise
- masteryCriteria: exactly one line
- No sentence starting with "It is important to", "Rationale:", "This ensures", "Note that", or similar
- Lesson Set Up: actual setup steps only — no reminders about data sheets or timers
- SD examples: neutral third-person phrasing ("What is the bear doing?" not "What are you doing?")
- Keep every section as short as operationally complete allows

Terminology standards (apply rigorously — these are non-negotiable for BCBA-written procedures):
- Reinforcement is contingent on behavior, never delivered to people. Never write "[CLIENT] is reinforced" or "reinforce [CLIENT]." Write "deliver reinforcement contingent on [target behavior]," "reinforce [the target response]," or "[behavior] is reinforced on [schedule]."
- People engage in behaviors; behaviors are what get reinforced, prompted, faded, shaped, or extinguished. Do not conflate the two.
- Use precise behavior-analytic verbs and procedure names (prompt, fade, model, shape, chain, present the SD, deliver/withhold reinforcement, run a probe, conduct a trial, mass trial, intersperse). Do not substitute loose synonyms ("reward," "encourage," "motivate") and do not write to sound sophisticated.
- Name procedures specifically (e.g., errorless teaching, DRO, DRA, differential reinforcement, time delay, BST) rather than generic phrases like "support."
- Plain operational language only. No filler, no value-laden phrasing.

    function buildUserPrompt(goal, sapSpecs) {
      return `Treatment Goal:\n${goal}\n\nSAP Specifications:\n${sapSpecs.trim() || "(No additional specifications provided — apply standard best-practice defaults.)"}`;
    }

    function buildGeneratePrompt(goal, sapSpecs) {
      const sys = `You are a BCBA writing a Service Authorization Plan (SAP) for behavior technicians. Write concise, operational procedures — no rationale, no prose padding. Staff are trained.

Terminology standards (apply rigorously):
- Reinforcement is contingent on behavior, never delivered to people. Never write "[CLIENT] is reinforced." Write "deliver reinforcement contingent on [behavior]," "reinforce [target response]," or "[behavior] is reinforced on [schedule]."
- People engage in behaviors; behaviors are what get reinforced, prompted, faded, shaped, or extinguished. Do not conflate the two.
- Use precise behavior-analytic verbs and named procedures (prompt, fade, model, shape, chain, present the SD, errorless teaching, DRO, DRA, time delay, BST). Do not substitute loose synonyms ("reward," "encourage," "motivate"). Do not write to sound sophisticated — plain operational language only.

Given a treatment goal and SAP specifications, return exactly the following labeled sections (label on its own line, content below, blank line before next label). No preamble, no commentary after the last section.

REFINED TREATMENT GOAL
[Refined SMART goal that funders will accept. Preserve the clinician's wording wherever possible — if the input already contains all five SMART elements (Specific target + context, Measurable quantitative criterion, Achievable, Relevant to functional independence / medical necessity, and an explicit Time-bound phrase such as "within 1 authorization period" or "by the end of 1 authorization period"), return it essentially as-is with at most minor polish. Only fill in missing SMART elements; do not rewrite a complete goal. If the timeframe is missing, add "by the end of 1 authorization period" unless the SAP specs override. Equivalent timeframe phrasings already in the input satisfy the time-bound requirement and must not be replaced.]

EXERCISE
Purpose:
[* two one-line bullet points — functional domain and outcome]

Teaching Strategy:
[Method name. One sentence on application.]

Lesson Set Up:
[* bullet list of actual setup steps — no data sheet reminders]

SD (Demand / Discriminative Stimulus):
[* What adult says/does — use [CLIENT] for client]
[e.g., 3 example questions/demands in neutral third-person]
[* Delivery condition]

Correct Response:
[+ criterion]
[+ criterion]

Incorrect Response:
[- criterion]
[- criterion]

Mastery Criteria:
[One line: Minimum N trials at X% accuracy across N consecutive sessions.]

Prompt Hierarchy:
Use [Least-to-Most or Most-to-Least] Prompting
[* I — Independent: brief description]
[* G — Gesture: brief description]
[* PV — Partial Verbal: brief description]
[* FV — Full Verbal: brief description]

GENERALIZATION
Generalization Criteria:
[2–3 sentences: conditions, contexts, people, stimuli]

Maintenance Criteria:
[Schedule, probe structure, accuracy threshold. 2–4 sentences.]

ERROR CORRECTION
During Initial Teaching:
[(1) step]
[(2) step]
[(3) step]
[One additional rule if warranted]

During Maintenance:
[(1) step]
[(2) step]
[One additional rule if warranted]

Note: After 2 consecutive maintenance probes below Maintenance Criteria, contact BCBA so a skill can re-enter teaching.`;

      const user = `Treatment Goal:\n${goal}\n\nSAP Specifications:\n${sapSpecs.trim() || "(No additional specifications — apply best-practice defaults.)"}`;
      return `${sys}\n\n---\n\n${user}`;
    }

    function formatExercise(ex) {
      return [
        ex.purpose           && `Purpose:\n${ex.purpose}`,
        ex.teachingStrategy  && `Teaching Strategy:\n${ex.teachingStrategy}`,
        ex.lessonSetUp       && `Lesson Set Up:\n${ex.lessonSetUp}`,
        ex.sd                && `SD (Demand / Discriminative Stimulus):\n${ex.sd}`,
        ex.correctResponse   && `Correct Response:\n${ex.correctResponse}`,
        ex.incorrectResponse && `Incorrect Response:\n${ex.incorrectResponse}`,
        ex.masteryCriteria   && `Mastery Criteria:\n${ex.masteryCriteria}`,
        ex.promptHierarchy   && `Prompt Hierarchy:\n${ex.promptHierarchy}`,
      ].filter(Boolean).join("\n\n");
    }

    function formatGeneralization(gen) {
      return [
        gen.criteria    && `Generalization Criteria:\n${gen.criteria}`,
        gen.maintenance && `Maintenance Criteria:\n${gen.maintenance}`,
      ].filter(Boolean).join("\n\n");
    }

    function formatErrorCorrection(ec) {
      return [
        ec.initial     && `During Initial Teaching:\n${ec.initial}`,
        ec.maintenance && `During Maintenance:\n${ec.maintenance}`,
        "Note: After 2 consecutive maintenance probes below Maintenance Criteria, contact BCBA so a skill can re-enter teaching.",
      ].filter(Boolean).join("\n\n");
    }

    function ApiKeyHelpBox({ provider }) {
      const prov = PROVIDERS[provider];
      return (
        <div style={{ marginTop: 10, background: "#f7fbf3", border: "1px solid #c0d4a8", borderRadius: 8, padding: "12px 16px", fontSize: 13, color: "#374528", lineHeight: 1.6 }}>
          <p style={{ fontWeight: 600, marginBottom: 5 }}>What is an API key?</p>
          <p style={{ marginBottom: 8 }}>An API key is like a personal access code that lets this tool connect directly to an AI service on your behalf — so you don't have to copy and paste. You create one on the AI provider's website; it stays in your browser and is never shared.</p>
          <p>
            <a href={prov.howToUrl} target="_blank" rel="noopener noreferrer" style={{ color: "#374528", fontWeight: 600 }}>How to get a {prov.label} API key →</a>
            {prov.freeTier && <span style={{ marginLeft: 10, background: "#d4edda", color: "#155724", padding: "2px 8px", borderRadius: 12, fontSize: 11, fontWeight: 700 }}>Free tier available</span>}
          </p>
        </div>
      );
    }

    function ApiErrorMessage({ error, rawError, provider, isAdmin, onGeneratePrompt }) {
      if (!error) return null;
      const isApiError = /API error \d{3}/i.test(error) || error === "NO_KEY";
      if (!isApiError) return <p style={{ color: "#c0392b", fontSize: 13, marginBottom: 12 }}>{error}</p>;

      const prov = PROVIDERS[provider];
      const statusMatch = error.match(/error (\d{3})/i);
      const status = statusMatch ? parseInt(statusMatch[1]) : null;

      let heading, body, actions, showOptions = false;
      if (error === "NO_KEY") {
        heading = "You'll need an API key to use direct generation.";
        body = "An API key is a free personal access code from the AI provider. Once you add it above, this tool connects directly and builds your note automatically.";
        actions = [{ href: prov.keyPageUrl, text: `Get your ${prov.label} API key →` }];
        if (!prov.freeTier) actions.push({ href: PROVIDERS.gemini.keyPageUrl, text: "Or try Gemini — it has a free tier →" });
      } else if (status === 401 || status === 403) {
        heading = "Your API key wasn't accepted.";
        body = "Double-check that you copied the full key exactly — even one missing character will cause this error. Keys can be regenerated on the provider's website if needed.";
        actions = [{ href: prov.keyPageUrl, text: `Review your ${prov.label} API keys →` }];
      } else if (status === 429) {
        heading = "The AI service is temporarily busy or you've hit a usage limit.";
        body = "This can happen if the service is under heavy load or you've used your free quota for today. Try again in a few minutes, or use one of the options below.";
        actions = []; showOptions = true;
      } else if (status === 402) {
        heading = "Your API account needs funds to continue.";
        body = "The AI service rejected the request because your account balance is too low. You can add credits, switch to a service with a free tier, or use Generate Prompt for free.";
        actions = []; showOptions = true;
      } else {
        heading = "Something went wrong generating your note.";
        body = "Check your API key and try again. If the problem continues, the service may be temporarily unavailable.";
        actions = [{ href: prov.keyPageUrl, text: `Check your ${prov.label} API keys →` }];
      }

      return (
        <div style={{ background: "#fff5f5", border: "1.5px solid #e8b4b4", borderRadius: 9, padding: "14px 18px", marginBottom: 12, fontSize: 13, lineHeight: 1.6 }}>
          <p style={{ fontWeight: 700, color: "#7a2020", marginBottom: 5 }}>{heading}</p>
          <p style={{ color: "#5a3030", marginBottom: (showOptions || (actions && actions.length)) ? 10 : 0 }}>{body}</p>
          {actions && actions.map((a, i) => (
            <p key={i} style={{ marginBottom: 4 }}><a href={a.href} target="_blank" rel="noopener noreferrer" style={{ color: "#374528", fontWeight: 600 }}>{a.text}</a></p>
          ))}
          {showOptions && (
            <ul style={{ margin: "4px 0 0", paddingLeft: 18, color: "#5a3030", display: "flex", flexDirection: "column", gap: 5 }}>
              <li><strong>Use Generate Prompt (free, no key needed):</strong>{" "}<a href="#" onClick={e => { e.preventDefault(); onGeneratePrompt(); }} style={{ color: "#374528", fontWeight: 600 }}>Click here to generate a prompt</a>{" "}you can paste into any free AI chat like ChatGPT or Gemini.</li>
              {provider !== "gemini" && <li><strong>Try Gemini's free tier:</strong>{" "}Switch the provider above to Gemini and{" "}<a href={PROVIDERS.gemini.keyPageUrl} target="_blank" rel="noopener noreferrer" style={{ color: "#374528", fontWeight: 600 }}>get a free API key here</a>.</li>}
              <li><strong>Add funds to your account:</strong>{" "}<a href={prov.keyPageUrl} target="_blank" rel="noopener noreferrer" style={{ color: "#374528", fontWeight: 600 }}>Visit {prov.label} to manage your account →</a></li>
            </ul>
          )}
          {isAdmin && rawError && (
            <div style={{ marginTop: 10 }} className="info-tip">
              <span style={{ fontSize: 12, color: "#7a2020", cursor: "help", borderBottom: "1px dashed #e8b4b4" }}>Technical details ▾</span>
              <span className="info-bubble" role="tooltip" style={{ width: 360, fontFamily: "monospace", fontSize: 11, whiteSpace: "pre-wrap", wordBreak: "break-all", textAlign: "left" }}>
                {rawError}
                <button onClick={() => navigator.clipboard.writeText(rawError)} style={{ display: "block", marginTop: 8, padding: "3px 10px", fontSize: 11, borderRadius: 5, border: "1px solid #c0d4a8", background: "white", cursor: "pointer", color: "#374528" }}>Copy error</button>
              </span>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [provider, setProvider] = React.useState(() => localStorage.getItem("sap_provider") || "gemini");
      const [apiKey,   setApiKey]   = React.useState(() => localStorage.getItem(`sap_key_${localStorage.getItem("sap_provider") || "gemini"}`) || "");
      const [showKey,  setShowKey]  = React.useState(false);
      const [isAdmin,  setIsAdmin]  = React.useState(() => hasAdminToken());

      const [goal,     setGoal]     = React.useState("");
      const [sapSpecs, setSapSpecs] = React.useState("");

      const [output,       setOutput]       = React.useState(null);
      const [loading,      setLoading]      = React.useState(false);
      const [error,        setError]        = React.useState("");
      const [rawError,     setRawError]     = React.useState("");
      const [copied,       setCopied]       = React.useState(null);
      const [promptText,   setPromptText]   = React.useState("");
      const [copiedPrompt, setCopiedPrompt] = React.useState(false);

      React.useEffect(() => {
        const onStorage = () => setIsAdmin(hasAdminToken());
        window.addEventListener("storage", onStorage);
        return () => window.removeEventListener("storage", onStorage);
      }, []);

      const switchProvider = (p) => {
        setProvider(p);
        localStorage.setItem("sap_provider", p);
        setApiKey(localStorage.getItem(`sap_key_${p}`) || "");
        setError(""); setRawError("");
      };

      const saveApiKey = (val) => {
        setApiKey(val);
        if (val) localStorage.setItem(`sap_key_${provider}`, val);
        else     localStorage.removeItem(`sap_key_${provider}`);
      };

      const validate = () => {
        if (!goal.trim()) return "Please enter a treatment goal.";
        return null;
      };

      const handleGenerate = async () => {
        const err = validate();
        if (err) { setError(err); return; }
        if (!apiKey.trim()) { setError("NO_KEY"); setRawError(""); return; }
        setError(""); setRawError(""); setLoading(true); setOutput(null);
        try {
          const parsed = await callProvider(provider, apiKey, SYSTEM_PROMPT, buildUserPrompt(goal, sapSpecs));
          setOutput({
            refinedGoal:    parsed.refinedGoal || "",
            exercise:       formatExercise(parsed.exercise || {}),
            generalization: formatGeneralization(parsed.generalization || {}),
            errorCorrection: formatErrorCorrection(parsed.errorCorrection || {}),
          });
          setPromptText("");
        } catch (e) {
          setRawError(e.message || "");
          setError(e.message || "API error: generation failed");
        } finally {
          setLoading(false);
        }
      };

      const handleGeneratePrompt = () => {
        const err = validate();
        if (err) { setError(err); return; }
        setError(""); setRawError("");
        setPromptText(buildGeneratePrompt(goal, sapSpecs));
        setCopiedPrompt(false);
      };

      const handleCopyAll = () => {
        if (!output) return;
        const text = [
          output.refinedGoal    && `Treatment Goal (Refined):\n${output.refinedGoal}`,
          output.exercise       && `Exercise\n${output.exercise}`,
          output.generalization && `Generalization\n${output.generalization}`,
          output.errorCorrection && `Error Correction\n${output.errorCorrection}`,
        ].filter(Boolean).join("\n\n");
        navigator.clipboard.writeText(text);
        setCopied("all");
        setTimeout(() => setCopied(null), 1800);
      };

      const card      = { background: "white", borderRadius: 12, border: "1px solid #c0d4a8", padding: 24, marginBottom: 20 };
      const subLbl    = { fontSize: 15, fontWeight: 700, color: "#2d3a1f", display: "block", marginBottom: 6 };
      const lbl       = { fontSize: 13, fontWeight: 600, color: "#374528", textTransform: "uppercase", letterSpacing: "0.04em", display: "block", marginBottom: 8 };
      const hint      = { fontSize: 12, color: "#7a9460", marginBottom: 10, lineHeight: 1.55 };
      const inputBase = { width: "100%", padding: "10px 14px", borderRadius: 8, border: "1.5px solid #c0d4a8", fontSize: 14, color: "#2d3a1f", background: "#fafcf8" };
      const prov      = PROVIDERS[provider];

      return (
        <div style={{ maxWidth: 820, margin: "0 auto" }}>

          {/* Header */}
          <div style={{ marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <h1 style={{ fontSize: 26, fontWeight: 700, color: "#2d3a1f", marginBottom: 4 }}>SAP Goals & Planning Tool</h1>
              <p style={{ fontSize: 14, color: "#5a6b4a" }}>Enter a treatment goal and SAP specifications — generate a prompt or draft a complete Service Authorization Plan for clinical review.</p>
            </div>
            <a href="/" style={{ padding: "7px 16px", borderRadius: 8, border: "1.5px solid #c0d4a8", background: "white", color: "#374528", fontSize: 13, fontWeight: 600, textDecoration: "none", whiteSpace: "nowrap", marginLeft: 16 }}>← Back</a>
          </div>

          {/* Disclaimer */}
          <div style={{ marginBottom: 24, padding: "14px 18px", borderRadius: 10, border: "1.5px solid #d4b483", background: "#fdf6e8", color: "#5a4420", fontSize: 13, lineHeight: 1.55 }}>
            <strong style={{ color: "#7a5a1a" }}>Disclaimer:</strong> Use of these AI-assisted queries is subject to the legal and regulatory constraints of the user's jurisdiction. These tools do not remove the user's responsibility to review all output for accuracy and to maintain compliance with the ethical standards of their credentialing board for professional behavior analysis work.{" "}
            <strong style={{ color: "#7a5a1a" }}>Do not enter any PHI (Protected Health Information) into this tool.</strong> PHI is any detail that could identify a specific client — including names, dates of birth, addresses, phone numbers, ID or insurance numbers, or any other personal identifiers.
          </div>

          {/* API Settings */}
          <div style={card}>
            <div style={{ marginBottom: 20 }}>
              <p style={lbl}>AI Provider</p>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {Object.entries(PROVIDERS).map(([id, p]) => (
                  <button key={id} onClick={() => switchProvider(id)} style={{
                    padding: "8px 18px", borderRadius: 8,
                    border: provider === id ? "2px solid #374528" : "1.5px solid #c0d4a8",
                    background: provider === id ? "#374528" : "white",
                    color: provider === id ? "white" : "#374528",
                    fontWeight: 600, fontSize: 14, cursor: "pointer",
                  }}>{p.label}</button>
                ))}
              </div>
            </div>
            <div>
              <label style={lbl}>{prov.keyLabel}</label>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <input
                  type={showKey ? "text" : "password"}
                  value={apiKey}
                  onChange={e => saveApiKey(e.target.value)}
                  placeholder={prov.placeholder}
                  style={{ ...inputBase, flex: 1 }}
                />
                <button onClick={() => setShowKey(v => !v)} style={{ padding: "9px 14px", borderRadius: 8, border: "1.5px solid #c0d4a8", background: "white", color: "#374528", fontSize: 13, cursor: "pointer" }}>
                  {showKey ? "Hide" : "Show"}
                </button>
              </div>
              <p style={{ fontSize: 12, color: "#7a9460", marginTop: 7 }}>{prov.hint} — saved in this browser only.</p>
              <ApiKeyHelpBox provider={provider} />
            </div>
          </div>

          {/* Treatment Goal */}
          <div style={card}>
            <label style={subLbl}>
              Treatment Goal
              <InfoTooltip text={SMART_TOOLTIP} />
            </label>
            <p style={hint}>
              Write a SMART goal tied to the client's diagnosis and functional needs — without PHI. Hover the{" "}
              <span style={{ display: "inline-flex", width: 15, height: 15, borderRadius: "50%", border: "1px solid #c0d4a8", background: "#eef4e6", color: "#5a7040", fontSize: 10, fontWeight: 700, alignItems: "center", justifyContent: "center", verticalAlign: "middle" }}>i</span>
              {" "}icon to see what makes a goal SMART.
            </p>
            <textarea
              value={goal}
              onChange={e => setGoal(e.target.value)}
              placeholder={"e.g., [Client] will independently request preferred items or activities using their AAC device in 4 out of 5 opportunities, absent behaviors targeted for reduction, across 3 consecutive sessions within 1 authorization period, as measured by direct observation during structured and unstructured activities."}
              style={{ ...inputBase, height: 120, resize: "vertical", lineHeight: 1.6 }}
            />
            <p style={{ fontSize: 12, color: "#aaa", marginTop: 4 }}>{goal.length} characters</p>
          </div>

          {/* SAP Specifications */}
          <div style={card}>
            <label style={subLbl}>SAP Specifications</label>
            <Tip text={"The AI will draft a best-practice SAP template based on your goal — but it has no access to client-specific details. Include relevant considerations here (without PHI): teaching format (DTT vs NET), prompt hierarchy preferences, number of trials, mastery criteria, generalization targets (settings, people, stimuli), error correction protocol, session structure, or any deviations from standard practice. The more context you provide, the more tailored the draft will be."} />
            <textarea
              value={sapSpecs}
              onChange={e => setSapSpecs(e.target.value)}
              placeholder={"Bullet points or fragments are fine, e.g.:\n- DTT format, 10 trials per session\n- Least to most prompt hierarchy\n- Mastery: 80% accuracy across 3 consecutive sessions\n- Generalize across 3 staff and 2 settings\n- Error correction: no-no prompt during acquisition\n- Maintenance: same error correction as acquisition"}
              style={{ ...inputBase, height: 150, resize: "vertical", lineHeight: 1.6 }}
            />
            <p style={{ fontSize: 12, color: "#aaa", marginTop: 4 }}>{sapSpecs.length} characters</p>
          </div>

          {/* Error + Buttons */}
          <div style={{ marginBottom: 20 }}>
            <ApiErrorMessage error={error} rawError={rawError} provider={provider} isAdmin={isAdmin} onGeneratePrompt={handleGeneratePrompt} />
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <button onClick={handleGenerate} disabled={loading} style={{
                padding: "11px 28px", borderRadius: 8, border: "none",
                background: loading ? "#a0b890" : "#374528",
                color: "white", fontSize: 15, fontWeight: 600,
                cursor: loading ? "not-allowed" : "pointer",
              }}>
                {loading ? "Generating…" : "Generate SAP"}
              </button>
              <button onClick={handleGeneratePrompt} style={{
                padding: "11px 18px", borderRadius: 8,
                border: "1.5px solid #374528",
                background: "white", color: "#374528",
                fontSize: 14, fontWeight: 600, cursor: "pointer",
              }}>
                Generate Prompt
              </button>
            </div>
          </div>

          {/* Generated Prompt */}
          {promptText && (
            <div style={card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <div>
                  <h2 style={{ fontSize: 17, fontWeight: 700, color: "#2d3a1f" }}>Generated Prompt</h2>
                  <p style={{ fontSize: 13, color: "#5a6b4a", marginTop: 3 }}>Copy and paste into your AI of choice. It will return a refined SMART goal and complete SAP draft — no preamble, no editorializing.</p>
                </div>
                <button
                  onClick={() => { navigator.clipboard.writeText(promptText); setCopiedPrompt(true); setTimeout(() => setCopiedPrompt(false), 1800); }}
                  style={{ padding: "7px 16px", borderRadius: 7, border: "1.5px solid #374528", background: "white", color: "#374528", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", marginLeft: 16 }}
                >
                  {copiedPrompt ? "Copied!" : "Copy"}
                </button>
              </div>
              <textarea
                readOnly
                value={promptText}
                style={{ width: "100%", minHeight: 240, padding: 12, borderRadius: 8, border: "1px solid #c0d4a8", fontSize: 13, color: "#2d3a1f", lineHeight: 1.6, resize: "vertical", background: "#f7fbf3", fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace" }}
              />
            </div>
          )}

          {/* Generated SAP Output (admin) */}
          {output && (
            <div style={{ ...card, marginBottom: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <h2 style={{ fontSize: 17, fontWeight: 700, color: "#2d3a1f" }}>Generated SAP Draft</h2>
                <button
                  onClick={handleCopyAll}
                  style={{ padding: "7px 16px", borderRadius: 7, border: "1.5px solid #374528", background: "white", color: "#374528", fontSize: 13, fontWeight: 600, cursor: "pointer" }}
                >
                  {copied === "all" ? "Copied!" : "Copy All"}
                </button>
              </div>

              <p style={{ fontSize: 12, color: "#7a9460", marginBottom: 16, fontStyle: "italic" }}>All sections are editable — review and refine before using in an authorization.</p>

              {[
                { id: "refinedGoal",    label: "Treatment Goal (Refined)",  height: 100 },
                { id: "exercise",       label: "Exercise",                  height: 420 },
                { id: "generalization", label: "Generalization",            height: 180 },
                { id: "errorCorrection",label: "Error Correction",          height: 220 },
              ].map(({ id, label, height }) => (
                <div key={id} style={{ borderRadius: 9, border: "1px solid #ddecd0", background: "#f7fbf3", padding: 16, marginBottom: 14 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                    <span style={{ fontSize: 13, fontWeight: 700, color: "#374528" }}>{label}</span>
                    <button
                      onClick={() => { navigator.clipboard.writeText(output[id] || ""); setCopied(id); setTimeout(() => setCopied(null), 1800); }}
                      style={{ padding: "4px 12px", borderRadius: 6, border: "1px solid #c0d4a8", background: "white", color: "#374528", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", marginLeft: 12 }}
                    >
                      {copied === id ? "Copied!" : "Copy"}
                    </button>
                  </div>
                  <textarea
                    value={output[id] || ""}
                    onChange={e => setOutput(prev => ({ ...prev, [id]: e.target.value }))}
                    style={{ width: "100%", minHeight: height, padding: 10, borderRadius: 7, border: "1px solid #c0d4a8", fontSize: 14, color: "#2d3a1f", lineHeight: 1.65, resize: "vertical", background: "white", fontFamily: "inherit" }}
                  />
                </div>
              ))}
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
