<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAP Goals & Planning Tool</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Inter, sans-serif;
      background: #f0f4ec;
      min-height: 100vh;
      padding: 32px 20px;
      color: #2d3a1f;
    }
    .info-tip {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin-left: 6px;
      vertical-align: middle;
    }
    .info-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid #c0d4a8;
      background: #eef4e6;
      color: #5a7040;
      font-size: 11px;
      font-weight: 700;
      cursor: help;
      line-height: 1;
      user-select: none;
    }
    .info-icon:focus { outline: 2px solid #5a7040; outline-offset: 1px; }
    .info-bubble {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      visibility: hidden;
      opacity: 0;
      background: #2d3a1f;
      color: white;
      padding: 9px 12px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 400;
      line-height: 1.55;
      width: 320px;
      text-align: left;
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.12s ease;
      white-space: normal;
      box-shadow: 0 4px 14px rgba(45, 58, 31, 0.18);
    }
    .info-bubble::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #2d3a1f;
    }
    .info-tip:hover .info-bubble,
    .info-tip:focus-within .info-bubble {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const ADMIN_SECRET_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918";
    async function sha256Hex(str) {
      const buf = new TextEncoder().encode(str);
      const digest = await crypto.subtle.digest("SHA-256", buf);
      return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, "0")).join("");
    }
    const hasAdminToken = () => localStorage.getItem("admin_token") === ADMIN_SECRET_HASH;

    const PROVIDERS = {
      gemini:    { label: "Gemini",    placeholder: "AIza...",     keyLabel: "Google AI Studio Key",  hint: "Get key at aistudio.google.com" },
      openai:    { label: "OpenAI",    placeholder: "sk-...",      keyLabel: "OpenAI API Key",        hint: "Get key at platform.openai.com" },
      anthropic: { label: "Anthropic", placeholder: "sk-ant-...", keyLabel: "Anthropic API Key",     hint: "Get key at console.anthropic.com" },
    };

    async function callProvider(provider, apiKey, systemPrompt, userPrompt) {
      const res = await fetch("/api/llm-call", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          provider,
          apiKey,
          systemPrompt,
          userPrompt,
          model: provider === "anthropic" ? "claude-haiku-4-5-20251001" : provider === "openai" ? "gpt-4o-mini" : "gemini-2.5-flash",
          maxTokens: 2400,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(`API error ${res.status}: ${err?.error || res.statusText}`);
      }

      const data = await res.json();
      let raw;
      if (provider === "anthropic") raw = data.content.map(b => b.text || "").join("");
      else if (provider === "openai") raw = data.choices[0].message.content;
      else raw = data.candidates[0].content.parts[0].text;

      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error("No JSON found in response. Try again.");
      return JSON.parse(match[0]);
    }

    function InfoTooltip({ text }) {
      return (
        <span className="info-tip">
          <span className="info-icon" tabIndex="0" role="button" aria-label="More information">i</span>
          <span className="info-bubble" role="tooltip">{text}</span>
        </span>
      );
    }

    function Tip({ text }) {
      return (
        <div style={{
          fontSize: 12,
          color: "#5a7040",
          background: "#eef4e6",
          border: "1px solid #c8dba8",
          borderRadius: 7,
          padding: "7px 11px",
          marginBottom: 10,
          lineHeight: 1.55,
        }}>{text}</div>
      );
    }

    const SMART_TOOLTIP = "SMART goals are: Specific (clearly defines the target behavior and context — what, where, with whom), Measurable (includes quantifiable criteria, e.g. \"4 out of 5 opportunities\" or \"80% accuracy\"), Achievable (realistic within the authorization period given the client's current baseline), Relevant (tied to the client's diagnosis, functional independence, and medical necessity — not academics), and Time-bound (specifies a timeframe, e.g. \"within 1 authorization period\" or \"across 3 consecutive sessions\").";

    const SYSTEM_PROMPT = `You are an expert BCBA (Board Certified Behavior Analyst) specializing in Applied Behavior Analysis skill programming and Service Authorization Plans (SAPs).

Given a treatment goal and SAP specifications, you will:
1. Refine the goal to be SMART (Specific, Measurable, Achievable, Relevant, Time-bound) and explicitly tied to medical necessity and functional improvement. Keep the core behavior and intent of the original goal.
2. Generate a complete SAP draft for the goal using best-practice ABA methodology, incorporating the provided specifications.

Return ONLY a JSON object — no markdown fences, no preamble, no commentary — with this exact structure:
{
  "refinedGoal": "the complete refined SMART goal",
  "exercise": {
    "purpose": "1-2 bullet points anchored to medical necessity and the functional domain addressed by this goal",
    "teachingStrategy": "description of the primary teaching method (e.g., DTT, NET, task analysis) and rationale",
    "lessonSetUp": "specific materials, environment, and setup instructions",
    "sd": "the exact discriminative stimulus / demand used to prompt the target behavior",
    "correctResponse": "operationalized definition of what constitutes a correct response",
    "incorrectResponse": "operationalized definition of what constitutes an incorrect or no response",
    "masteryCriteria": "specific measurable mastery criteria (e.g., X% accuracy across N consecutive sessions)",
    "promptHierarchy": "full prompt hierarchy with levels and systematic fading plan"
  },
  "generalization": {
    "criteria": "generalization criteria statement including minimum trials, accuracy threshold, and conditions (stimuli, settings, people)",
    "maintenance": "maintenance probe criteria including schedule and accuracy threshold"
  },
  "errorCorrection": {
    "initial": "error correction procedure during acquisition / initial teaching phase",
    "maintenance": "error correction procedure during maintenance probe phase"
  }
}`;

    function buildUserPrompt(goal, sapSpecs) {
      return `Treatment Goal:\n${goal}\n\nSAP Specifications:\n${sapSpecs.trim() || "(No additional specifications provided — apply standard best-practice defaults.)"}`;
    }

    function buildGeneratePrompt(goal, sapSpecs) {
      const sys = `You are an expert BCBA (Board Certified Behavior Analyst) specializing in ABA skill programming and Service Authorization Plans (SAPs).

Given a treatment goal and SAP specifications, do two things:
1. Refine the goal to be SMART (Specific, Measurable, Achievable, Relevant, Time-bound) and tied to medical necessity. Keep the core behavior and intent of the original.
2. Generate a complete SAP draft using best-practice ABA methodology, incorporating the provided specifications.

Return exactly the following labeled sections (label on its own line, content below, blank line before next label). No preamble, no commentary after the last section. If specifications are absent for a given section, apply evidence-based ABA best-practice defaults and note that BCBA review is recommended.

REFINED TREATMENT GOAL
[the complete refined SMART goal — preserve original behavior, add specificity and timeframe]

EXERCISE — Purpose
[1–2 bullet points tied to medical necessity and the functional domain]

EXERCISE — Teaching Strategy
[primary teaching method — e.g., DTT, NET, task analysis — and brief rationale]

EXERCISE — Lesson Set Up
[specific materials, environment, and setup instructions]

EXERCISE — SD (Discriminative Stimulus)
[the exact discriminative stimulus / demand]

EXERCISE — Correct Response
[operationalized definition of correct response]

EXERCISE — Incorrect Response
[operationalized definition of incorrect or no response]

EXERCISE — Mastery Criteria
[specific measurable mastery criteria]

EXERCISE — Prompt Hierarchy
[full prompt hierarchy with levels and systematic fading plan]

GENERALIZATION — Generalization Criteria
[minimum trials, accuracy threshold, and conditions — stimuli, settings, people]

GENERALIZATION — Maintenance Criteria
[maintenance probe schedule and accuracy threshold]

ERROR CORRECTION — During Initial Teaching
[error correction procedure during acquisition phase]

ERROR CORRECTION — During Maintenance
[error correction procedure during maintenance phase]`;

      const user = `Treatment Goal:\n${goal}\n\nSAP Specifications:\n${sapSpecs.trim() || "(No additional specifications — apply best-practice defaults.)"}`;
      return `${sys}\n\n---\n\n${user}`;
    }

    const SAP_SECTIONS = [
      {
        id: "exercise",
        label: "Exercise",
        fields: [
          { id: "purpose",           label: "Purpose" },
          { id: "teachingStrategy",  label: "Teaching Strategy" },
          { id: "lessonSetUp",       label: "Lesson Set Up" },
          { id: "sd",                label: "SD (Demand / Discriminative Stimulus)" },
          { id: "correctResponse",   label: "Correct Response" },
          { id: "incorrectResponse", label: "Incorrect Response" },
          { id: "masteryCriteria",   label: "Mastery Criteria" },
          { id: "promptHierarchy",   label: "Prompt Hierarchy" },
        ],
      },
      {
        id: "generalization",
        label: "Generalization",
        fields: [
          { id: "criteria",    label: "Generalization Criteria" },
          { id: "maintenance", label: "Maintenance Criteria" },
        ],
      },
      {
        id: "errorCorrection",
        label: "Error Correction",
        fields: [
          { id: "initial",     label: "During Initial Teaching" },
          { id: "maintenance", label: "During Maintenance" },
        ],
      },
    ];

    function App() {
      const [provider, setProvider] = React.useState(() => localStorage.getItem("sap_provider") || "gemini");
      const [apiKey,   setApiKey]   = React.useState(() => localStorage.getItem(`sap_key_${localStorage.getItem("sap_provider") || "gemini"}`) || "");
      const [showKey,  setShowKey]  = React.useState(false);
      const [isAdmin,  setIsAdmin]  = React.useState(() => hasAdminToken());

      const [goal,     setGoal]     = React.useState("");
      const [sapSpecs, setSapSpecs] = React.useState("");

      const [output,       setOutput]       = React.useState(null);
      const [loading,      setLoading]      = React.useState(false);
      const [error,        setError]        = React.useState("");
      const [copied,       setCopied]       = React.useState(null);
      const [promptText,   setPromptText]   = React.useState("");
      const [copiedPrompt, setCopiedPrompt] = React.useState(false);

      React.useEffect(() => {
        const onStorage = () => setIsAdmin(hasAdminToken());
        window.addEventListener("storage", onStorage);
        return () => window.removeEventListener("storage", onStorage);
      }, []);

      const switchProvider = (p) => {
        setProvider(p);
        localStorage.setItem("sap_provider", p);
        setApiKey(localStorage.getItem(`sap_key_${p}`) || "");
        setError("");
      };

      const saveApiKey = (val) => {
        setApiKey(val);
        if (val) localStorage.setItem(`sap_key_${provider}`, val);
        else     localStorage.removeItem(`sap_key_${provider}`);
      };

      const validate = () => {
        if (!goal.trim()) return "Please enter a treatment goal.";
        return null;
      };

      const handleGenerate = async () => {
        const err = validate();
        if (err) { setError(err); return; }
        if (!apiKey.trim()) { setError("Please enter your API key."); return; }
        setError(""); setLoading(true); setOutput(null);
        try {
          const parsed = await callProvider(provider, apiKey, SYSTEM_PROMPT, buildUserPrompt(goal, sapSpecs));
          setOutput(parsed);
          setPromptText("");
        } catch (e) {
          setError(e.message || "Something went wrong. Check your API key and try again.");
        } finally {
          setLoading(false);
        }
      };

      const handleGeneratePrompt = () => {
        const err = validate();
        if (err) { setError(err); return; }
        setError("");
        setPromptText(buildGeneratePrompt(goal, sapSpecs));
        setCopiedPrompt(false);
      };

      const updateOutput = (section, field, value) => {
        setOutput(prev => ({
          ...prev,
          [section]: { ...prev[section], [field]: value },
        }));
      };

      const formatSAPText = () => {
        if (!output) return "";
        let text = `SAP GOALS & PLANNING TOOL\nGenerated: ${new Date().toLocaleString()}\n\n`;
        text += `REFINED TREATMENT GOAL\n${output.refinedGoal || ""}\n\n${"=".repeat(60)}\n\n`;
        text += `EXERCISE\n\n`;
        if (output.exercise?.purpose)           text += `Purpose:\n${output.exercise.purpose}\n\n`;
        if (output.exercise?.teachingStrategy)  text += `Teaching Strategy:\n${output.exercise.teachingStrategy}\n\n`;
        if (output.exercise?.lessonSetUp)       text += `Lesson Set Up:\n${output.exercise.lessonSetUp}\n\n`;
        if (output.exercise?.sd)                text += `SD (Demand / Discriminative Stimulus):\n${output.exercise.sd}\n\n`;
        if (output.exercise?.correctResponse)   text += `Correct Response:\n${output.exercise.correctResponse}\n\n`;
        if (output.exercise?.incorrectResponse) text += `Incorrect Response:\n${output.exercise.incorrectResponse}\n\n`;
        if (output.exercise?.masteryCriteria)   text += `Mastery Criteria:\n${output.exercise.masteryCriteria}\n\n`;
        if (output.exercise?.promptHierarchy)   text += `Prompt Hierarchy:\n${output.exercise.promptHierarchy}\n\n`;
        text += `GENERALIZATION\n\n`;
        if (output.generalization?.criteria)    text += `Generalization Criteria:\n${output.generalization.criteria}\n\n`;
        if (output.generalization?.maintenance) text += `Maintenance Criteria:\n${output.generalization.maintenance}\n\n`;
        text += `ERROR CORRECTION\n\n`;
        if (output.errorCorrection?.initial)     text += `During Initial Teaching:\n${output.errorCorrection.initial}\n\n`;
        if (output.errorCorrection?.maintenance) text += `During Maintenance:\n${output.errorCorrection.maintenance}\n\n`;
        text += `Note: After 2 consecutive maintenance probes below Maintenance Criteria, contact BCBA so a skill can re-enter teaching.\n`;
        return text;
      };

      const handleCopySection = (sectionId) => {
        if (!output) return;
        const section = SAP_SECTIONS.find(s => s.id === sectionId);
        if (!section) return;
        const text = section.fields.map(f => `${f.label}:\n${output[sectionId]?.[f.id] || ""}`).join("\n\n");
        navigator.clipboard.writeText(text);
        setCopied(sectionId);
        setTimeout(() => setCopied(null), 1800);
      };

      const handleCopyAll = () => {
        navigator.clipboard.writeText(formatSAPText());
        setCopied("all");
        setTimeout(() => setCopied(null), 1800);
      };

      const card      = { background: "white", borderRadius: 12, border: "1px solid #c0d4a8", padding: 24, marginBottom: 20 };
      const subLbl    = { fontSize: 15, fontWeight: 700, color: "#2d3a1f", display: "block", marginBottom: 6 };
      const lbl       = { fontSize: 13, fontWeight: 600, color: "#374528", textTransform: "uppercase", letterSpacing: "0.04em", display: "block", marginBottom: 8 };
      const hint      = { fontSize: 12, color: "#7a9460", marginBottom: 10, lineHeight: 1.55 };
      const inputBase = { width: "100%", padding: "10px 14px", borderRadius: 8, border: "1.5px solid #c0d4a8", fontSize: 14, color: "#2d3a1f", background: "#fafcf8" };
      const prov      = PROVIDERS[provider];

      return (
        <div style={{ maxWidth: 820, margin: "0 auto" }}>

          {/* Header */}
          <div style={{ marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <h1 style={{ fontSize: 26, fontWeight: 700, color: "#2d3a1f", marginBottom: 4 }}>SAP Goals & Planning Tool</h1>
              <p style={{ fontSize: 14, color: "#5a6b4a" }}>Enter a treatment goal and SAP specifications — generate a prompt or draft a complete Service Authorization Plan for clinical review.</p>
            </div>
            <a href="/" style={{ padding: "7px 16px", borderRadius: 8, border: "1.5px solid #c0d4a8", background: "white", color: "#374528", fontSize: 13, fontWeight: 600, textDecoration: "none", whiteSpace: "nowrap", marginLeft: 16 }}>← Back</a>
          </div>

          {/* Disclaimer */}
          <div style={{ marginBottom: 24, padding: "14px 18px", borderRadius: 10, border: "1.5px solid #d4b483", background: "#fdf6e8", color: "#5a4420", fontSize: 13, lineHeight: 1.55 }}>
            <strong style={{ color: "#7a5a1a" }}>Disclaimer:</strong> Use of these AI-assisted queries is subject to the legal and regulatory constraints of the user's jurisdiction. These tools do not remove the user's responsibility to review all output for accuracy and to maintain compliance with the ethical standards of their credentialing board for professional behavior analysis work.{" "}
            <strong style={{ color: "#7a5a1a" }}>Do not enter any PHI (Protected Health Information) into this tool.</strong> PHI is any detail that could identify a specific client — including names, dates of birth, addresses, phone numbers, ID or insurance numbers, or any other personal identifiers.
          </div>

          {/* Admin API Settings */}
          {isAdmin && (
            <div style={card}>
              <div style={{ marginBottom: 20 }}>
                <p style={lbl}>AI Provider</p>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {Object.entries(PROVIDERS).map(([id, p]) => (
                    <button key={id} onClick={() => switchProvider(id)} style={{
                      padding: "8px 18px", borderRadius: 8,
                      border: provider === id ? "2px solid #374528" : "1.5px solid #c0d4a8",
                      background: provider === id ? "#374528" : "white",
                      color: provider === id ? "white" : "#374528",
                      fontWeight: 600, fontSize: 14, cursor: "pointer",
                    }}>{p.label}</button>
                  ))}
                </div>
              </div>
              <div>
                <label style={lbl}>{prov.keyLabel}</label>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <input
                    type={showKey ? "text" : "password"}
                    value={apiKey}
                    onChange={e => saveApiKey(e.target.value)}
                    placeholder={prov.placeholder}
                    style={{ ...inputBase, flex: 1 }}
                  />
                  <button onClick={() => setShowKey(v => !v)} style={{ padding: "9px 14px", borderRadius: 8, border: "1.5px solid #c0d4a8", background: "white", color: "#374528", fontSize: 13, cursor: "pointer" }}>
                    {showKey ? "Hide" : "Show"}
                  </button>
                </div>
                <p style={{ fontSize: 12, color: "#7a9460", marginTop: 7 }}>{prov.hint} — saved in this browser only.</p>
              </div>
            </div>
          )}

          {/* Treatment Goal */}
          <div style={card}>
            <label style={subLbl}>
              Treatment Goal
              <InfoTooltip text={SMART_TOOLTIP} />
            </label>
            <p style={hint}>
              Write a SMART goal tied to the client's diagnosis and functional needs — without PHI. Hover the{" "}
              <span style={{ display: "inline-flex", width: 15, height: 15, borderRadius: "50%", border: "1px solid #c0d4a8", background: "#eef4e6", color: "#5a7040", fontSize: 10, fontWeight: 700, alignItems: "center", justifyContent: "center", verticalAlign: "middle" }}>i</span>
              {" "}icon to see what makes a goal SMART.
            </p>
            <textarea
              value={goal}
              onChange={e => setGoal(e.target.value)}
              placeholder={"e.g., [Client] will independently request preferred items or activities using their AAC device in 4 out of 5 opportunities, absent behaviors targeted for reduction, across 3 consecutive sessions within 1 authorization period, as measured by direct observation during structured and unstructured activities."}
              style={{ ...inputBase, height: 120, resize: "vertical", lineHeight: 1.6 }}
            />
            <p style={{ fontSize: 12, color: "#aaa", marginTop: 4 }}>{goal.length} characters</p>
          </div>

          {/* SAP Specifications */}
          <div style={card}>
            <label style={subLbl}>SAP Specifications</label>
            <Tip text={"The AI will draft a best-practice SAP template based on your goal — but it has no access to client-specific details. Include relevant considerations here (without PHI): teaching format (DTT vs NET), prompt hierarchy preferences, number of trials, mastery criteria, generalization targets (settings, people, stimuli), error correction protocol, session structure, or any deviations from standard practice. The more context you provide, the more tailored the draft will be."} />
            <textarea
              value={sapSpecs}
              onChange={e => setSapSpecs(e.target.value)}
              placeholder={"Bullet points or fragments are fine, e.g.:\n- DTT format, 10 trials per session\n- Least to most prompt hierarchy\n- Mastery: 80% accuracy across 3 consecutive sessions\n- Generalize across 3 staff and 2 settings\n- Error correction: no-no prompt during acquisition\n- Maintenance: same error correction as acquisition"}
              style={{ ...inputBase, height: 150, resize: "vertical", lineHeight: 1.6 }}
            />
            <p style={{ fontSize: 12, color: "#aaa", marginTop: 4 }}>{sapSpecs.length} characters</p>
          </div>

          {/* Error + Buttons */}
          <div style={{ marginBottom: 20 }}>
            {error && <p style={{ color: "#c0392b", fontSize: 13, marginBottom: 12 }}>{error}</p>}
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              {isAdmin && (
                <button onClick={handleGenerate} disabled={loading} style={{
                  padding: "11px 28px", borderRadius: 8, border: "none",
                  background: loading ? "#a0b890" : "#374528",
                  color: "white", fontSize: 15, fontWeight: 600,
                  cursor: loading ? "not-allowed" : "pointer",
                }}>
                  {loading ? "Generating…" : "Generate SAP"}
                </button>
              )}
              <button onClick={handleGeneratePrompt} style={{
                padding: "11px 18px", borderRadius: 8,
                border: "1.5px solid #374528",
                background: isAdmin ? "white" : "#374528",
                color: isAdmin ? "#374528" : "white",
                fontSize: 14, fontWeight: 600, cursor: "pointer",
              }}>
                Generate Prompt
              </button>
            </div>
          </div>

          {/* Generated Prompt */}
          {promptText && (
            <div style={card}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <div>
                  <h2 style={{ fontSize: 17, fontWeight: 700, color: "#2d3a1f" }}>Generated Prompt</h2>
                  <p style={{ fontSize: 13, color: "#5a6b4a", marginTop: 3 }}>Copy and paste into your AI of choice. It will return a refined SMART goal and complete SAP draft — no preamble, no editorializing.</p>
                </div>
                <button
                  onClick={() => { navigator.clipboard.writeText(promptText); setCopiedPrompt(true); setTimeout(() => setCopiedPrompt(false), 1800); }}
                  style={{ padding: "7px 16px", borderRadius: 7, border: "1.5px solid #374528", background: "white", color: "#374528", fontSize: 13, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", marginLeft: 16 }}
                >
                  {copiedPrompt ? "Copied!" : "Copy"}
                </button>
              </div>
              <textarea
                readOnly
                value={promptText}
                style={{ width: "100%", minHeight: 240, padding: 12, borderRadius: 8, border: "1px solid #c0d4a8", fontSize: 13, color: "#2d3a1f", lineHeight: 1.6, resize: "vertical", background: "#f7fbf3", fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace" }}
              />
            </div>
          )}

          {/* Generated SAP Output (admin) */}
          {output && (
            <div style={{ ...card, marginBottom: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <h2 style={{ fontSize: 17, fontWeight: 700, color: "#2d3a1f" }}>Generated SAP Draft</h2>
                <button
                  onClick={handleCopyAll}
                  style={{ padding: "7px 16px", borderRadius: 7, border: "1.5px solid #374528", background: "white", color: "#374528", fontSize: 13, fontWeight: 600, cursor: "pointer" }}
                >
                  {copied === "all" ? "Copied!" : "Copy All"}
                </button>
              </div>

              {/* Refined Goal */}
              <div style={{ borderRadius: 9, border: "1px solid #ddecd0", background: "#f7fbf3", padding: 16, marginBottom: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: "#374528" }}>Refined Treatment Goal (SMART)</span>
                  <button
                    onClick={() => { navigator.clipboard.writeText(output.refinedGoal || ""); setCopied("goal"); setTimeout(() => setCopied(null), 1800); }}
                    style={{ padding: "4px 12px", borderRadius: 6, border: "1px solid #c0d4a8", background: "white", color: "#374528", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", marginLeft: 12 }}
                  >
                    {copied === "goal" ? "Copied!" : "Copy"}
                  </button>
                </div>
                <textarea
                  value={output.refinedGoal || ""}
                  onChange={e => setOutput(prev => ({ ...prev, refinedGoal: e.target.value }))}
                  style={{ width: "100%", minHeight: 80, padding: 10, borderRadius: 7, border: "1px solid #c0d4a8", fontSize: 14, color: "#2d3a1f", lineHeight: 1.65, resize: "vertical", background: "white" }}
                />
              </div>

              <p style={{ fontSize: 12, color: "#7a9460", marginBottom: 16, fontStyle: "italic" }}>All sections are editable — review and refine before using in an authorization.</p>

              {/* SAP Sections */}
              {SAP_SECTIONS.map(section => (
                <div key={section.id} style={{ marginBottom: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <h3 style={{ fontSize: 14, fontWeight: 700, color: "#374528", textTransform: "uppercase", letterSpacing: "0.05em" }}>{section.label}</h3>
                    <button
                      onClick={() => handleCopySection(section.id)}
                      style={{ padding: "4px 12px", borderRadius: 6, border: "1px solid #c0d4a8", background: "white", color: "#374528", fontSize: 12, fontWeight: 600, cursor: "pointer" }}
                    >
                      {copied === section.id ? "Copied!" : `Copy ${section.label}`}
                    </button>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {section.fields.map(field => (
                      <div key={field.id} style={{ borderRadius: 9, border: "1px solid #ddecd0", background: "#f7fbf3", padding: 14 }}>
                        <span style={{ fontSize: 12, fontWeight: 700, color: "#374528", display: "block", marginBottom: 6 }}>{field.label}</span>
                        <textarea
                          value={output[section.id]?.[field.id] || ""}
                          onChange={e => updateOutput(section.id, field.id, e.target.value)}
                          style={{ width: "100%", minHeight: 70, padding: 10, borderRadius: 7, border: "1px solid #c0d4a8", fontSize: 14, color: "#2d3a1f", lineHeight: 1.65, resize: "vertical", background: "white" }}
                        />
                      </div>
                    ))}
                  </div>
                  {section.id === "errorCorrection" && (
                    <div style={{ marginTop: 10, padding: "10px 14px", borderRadius: 8, background: "#fdf6e8", border: "1px solid #d4b483", fontSize: 13, color: "#5a4420" }}>
                      <strong>Note:</strong> After 2 consecutive maintenance probes below Maintenance Criteria, contact BCBA so a skill can re-enter teaching.
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
