<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supervision Note Tool</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Inter, sans-serif;
      background: #f0f4ec;
      min-height: 100vh;
      padding: 32px 20px;
      color: #2d3a1f;
    }
    .info-tip {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin-left: 6px;
      vertical-align: middle;
    }
    .info-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid #c0d4a8;
      background: #eef4e6;
      color: #5a7040;
      font-size: 11px;
      font-weight: 700;
      cursor: help;
      line-height: 1;
      user-select: none;
    }
    .info-icon:focus { outline: 2px solid #5a7040; outline-offset: 1px; }
    .info-bubble {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      visibility: hidden;
      opacity: 0;
      background: #2d3a1f;
      color: white;
      padding: 9px 12px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 400;
      line-height: 1.55;
      width: 260px;
      text-align: left;
      z-index: 100;
      pointer-events: none;
      transition: opacity 0.12s ease;
      white-space: normal;
      box-shadow: 0 4px 14px rgba(45, 58, 31, 0.18);
    }
    .info-bubble::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #2d3a1f;
    }
    .info-tip:hover .info-bubble,
    .info-tip:focus-within .info-bubble {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ─── Admin Auth ───────────────────────────────────────────
    // To change the admin password, replace ADMIN_SECRET_HASH below with the
    // SHA-256 hex digest of your new password. Default password: "admin".
    const ADMIN_SECRET_HASH = "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918";
    async function sha256Hex(str) {
      const buf = new TextEncoder().encode(str);
      const digest = await crypto.subtle.digest("SHA-256", buf);
      return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, "0")).join("");
    }
    const hasAdminToken = () => localStorage.getItem("admin_token") === ADMIN_SECRET_HASH;

    const SECTIONS = [
      { id: "progress",    label: "1. Client Narrative Progress",       desc: "Skills / behavior goals" },
      { id: "programming", label: "2. Programming & BIP Changes",        desc: "Made or needed modifications" },
      { id: "feedback",    label: "3. Staff Feedback / Behavior Analyst Modeling",   desc: "Direct service staff or Behavior Analyst-only activities" },
      { id: "followup",    label: "4. Follow-Up Items",                  desc: "Before or for next session" },
    ];

    const PROVIDERS = {
      gemini:    { label: "Gemini",    placeholder: "AIza...",    keyLabel: "Google AI Studio Key", hint: "Get key at aistudio.google.com",    keyPageUrl: "https://aistudio.google.com/app/apikey",          howToUrl: "https://aistudio.google.com",                          freeTier: true  },
      openai:    { label: "OpenAI",    placeholder: "sk-...",     keyLabel: "OpenAI API Key",       hint: "Get key at platform.openai.com",   keyPageUrl: "https://platform.openai.com/api-keys",             howToUrl: "https://platform.openai.com/docs/quickstart",          freeTier: false },
      anthropic: { label: "Anthropic", placeholder: "sk-ant-...", keyLabel: "Anthropic API Key",    hint: "Get key at console.anthropic.com", keyPageUrl: "https://console.anthropic.com/settings/keys",      howToUrl: "https://docs.anthropic.com/en/api/getting-started",    freeTier: false },
    };

    function ApiKeyHelpBox({ provider }) {
      const prov = PROVIDERS[provider];
      return (
        <div style={{ marginTop: 10, background: "#f7fbf3", border: "1px solid #c0d4a8", borderRadius: 8, padding: "12px 16px", fontSize: 13, color: "#374528", lineHeight: 1.6 }}>
          <p style={{ fontWeight: 600, marginBottom: 5 }}>What is an API key?</p>
          <p style={{ marginBottom: 8 }}>An API key is like a personal access code that lets this tool connect directly to an AI service on your behalf — so you don't have to copy and paste. You create one on the AI provider's website; it stays in your browser and is never shared.</p>
          <p>
            <a href={prov.howToUrl} target="_blank" rel="noopener noreferrer" style={{ color: "#374528", fontWeight: 600 }}>How to get a {prov.label} API key →</a>
            {prov.freeTier && <span style={{ marginLeft: 10, background: "#d4edda", color: "#155724", padding: "2px 8px", borderRadius: 12, fontSize: 11, fontWeight: 700 }}>Free tier available</span>}
          </p>
        </div>
      );
    }

    function ApiErrorMessage({ error, rawError, provider, isAdmin, onGeneratePrompt }) {
      if (!error) return null;
      const isApiError = /API error \d{3}/i.test(error) || error === "NO_KEY";
      if (!isApiError) return <p style={{ color: "#c0392b", fontSize: 13, marginBottom: 12 }}>{error}</p>;

      const prov = PROVIDERS[provider];
      const statusMatch = error.match(/error (\d{3})/i);
      const status = statusMatch ? parseInt(statusMatch[1]) : null;

      let heading, body, actions, showOptions = false;
      if (error === "NO_KEY") {
        heading = "You'll need an API key to use direct generation.";
        body = "An API key is a free personal access code from the AI provider. Once you add it above, this tool connects directly and builds your note automatically.";
        actions = [{ href: prov.keyPageUrl, text: `Get your ${prov.label} API key →` }];
        if (!prov.freeTier) actions.push({ href: PROVIDERS.gemini.keyPageUrl, text: "Or try Gemini — it has a free tier →" });
      } else if (status === 401 || status === 403) {
        heading = "Your API key wasn't accepted.";
        body = "Double-check that you copied the full key exactly — even one missing character will cause this error. Keys can be regenerated on the provider's website if needed.";
        actions = [{ href: prov.keyPageUrl, text: `Review your ${prov.label} API keys →` }];
      } else if (status === 429) {
        heading = "The AI service is temporarily busy or you've hit a usage limit.";
        body = "This can happen if the service is under heavy load or you've used your free quota for today. Try again in a few minutes, or use one of the options below.";
        actions = []; showOptions = true;
      } else if (status === 402) {
        heading = "Your API account needs funds to continue.";
        body = "The AI service rejected the request because your account balance is too low. You can add credits, switch to a service with a free tier, or use Generate Prompt for free.";
        actions = []; showOptions = true;
      } else {
        heading = "Something went wrong generating your note.";
        body = "Check your API key and try again. If the problem continues, the service may be temporarily unavailable.";
        actions = [{ href: prov.keyPageUrl, text: `Check your ${prov.label} API keys →` }];
      }

      return (
        <div style={{ background: "#fff5f5", border: "1.5px solid #e8b4b4", borderRadius: 9, padding: "14px 18px", marginBottom: 12, fontSize: 13, lineHeight: 1.6 }}>
          <p style={{ fontWeight: 700, color: "#7a2020", marginBottom: 5 }}>{heading}</p>
          <p style={{ color: "#5a3030", marginBottom: (showOptions || (actions && actions.length)) ? 10 : 0 }}>{body}</p>
          {actions && actions.map((a, i) => (
            <p key={i} style={{ marginBottom: 4 }}><a href={a.href} target="_blank" rel="noopener noreferrer" style={{ color: "#374528", fontWeight: 600 }}>{a.text}</a></p>
          ))}
          {showOptions && (
            <ul style={{ margin: "4px 0 0", paddingLeft: 18, color: "#5a3030", display: "flex", flexDirection: "column", gap: 5 }}>
              <li><strong>Use Generate Prompt (free, no key needed):</strong>{" "}<a href="#" onClick={e => { e.preventDefault(); onGeneratePrompt(); }} style={{ color: "#374528", fontWeight: 600 }}>Click here to generate a prompt</a>{" "}you can paste into any free AI chat like ChatGPT or Gemini.</li>
              {provider !== "gemini" && <li><strong>Try Gemini's free tier:</strong>{" "}Switch the provider above to Gemini and{" "}<a href={PROVIDERS.gemini.keyPageUrl} target="_blank" rel="noopener noreferrer" style={{ color: "#374528", fontWeight: 600 }}>get a free API key here</a>.</li>}
              <li><strong>Add funds to your account:</strong>{" "}<a href={prov.keyPageUrl} target="_blank" rel="noopener noreferrer" style={{ color: "#374528", fontWeight: 600 }}>Visit {prov.label} to manage your account →</a></li>
            </ul>
          )}
          {isAdmin && rawError && (
            <div style={{ marginTop: 10 }} className="info-tip">
              <span style={{ fontSize: 12, color: "#7a2020", cursor: "help", borderBottom: "1px dashed #e8b4b4" }}>Technical details ▾</span>
              <span className="info-bubble" role="tooltip" style={{ width: 360, fontFamily: "monospace", fontSize: 11, whiteSpace: "pre-wrap", wordBreak: "break-all", textAlign: "left" }}>
                {rawError}
                <button onClick={() => navigator.clipboard.writeText(rawError)} style={{ display: "block", marginTop: 8, padding: "3px 10px", fontSize: 11, borderRadius: 5, border: "1px solid #c0d4a8", background: "white", cursor: "pointer", color: "#374528" }}>Copy error</button>
              </span>
            </div>
          )}
        </div>
      );
    }

    async function callProvider(provider, apiKey, systemPrompt, userPrompt) {
      const res = await fetch("/api/llm-call", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          provider,
          apiKey,
          systemPrompt,
          userPrompt,
          model: provider === "anthropic" ? "claude-haiku-4-5-20251001" : provider === "openai" ? "gpt-4o-mini" : "gemini-2.5-flash",
          maxTokens: 1000,
        }),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(`API error ${res.status}: ${err?.error || res.statusText}`);
      }

      const data = await res.json();
      let raw;
      if (provider === "anthropic") raw = data.content.map(b => b.text || "").join("");
      else if (provider === "openai") raw = data.choices[0].message.content;
      else raw = data.candidates[0].content.parts[0].text;

      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error("No JSON found in response. Try again.");
      return JSON.parse(match[0]);
    }

    function App() {
      const [provider,   setProvider]   = React.useState(() => localStorage.getItem("bcba_provider") || "gemini");
      const [apiKey,     setApiKey]     = React.useState(() => localStorage.getItem(`bcba_key_${localStorage.getItem("bcba_provider") || "gemini"}`) || "");
      const [notes,      setNotes]      = React.useState("");
      const [btPresent,  setBtPresent]  = React.useState(null);
      const [output,     setOutput]     = React.useState(null);
      const [loading,    setLoading]    = React.useState(false);
      const [error,      setError]      = React.useState("");
      const [rawError,   setRawError]   = React.useState("");
      const [copied,     setCopied]     = React.useState(null);
      const [showKey,    setShowKey]    = React.useState(false);
      const [copiedPrompt, setCopiedPrompt] = React.useState(false);
      const [isAdmin,    setIsAdmin]    = React.useState(() => hasAdminToken());
      const [promptText, setPromptText] = React.useState("");

      React.useEffect(() => {
        const onStorage = () => setIsAdmin(hasAdminToken());
        window.addEventListener("storage", onStorage);
        return () => window.removeEventListener("storage", onStorage);
      }, []);

      const [pfCheck,       setPfCheck]       = React.useState(false);
      const [pfResult,      setPfResult]      = React.useState("");
      const [ioaCheck,      setIoaCheck]      = React.useState(false);
      const [ioaResult,     setIoaResult]     = React.useState("");
      const [notesReviewed, setNotesReviewed] = React.useState(false);
      const [notesResult,   setNotesResult]   = React.useState("");
      const [followUpCheck, setFollowUpCheck] = React.useState(false);
      const [followUpList,  setFollowUpList]  = React.useState("");

      const switchProvider = (p) => {
        setProvider(p);
        localStorage.setItem("bcba_provider", p);
        setApiKey(localStorage.getItem(`bcba_key_${p}`) || "");
        setError(""); setRawError("");
      };

      const saveApiKey = (val) => {
        setApiKey(val);
        if (val) localStorage.setItem(`bcba_key_${provider}`, val);
        else     localStorage.removeItem(`bcba_key_${provider}`);
      };

      const handleGenerate = async () => {
        if (!apiKey.trim())       { setError("NO_KEY"); setRawError(""); return; }
        if (!notes.trim())        { setError("Please enter session notes."); return; }
        if (btPresent === null)   { setError("Please indicate whether a BT/RBT was present."); return; }
        setError(""); setRawError("");
        setLoading(true);
        setOutput(null);

        const systemPrompt = `You are an expert Behavior Analyst documentation specialist. Convert raw session bullet notes into polished, professional supervision note content for a Behavior Analyst's clinical record. Write in third-person clinical prose. Never leave a section empty — if information is sparse, write a reasonable brief professional placeholder. Return ONLY a JSON object with exactly these four keys: "progress", "programming", "feedback", "followup". Each value is a string of 1–4 clean clinical sentences. No markdown, no extra keys, no preamble.`;

        const checks = [
          pfCheck       && `- Performance Feedback (PF) conducted. Result: ${pfResult.trim() || "not specified"}`,
          ioaCheck      && `- IOA check conducted. Result: ${ioaResult.trim() || "not specified"}`,
          notesReviewed && `- Last week's notes reviewed. Result: ${notesResult.trim() || "not specified"}`,
          followUpCheck && `- Follow-up items: ${followUpList.trim() || "not specified"}`,
        ].filter(Boolean).join("\n");

        const userPrompt = `BT/RBT present during session: ${btPresent ? "Yes" : "No"}

Raw session notes:
${notes}${checks ? `\n\nSession checks:\n${checks}` : ""}

Generate the four supervision note sections:

1. "progress": Client narrative progress on skills and behavior goals observed this session.
2. "programming": Summary of programming, prompting, or BIP changes made or needed (including probe/baseline/generalization/maintenance findings if applicable).
3. "feedback": ${btPresent
          ? "Feedback provided to direct service staff (BT/RBT) regarding implementation, skill acquisition targets, or behavior intervention."
          : "Description of Behavior Analyst-only activities: what was run, evaluated, modeled, or explained. If no technician was present, begin with: 'No technician was present; Behavior Analyst performed…'"}
4. "followup": Specific follow-up items to complete before or address at next session.`;

        try {
          const parsed = await callProvider(provider, apiKey, systemPrompt, userPrompt);
          setOutput(parsed);
        } catch (e) {
          setRawError(e.message || "");
          setError(e.message || "API error: generation failed");
        } finally {
          setLoading(false);
        }
      };

      const handleCopy = (id, text) => {
        navigator.clipboard.writeText(text);
        setCopied(id);
        setTimeout(() => setCopied(null), 1800);
      };

      const handleGeneratePrompt = () => {
        if (!notes.trim())      { setError("Please enter session notes first."); return; }
        if (btPresent === null) { setError("Please indicate whether a BT/RBT was present."); return; }
        setError(""); setRawError("");
        const sys = `You are an expert Behavior Analyst documentation specialist. Convert raw session bullet notes into polished, professional supervision note content. Write in third-person clinical prose. Never leave a section empty — if information is sparse, write a brief professional placeholder. Return exactly four labeled sections using this format (label on its own line, then the content, then a blank line before the next label):\n\nCLIENT NARRATIVE PROGRESS\n[1–4 clinical sentences]\n\nPROGRAMMING & BIP CHANGES\n[1–4 clinical sentences]\n\nSTAFF FEEDBACK / BEHAVIOR ANALYST MODELING\n[1–4 clinical sentences]\n\nFOLLOW-UP ITEMS\n[1–4 clinical sentences]\n\nNo JSON, no extra commentary, no preamble.`;
        const checks = [
          pfCheck       && `- Performance Feedback (PF) conducted. Result: ${pfResult.trim() || "not specified"}`,
          ioaCheck      && `- IOA check conducted. Result: ${ioaResult.trim() || "not specified"}`,
          notesReviewed && `- Last week's notes reviewed. Result: ${notesResult.trim() || "not specified"}`,
          followUpCheck && `- Follow-up items: ${followUpList.trim() || "not specified"}`,
        ].filter(Boolean).join("\n");
        const usr = `BT/RBT present during session: ${btPresent ? "Yes" : "No"}\n\nRaw session notes:\n${notes}${checks ? `\n\nSession checks:\n${checks}` : ""}\n\nGenerate the four supervision note sections:\n\n1. "progress": Client narrative progress on skills and behavior goals observed this session.\n2. "programming": Summary of programming, prompting, or BIP changes made or needed.\n3. "feedback": ${btPresent ? "Feedback provided to direct service staff (BT/RBT) regarding implementation, skill acquisition targets, or behavior intervention." : "Description of Behavior Analyst-only activities performed this session."}\n4. "followup": Specific follow-up items to complete before or address at next session.`;
        setPromptText(`${sys}\n\n---\n\n${usr}`);
        setCopiedPrompt(false);
      };

      const handleCopyPromptText = () => {
        if (!promptText) return;
        navigator.clipboard.writeText(promptText);
        setCopiedPrompt(true);
        setTimeout(() => setCopiedPrompt(false), 1800);
      };

      const handleCopyAll = () => {
        if (!output) return;
        const full = SECTIONS.map(s => `${s.label}\n${output[s.id]}`).join("\n\n");
        navigator.clipboard.writeText(full);
        setCopied("all");
        setTimeout(() => setCopied(null), 1800);
      };

      const card     = { background: "white", borderRadius: 12, border: "1px solid #c0d4a8", padding: 24, marginBottom: 20 };
      const lbl      = { fontSize: 13, fontWeight: 600, color: "#374528", textTransform: "uppercase", letterSpacing: "0.04em", display: "block", marginBottom: 8 };
      const inputBase = { width: "100%", padding: "10px 14px", borderRadius: 8, border: "1.5px solid #c0d4a8", fontSize: 14, color: "#2d3a1f", background: "#fafcf8" };
      const prov     = PROVIDERS[provider];

      return (
        <div style={{ maxWidth: 820, margin: "0 auto" }}>

          {/* Header */}
          <div style={{ marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <h1 style={{ fontSize: 26, fontWeight: 700, color: "#2d3a1f", marginBottom: 4 }}>Supervision Note Tool</h1>
              <p style={{ fontSize: 14, color: "#5a6b4a" }}>Paste raw session bullets — receive polished clinical documentation.</p>
            </div>
            <a href="/" style={{ padding: "7px 16px", borderRadius: 8, border: "1.5px solid #c0d4a8", background: "white", color: "#374528", fontSize: 13, fontWeight: 600, textDecoration: "none", whiteSpace: "nowrap", marginLeft: 16 }}>← Back</a>
          </div>

          {/* Disclaimer */}
          <div style={{ marginBottom: 24, padding: "14px 18px", borderRadius: 10, border: "1.5px solid #d4b483", background: "#fdf6e8", color: "#5a4420", fontSize: 13, lineHeight: 1.55 }}>
            <strong style={{ color: "#7a5a1a" }}>Disclaimer:</strong> Use of these AI-assisted queries is subject to the legal and regulatory constraints of the user's jurisdiction. These tools do not remove the user's responsibility to review all output for accuracy and to maintain compliance with the ethical standards of their credentialing board for professional behavior analysis work.{" "}
            <strong style={{ color: "#7a5a1a" }}>Do not enter any PHI (Protected Health Information) into this tool.</strong> PHI is any detail that could identify a specific client — including names, dates of birth, addresses, phone numbers, ID or insurance numbers, or any other personal identifiers.
          </div>

          {/* API Settings */}
          <div style={card}>

            {/* Provider toggle */}
            <div style={{ marginBottom: 20 }}>
              <p style={lbl}>AI Provider</p>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {Object.entries(PROVIDERS).map(([id, p]) => (
                  <button
                    key={id}
                    onClick={() => switchProvider(id)}
                    style={{
                      padding: "8px 18px", borderRadius: 8,
                      border: provider === id ? "2px solid #374528" : "1.5px solid #c0d4a8",
                      background: provider === id ? "#374528" : "white",
                      color: provider === id ? "white" : "#374528",
                      fontWeight: 600, fontSize: 14, cursor: "pointer",
                    }}
                  >
                    {p.label}
                  </button>
                ))}
              </div>
            </div>

            {/* API Key */}
            <div>
              <label style={lbl}>{prov.keyLabel}</label>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <input
                  type={showKey ? "text" : "password"}
                  value={apiKey}
                  onChange={e => saveApiKey(e.target.value)}
                  placeholder={prov.placeholder}
                  style={{ ...inputBase, flex: 1 }}
                />
                <button
                  onClick={() => setShowKey(v => !v)}
                  style={{ padding: "9px 14px", borderRadius: 8, border: "1.5px solid #c0d4a8", background: "white", color: "#374528", fontSize: 13, cursor: "pointer" }}
                >
                  {showKey ? "Hide" : "Show"}
                </button>
              </div>
              <p style={{ fontSize: 12, color: "#7a9460", marginTop: 7 }}>{prov.hint} — saved in this browser only.</p>
              <ApiKeyHelpBox provider={provider} />
            </div>
          </div>

          {/* Input card */}
          <div style={card}>

            {/* BT toggle */}
            <div style={{ marginBottom: 20 }}>
              <p style={lbl}>BT / RBT Present?</p>
              <div style={{ display: "flex", gap: 10 }}>
                {[true, false].map(val => (
                  <button
                    key={String(val)}
                    onClick={() => setBtPresent(val)}
                    style={{
                      padding: "8px 22px", borderRadius: 8,
                      border: btPresent === val ? "2px solid #374528" : "1.5px solid #c0d4a8",
                      background: btPresent === val ? "#374528" : "white",
                      color: btPresent === val ? "white" : "#374528",
                      fontWeight: 600, fontSize: 14, cursor: "pointer",
                    }}
                  >
                    {val ? "Yes" : "No — Behavior Analyst only"}
                  </button>
                ))}
              </div>
            </div>

            {/* Notes textarea */}
            <div style={{ marginBottom: 18 }}>
              <label style={lbl}>Raw Session Notes</label>
              <textarea
                value={notes}
                onChange={e => setNotes(e.target.value)}
                placeholder={`Paste brief bullet notes here, e.g.:\n- Worked tacts with DTT, 80% accuracy\n- Reduced prompt level on manding from FP to PP\n- Elopement x2, blocked, no escalation\n- Reminded BT to use ECO on trials`}
                style={{ ...inputBase, height: 180, resize: "vertical", lineHeight: 1.6 }}
              />
            </div>

            {/* Session Checks */}
            <div style={{ marginBottom: 20 }}>
              <p style={lbl}>Session Checks</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                {[
                  { checked: pfCheck,       setChecked: setPfCheck,       result: pfResult,      setResult: setPfResult,      label: "PF Check?",                    fieldLabel: "Result",  placeholder: "High / Moderate / Low; Needs retraining, etc." },
                  { checked: ioaCheck,      setChecked: setIoaCheck,      result: ioaResult,     setResult: setIoaResult,     label: "IOA Check?",                   fieldLabel: "Result",  placeholder: "High / Moderate / Low; Needs retraining, etc." },
                  { checked: notesReviewed, setChecked: setNotesReviewed, result: notesResult,   setResult: setNotesResult,   label: "Reviewed Last Week's Notes?",  fieldLabel: "Result",  placeholder: "Changes noted / needed" },
                  { checked: followUpCheck, setChecked: setFollowUpCheck, result: followUpList,  setResult: setFollowUpList,  label: "Follow Up Items?",             fieldLabel: "List",    placeholder: "Materials / program changes / parent follow up / schedule or availability changes, etc." },
                ].map(item => (
                  <div key={item.label}>
                    <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
                      <input
                        type="checkbox"
                        checked={item.checked}
                        onChange={() => item.setChecked(v => !v)}
                        style={{ accentColor: "#374528", width: 16, height: 16, flexShrink: 0 }}
                      />
                      <span style={{ fontSize: 14, fontWeight: 600, color: "#2d3a1f" }}>{item.label}</span>
                    </label>
                    {item.checked && (
                      <div style={{ marginTop: 8, marginLeft: 26 }}>
                        <label style={{ fontSize: 12, fontWeight: 600, color: "#374528", textTransform: "uppercase", letterSpacing: "0.04em", display: "block", marginBottom: 5 }}>{item.fieldLabel}</label>
                        <input
                          type="text"
                          value={item.result}
                          onChange={e => item.setResult(e.target.value)}
                          placeholder={item.placeholder}
                          style={{ ...inputBase, width: "100%" }}
                        />
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>

            <ApiErrorMessage error={error} rawError={rawError} provider={provider} isAdmin={isAdmin} onGeneratePrompt={handleGeneratePrompt} />

            <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
              <button
                onClick={handleGenerate}
                disabled={loading}
                style={{
                  padding: "11px 28px", borderRadius: 8, border: "none",
                  background: loading ? "#a0b890" : "#374528",
                  color: "white", fontSize: 15, fontWeight: 600,
                  cursor: loading ? "not-allowed" : "pointer",
                }}
              >
                {loading ? "Generating…" : "Generate Note"}
              </button>
              <button
                onClick={handleGeneratePrompt}
                style={{
                  padding: "11px 18px", borderRadius: 8,
                  border: "1.5px solid #374528",
                  background: "white", color: "#374528",
                  fontSize: 14, fontWeight: 600, cursor: "pointer",
                }}
              >
                Generate Prompt
              </button>
            </div>
          </div>

          {/* Generated Prompt output */}
          {promptText && (
            <div style={{ ...card }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <h2 style={{ fontSize: 17, fontWeight: 700, color: "#2d3a1f" }}>Generated Prompt</h2>
                <button
                  onClick={handleCopyPromptText}
                  style={{ padding: "7px 16px", borderRadius: 7, border: "1.5px solid #374528", background: "white", color: "#374528", fontSize: 13, fontWeight: 600, cursor: "pointer" }}
                >
                  {copiedPrompt ? "Copied!" : "Copy"}
                </button>
              </div>
              <textarea
                readOnly
                value={promptText}
                style={{ width: "100%", minHeight: 220, padding: 12, borderRadius: 8, border: "1px solid #c0d4a8", fontSize: 13, color: "#2d3a1f", lineHeight: 1.6, resize: "vertical", background: "#f7fbf3", fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace" }}
              />
            </div>
          )}

          {/* Output */}
          {output && (
            <div style={{ ...card, marginBottom: 0 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
                <h2 style={{ fontSize: 17, fontWeight: 700, color: "#2d3a1f" }}>Generated Note Sections</h2>
                <button
                  onClick={handleCopyAll}
                  style={{ padding: "7px 16px", borderRadius: 7, border: "1.5px solid #374528", background: "white", color: "#374528", fontSize: 13, fontWeight: 600, cursor: "pointer" }}
                >
                  {copied === "all" ? "Copied!" : "Copy All"}
                </button>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                {SECTIONS.map(s => (
                  <div key={s.id} style={{ borderRadius: 9, border: "1px solid #ddecd0", background: "#f7fbf3", padding: 16 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                      <div>
                        <span style={{ fontSize: 13, fontWeight: 700, color: "#374528" }}>{s.label}</span>
                        <span style={{ fontSize: 12, color: "#7a9460", marginLeft: 8 }}>{s.desc}</span>
                      </div>
                      <button
                        onClick={() => handleCopy(s.id, output[s.id])}
                        style={{ padding: "4px 12px", borderRadius: 6, border: "1px solid #c0d4a8", background: "white", color: "#374528", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", marginLeft: 12 }}
                      >
                        {copied === s.id ? "Copied!" : "Copy"}
                      </button>
                    </div>
                    <textarea
                      value={output[s.id]}
                      onChange={e => setOutput(prev => ({ ...prev, [s.id]: e.target.value }))}
                      style={{ width: "100%", minHeight: 80, padding: 10, borderRadius: 7, border: "1px solid #c0d4a8", fontSize: 14, color: "#2d3a1f", lineHeight: 1.65, resize: "vertical", background: "white" }}
                    />
                  </div>
                ))}
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
